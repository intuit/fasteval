<svg viewBox="0 0 940 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="940" height="540" fill="#f8fafc"/>

  <text x="470" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Sampling Strategy Decision Guide</text>
  <text x="470" y="65" text-anchor="middle" font-size="14" fill="#64748b">Optimizing evaluation accuracy vs. compute cost for production monitoring</text>

  <g transform="translate(30, 100)" filter="url(#shadow)">
    <rect width="280" height="170" rx="12" fill="white" stroke="#3b82f6" stroke-width="2"/>
    <rect width="280" height="36" rx="12" fill="#eff6ff"/>
    <rect y="26" width="280" height="10" fill="#eff6ff"/>
    <text x="140" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">RANDOM SAMPLING</text>

    <g transform="translate(20, 60)" font-size="11">
      <text y="0" fill="#475569">Unbiased subset of all traces.</text>
      <text y="25" font-weight="700" fill="#1e293b">BEST FOR:</text>
      <text x="75" y="25" fill="#475569">General health tracking</text>

      <text y="45" font-weight="700" fill="#1e293b">BIAS:</text>
      <text x="75" y="45" fill="#475569">None (Statistically pure)</text>

      <text y="65" font-weight="700" fill="#1e293b">COST:</text>
      <rect x="75" y="54" width="50" height="16" rx="4" fill="#dbeafe"/>
      <text x="100" y="66" text-anchor="middle" font-size="9" font-weight="800" fill="#1d4ed8">LOW</text>
    </g>
    <rect x="15" y="135" width="250" height="22" rx="4" fill="#f1f5f9"/>
    <text x="140" y="150" text-anchor="middle" font-size="10" font-family="monospace" fill="#1d4ed8">sample_size=100, seed=42</text>
  </g>

  <g transform="translate(330, 100)" filter="url(#shadow)">
    <rect width="280" height="170" rx="12" fill="white" stroke="#7c3aed" stroke-width="2"/>
    <rect width="280" height="36" rx="12" fill="#f5f3ff"/>
    <rect y="26" width="280" height="10" fill="#f5f3ff"/>
    <text x="140" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">STRATIFIED</text>

    <g transform="translate(20, 60)" font-size="11">
      <text y="0" fill="#475569">Even sampling across data groups.</text>
      <text y="25" font-weight="700" fill="#1e293b">BEST FOR:</text>
      <text x="75" y="25" fill="#475569">Fairness across segments</text>

      <text y="45" font-weight="700" fill="#1e293b">BIAS:</text>
      <text x="75" y="45" fill="#475569">Proportional representation</text>

      <text y="65" font-weight="700" fill="#1e293b">COST:</text>
      <rect x="75" y="54" width="70" height="16" rx="4" fill="#ede9fe"/>
      <text x="110" y="66" text-anchor="middle" font-size="9" font-weight="800" fill="#6d28d9">MEDIUM</text>
    </g>
    <rect x="15" y="135" width="250" height="22" rx="4" fill="#f1f5f9"/>
    <text x="140" y="150" text-anchor="middle" font-size="10" font-family="monospace" fill="#6d28d9">strata_key="user_plan"</text>
  </g>

  <g transform="translate(630, 100)" filter="url(#shadow)">
    <rect width="280" height="170" rx="12" fill="white" stroke="#ef4444" stroke-width="2"/>
    <rect width="280" height="36" rx="12" fill="#fef2f2"/>
    <rect y="26" width="280" height="10" fill="#fef2f2"/>
    <text x="140" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">SCORE-BASED</text>

    <g transform="translate(20, 60)" font-size="11">
      <text y="0" fill="#475569">Oversample low-scored traces.</text>
      <text y="25" font-weight="700" fill="#1e293b">BEST FOR:</text>
      <text x="75" y="25" fill="#475569">Root cause analysis</text>

      <text y="45" font-weight="700" fill="#1e293b">BIAS:</text>
      <text x="75" y="45" fill="#475569">Intentional (Failures)</text>

      <text y="65" font-weight="700" fill="#1e293b">COST:</text>
      <rect x="75" y="54" width="85" height="16" rx="4" fill="#fee2e2"/>
      <text x="117.5" y="66" text-anchor="middle" font-size="9" font-weight="800" fill="#dc2626">OPTIMIZED</text>
    </g>
    <rect x="15" y="135" width="250" height="22" rx="4" fill="#f1f5f9"/>
    <text x="140" y="150" text-anchor="middle" font-size="10" font-family="monospace" fill="#dc2626">low_score_rate=1.0</text>
  </g>

  <g transform="translate(180, 300)" filter="url(#shadow)">
    <rect width="280" height="170" rx="12" fill="white" stroke="#f59e0b" stroke-width="2"/>
    <rect width="280" height="36" rx="12" fill="#fffbeb"/>
    <rect y="26" width="280" height="10" fill="#fffbeb"/>
    <text x="140" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">RECENT-FIRST</text>

    <g transform="translate(20, 60)" font-size="11">
      <text y="0" fill="#475569">Favors latest interactions.</text>
      <text y="25" font-weight="700" fill="#1e293b">BEST FOR:</text>
      <text x="75" y="25" fill="#475569">Post-deployment audits</text>

      <text y="45" font-weight="700" fill="#1e293b">BIAS:</text>
      <text x="75" y="45" fill="#475569">Temporal (Recency)</text>

      <text y="65" font-weight="700" fill="#1e293b">COST:</text>
      <rect x="75" y="54" width="80" height="16" rx="4" fill="#fef3c7"/>
      <text x="115" y="66" text-anchor="middle" font-size="9" font-weight="800" fill="#b45309">LOW-MED</text>
    </g>
    <rect x="15" y="135" width="250" height="22" rx="4" fill="#f1f5f9"/>
    <text x="140" y="150" text-anchor="middle" font-size="10" font-family="monospace" fill="#b45309">decay_factor=0.8</text>
  </g>

  <g transform="translate(480, 300)" filter="url(#shadow)">
    <rect width="280" height="170" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
    <rect width="280" height="36" rx="12" fill="#ecfdf5"/>
    <rect y="26" width="280" height="10" fill="#ecfdf5"/>
    <text x="140" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">NO SAMPLING (FULL)</text>

    <g transform="translate(20, 60)" font-size="11">
      <text y="0" fill="#475569">Evaluate 100% of captured traces.</text>
      <text y="25" font-weight="700" fill="#1e293b">BEST FOR:</text>
      <text x="75" y="25" fill="#475569">Compliance &amp; incidents</text>

      <text y="45" font-weight="700" fill="#1e293b">BIAS:</text>
      <text x="75" y="45" fill="#475569">None (Complete set)</text>

      <text y="65" font-weight="700" fill="#1e293b">COST:</text>
      <rect x="75" y="54" width="60" height="16" rx="4" fill="#d1fae5"/>
      <text x="105" y="66" text-anchor="middle" font-size="9" font-weight="800" fill="#059669">HIGH</text>
    </g>
    <rect x="15" y="135" width="250" height="22" rx="4" fill="#f1f5f9"/>
    <text x="140" y="150" text-anchor="middle" font-size="10" font-family="monospace" fill="#059669"># No sampling params</text>
  </g>

  <text x="470" y="515" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Sampling Strategy Architectural Standards • 2026</text>
</svg>