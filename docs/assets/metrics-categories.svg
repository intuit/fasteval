<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="900" height="480" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Metric Categories</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Standardized evaluation suites for agents, RAG, and conversations</text>

  <g transform="translate(40, 100)" filter="url(#shadow)">
    <rect width="390" height="165" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect width="390" height="40" rx="12" fill="#f5f3ff"/>
    <rect y="30" width="390" height="10" fill="#f5f3ff"/>
    <text x="20" y="26" font-size="14" font-weight="700" fill="#6d28d9">LLM-BASED METRICS</text>
    <text x="370" y="26" text-anchor="end" font-size="11" font-weight="600" fill="#7c3aed">Latency: ~1-3s</text>
    
    <text x="20" y="62" font-size="12" fill="#475569">Semantic evaluation using high-reasoning judge models.</text>
    
    <g transform="translate(20, 80)">
      <rect width="90" height="26" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
      <text x="45" y="17" text-anchor="middle" font-size="11" font-family="monospace" fill="#1d4ed8">correctness</text>
      
      <rect x="100" width="80" height="26" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
      <text x="140" y="17" text-anchor="middle" font-size="11" font-family="monospace" fill="#1d4ed8">relevance</text>
      
      <rect x="190" width="105" height="26" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
      <text x="242.5" y="17" text-anchor="middle" font-size="11" font-family="monospace" fill="#1d4ed8">hallucination</text>

      <rect y="36" width="70" height="26" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
      <text x="35" y="53" text-anchor="middle" font-size="11" font-family="monospace" fill="#991b1b">toxicity</text>
      
      <rect x="80" y="36" width="50" height="26" rx="6" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
      <text x="105" y="53" text-anchor="middle" font-size="11" font-family="monospace" fill="#991b1b">bias</text>
      
      <rect x="140" y="36" width="70" height="26" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
      <text x="175" y="53" text-anchor="middle" font-size="11" font-family="monospace" fill="#334155">criteria</text>
    </g>
  </g>

  <g transform="translate(470, 100)" filter="url(#shadow)">
    <rect width="390" height="165" rx="12" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect width="390" height="40" rx="12" fill="#eff6ff"/>
    <rect y="30" width="390" height="10" fill="#eff6ff"/>
    <text x="20" y="26" font-size="14" font-weight="700" fill="#1d4ed8">RAG METRICS</text>
    <text x="370" y="26" text-anchor="end" font-size="11" font-weight="600" fill="#2563eb">Retrieval + Gen</text>
    
    <text x="20" y="62" font-size="12" fill="#475569">Evaluation of grounding against retrieved documents.</text>
    
    <g transform="translate(20, 80)">
      <rect width="100" height="26" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
      <text x="50" y="17" text-anchor="middle" font-size="11" font-family="monospace" fill="#047857">faithfulness</text>
      
      <rect x="110" width="150" height="26" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
      <text x="185" y="17" text-anchor="middle" font-size="11" font-family="monospace" fill="#047857">contextual_precision</text>
      
      <rect y="36" width="130" height="26" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
      <text x="65" y="53" text-anchor="middle" font-size="11" font-family="monospace" fill="#047857">contextual_recall</text>
      
      <rect x="140" y="36" width="150" height="26" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
      <text x="215" y="53" text-anchor="middle" font-size="11" font-family="monospace" fill="#1d4ed8">answer_correctness</text>
    </g>
  </g>

  <g transform="translate(40, 285)" filter="url(#shadow)">
    <rect width="390" height="140" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
    <rect width="390" height="40" rx="12" fill="#ecfdf5"/>
    <rect y="30" width="390" height="10" fill="#ecfdf5"/>
    <text x="20" y="26" font-size="14" font-weight="700" fill="#047857">DETERMINISTIC</text>
    <text x="370" y="26" text-anchor="end" font-size="11" font-weight="700" fill="#059669">⚡ INSTANT</text>
    
    <text x="20" y="62" font-size="12" fill="#475569">No LLM calls. Rule-based and string-matching logic.</text>
    
    <g transform="translate(20, 80)">
      <rect width="75" height="26" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
      <text x="37.5" y="17" text-anchor="middle" font-size="11" font-family="monospace" fill="#334155">contains</text>
      
      <rect x="85" width="95" height="26" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
      <text x="132.5" y="17" text-anchor="middle" font-size="11" font-family="monospace" fill="#334155">exact_match</text>
      
      <rect x="190" width="60" height="26" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
      <text x="220" y="17" text-anchor="middle" font-size="11" font-family="monospace" fill="#334155">rouge</text>
      
      <rect y="36" width="105" height="26" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1"/>
      <text x="52.5" y="53" text-anchor="middle" font-size="11" font-family="monospace" fill="#334155">json_schema</text>
    </g>
  </g>

  <g transform="translate(470, 285)" filter="url(#shadow)">
    <rect width="390" height="140" rx="12" fill="white" stroke="#fde68a" stroke-width="1.5"/>
    <rect width="390" height="40" rx="12" fill="#fffbeb"/>
    <rect y="30" width="390" height="10" fill="#fffbeb"/>
    <text x="20" y="26" font-size="14" font-weight="700" fill="#b45309">CONVERSATION</text>
    <text x="370" y="26" text-anchor="end" font-size="11" font-weight="600" fill="#d97706">Multi-turn</text>
    
    <text x="20" y="62" font-size="12" fill="#475569">Evaluation of dialogue history and context flow.</text>
    
    <g transform="translate(20, 80)">
      <rect width="130" height="26" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
      <text x="65" y="17" text-anchor="middle" font-size="11" font-family="monospace" fill="#b45309">context_retention</text>
      
      <rect x="140" width="90" height="26" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
      <text x="185" y="17" text-anchor="middle" font-size="11" font-family="monospace" fill="#b45309">consistency</text>
      
      <rect y="36" width="90" height="26" rx="6" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
      <text x="45" y="53" text-anchor="middle" font-size="11" font-family="monospace" fill="#b45309">topic_drift</text>
    </g>
  </g>

  <text x="450" y="468" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Documentation Standards • Architectural Standards 2026</text>
</svg>
