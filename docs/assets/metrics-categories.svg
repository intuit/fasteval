<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="llmMetricGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="ragMetricGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="detMetricGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="convMetricGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="shadowMetrics" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Metric Categories</text>
  
  <!-- LLM Metrics (Top Left) -->
  <g filter="url(#shadowMetrics)">
    <rect x="30" y="55" width="360" height="150" rx="12" fill="url(#llmMetricGrad)"/>
    <text x="210" y="82" text-anchor="middle" font-size="15" font-weight="700" fill="white">LLM-Based Metrics</text>
    <text x="210" y="100" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">Semantic evaluation using LLM judge • ~1-3s</text>
    <line x1="50" y1="112" x2="370" y2="112" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    
    <!-- Metric tags row 1 -->
    <rect x="50" y="125" width="80" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="90" y="143" text-anchor="middle" font-size="10" fill="white">correctness</text>
    
    <rect x="140" y="125" width="70" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="175" y="143" text-anchor="middle" font-size="10" fill="white">relevance</text>
    
    <rect x="220" y="125" width="85" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="262" y="143" text-anchor="middle" font-size="10" fill="white">hallucination</text>
    
    <!-- Metric tags row 2 -->
    <rect x="50" y="160" width="60" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="80" y="178" text-anchor="middle" font-size="10" fill="white">toxicity</text>
    
    <rect x="120" y="160" width="45" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="142" y="178" text-anchor="middle" font-size="10" fill="white">bias</text>
    
    <rect x="175" y="160" width="55" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="202" y="178" text-anchor="middle" font-size="10" fill="white">criteria</text>
  </g>
  
  <!-- RAG Metrics (Top Right) -->
  <g filter="url(#shadowMetrics)">
    <rect x="410" y="55" width="360" height="150" rx="12" fill="url(#ragMetricGrad)"/>
    <text x="590" y="82" text-anchor="middle" font-size="15" font-weight="700" fill="white">RAG Metrics</text>
    <text x="590" y="100" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">Retrieval + generation evaluation • ~1-3s</text>
    <line x1="430" y1="112" x2="750" y2="112" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    
    <!-- Metric tags row 1 -->
    <rect x="430" y="125" width="80" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="470" y="143" text-anchor="middle" font-size="10" fill="white">faithfulness</text>
    
    <rect x="520" y="125" width="120" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="580" y="143" text-anchor="middle" font-size="10" fill="white">contextual_precision</text>
    
    <!-- Metric tags row 2 -->
    <rect x="430" y="160" width="105" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="482" y="178" text-anchor="middle" font-size="10" fill="white">contextual_recall</text>
    
    <rect x="545" y="160" width="115" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="602" y="178" text-anchor="middle" font-size="10" fill="white">answer_correctness</text>
  </g>
  
  <!-- Deterministic Metrics (Bottom Left) -->
  <g filter="url(#shadowMetrics)">
    <rect x="30" y="220" width="360" height="150" rx="12" fill="url(#detMetricGrad)"/>
    <text x="210" y="247" text-anchor="middle" font-size="15" font-weight="700" fill="white">Deterministic Metrics</text>
    <text x="210" y="265" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">No LLM calls • instant • CI/CD friendly</text>
    <line x1="50" y1="277" x2="370" y2="277" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    
    <!-- Metric tags row 1 -->
    <rect x="50" y="290" width="65" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="82" y="308" text-anchor="middle" font-size="10" fill="white">contains</text>
    
    <rect x="125" y="290" width="85" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="167" y="308" text-anchor="middle" font-size="10" fill="white">exact_match</text>
    
    <rect x="220" y="290" width="50" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="245" y="308" text-anchor="middle" font-size="10" fill="white">rouge</text>
    
    <!-- Metric tags row 2 -->
    <rect x="50" y="325" width="85" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="92" y="343" text-anchor="middle" font-size="10" fill="white">json_schema</text>
    
    <!-- Speed badge -->
    <rect x="285" y="290" width="75" height="61" rx="6" fill="rgba(255,255,255,0.15)"/>
    <text x="322" y="315" text-anchor="middle" font-size="18" fill="white">⚡</text>
    <text x="322" y="333" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Instant</text>
    <text x="322" y="345" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">results</text>
  </g>
  
  <!-- Conversation Metrics (Bottom Right) -->
  <g filter="url(#shadowMetrics)">
    <rect x="410" y="220" width="360" height="150" rx="12" fill="url(#convMetricGrad)"/>
    <text x="590" y="247" text-anchor="middle" font-size="15" font-weight="700" fill="white">Conversation Metrics</text>
    <text x="590" y="265" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">Multi-turn dialogue evaluation • ~2-5s</text>
    <line x1="430" y1="277" x2="750" y2="277" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    
    <!-- Metric tags row 1 -->
    <rect x="430" y="290" width="110" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="485" y="308" text-anchor="middle" font-size="10" fill="white">context_retention</text>
    
    <rect x="550" y="290" width="85" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="592" y="308" text-anchor="middle" font-size="10" fill="white">consistency</text>
    
    <!-- Metric tags row 2 -->
    <rect x="430" y="325" width="80" height="26" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="470" y="343" text-anchor="middle" font-size="10" fill="white">topic_drift</text>
    
    <!-- Chat icon -->
    <rect x="665" y="290" width="75" height="61" rx="6" fill="rgba(255,255,255,0.15)"/>
    <text x="702" y="318" text-anchor="middle" font-size="18" fill="white">💬</text>
    <text x="702" y="336" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Multi-turn</text>
    <text x="702" y="348" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">dialogues</text>
  </g>
  
  <!-- Footer -->
  <text x="400" y="392" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Mix and match metrics for comprehensive evaluation</text>
</svg>
