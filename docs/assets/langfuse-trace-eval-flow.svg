<svg viewBox="0 0 940 450" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <rect width="940" height="450" fill="#f8fafc"/>

  <text x="470" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Trace Evaluation Data Flow</text>
  <text x="470" y="65" text-anchor="middle" font-size="14" fill="#64748b">Asynchronous data synchronization between Langfuse Cloud and fasteval LLM judges</text>

  <g transform="translate(30, 100)" filter="url(#shadow)">
    <rect width="150" height="180" rx="12" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
    <rect width="150" height="32" rx="12" fill="#f1f5f9"/>
    <rect y="22" width="150" height="10" fill="#f1f5f9"/>
    <text x="75" y="21" text-anchor="middle" font-size="12" font-weight="800" fill="#475569">LANGFUSE CLOUD</text>

    <g transform="translate(15, 50)" font-size="10">
      <rect width="120" height="32" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="60" y="20" text-anchor="middle" fill="#64748b">Production Traces</text>

      <rect y="40" width="120" height="32" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="60" y="60" text-anchor="middle" fill="#64748b">Golden Datasets</text>

      <rect y="80" width="120" height="40" rx="6" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
      <text x="60" y="100" text-anchor="middle" font-weight="700" fill="#059669">EVAL SCORES</text>
      <text x="60" y="112" text-anchor="middle" font-size="8" fill="#059669">Synchronized</text>
    </g>
  </g>

  <line x1="180" y1="190" x2="220" y2="190" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="200" y="182" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">fetch</text>

  <g transform="translate(220, 140)" filter="url(#shadow)">
    <rect width="140" height="100" rx="12" fill="white" stroke="#6366f1" stroke-width="2"/>
    <text x="70" y="30" text-anchor="middle" font-size="11" font-weight="800" fill="#4338ca">EVAL WRAPPER</text>
    <g font-family="monospace" font-size="9" text-anchor="middle">
      <text x="70" y="55" fill="#4f46e5">@langfuse_traces</text>
      <text x="70" y="70" fill="#94a3b8">-- or --</text>
      <text x="70" y="85" fill="#4f46e5">@langfuse_dataset</text>
    </g>
  </g>

  <line x1="360" y1="190" x2="400" y2="190" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="380" y="182" text-anchor="middle" font-size="10" font-weight="700" fill="#64748b">map</text>

  <g transform="translate(400, 100)" filter="url(#shadow)">
    <rect width="160" height="180" rx="12" fill="white" stroke="#fcd34d" stroke-width="1.5"/>
    <rect width="160" height="32" rx="12" fill="#fffbeb"/>
    <rect y="22" width="160" height="10" fill="#fffbeb"/>
    <text x="80" y="21" text-anchor="middle" font-size="12" font-weight="800" fill="#b45309">PARAMETER MAPPING</text>

    <g transform="translate(15, 50)" font-family="monospace" font-size="9">
      <text y="15" fill="#92400e" font-weight="700">input</text>
      <text x="50" y="15" fill="#78716c">→ user_query</text>

      <text y="40" fill="#92400e" font-weight="700">output</text>
      <text x="50" y="40" fill="#78716c">→ llm_response</text>

      <text y="65" fill="#92400e" font-weight="700">context</text>
      <text x="50" y="65" fill="#78716c">→ search_results</text>

      <line x1="0" y1="80" x2="130" y2="80" stroke="#fef3c7"/>

      <text y="100" fill="#b45309" font-style="italic">Automated mapping</text>
      <text y="115" fill="#b45309" font-style="italic">of trace attributes</text>
    </g>
  </g>

  <line x1="560" y1="190" x2="600" y2="190" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="580" y="182" text-anchor="middle" font-size="10" font-weight="700" fill="#64748b">judge</text>

  <g transform="translate(600, 115)" filter="url(#shadow)">
    <rect width="150" height="150" rx="12" fill="white" stroke="#a78bfa" stroke-width="2"/>
    <rect width="150" height="32" rx="12" fill="#f5f3ff"/>
    <rect y="22" width="150" height="10" fill="#f5f3ff"/>
    <text x="75" y="21" text-anchor="middle" font-size="12" font-weight="800" fill="#6d28d9">LLM METRICS</text>

    <g transform="translate(15, 55)" font-family="monospace" font-size="10" fill="#5b21b6">
      <text y="15">@fe.correctness</text>
      <text y="35">@fe.faithfulness</text>
      <text y="55">@fe.relevance</text>
      <text y="75" fill="#94a3b8">+ custom_logic</text>
    </g>
  </g>

  <line x1="750" y1="190" x2="790" y2="190" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(790, 140)" filter="url(#shadow)">
    <rect width="120" height="100" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
    <text x="60" y="30" text-anchor="middle" font-size="11" font-weight="800" fill="#047857">LOCAL RESULT</text>
    <g font-family="monospace" font-size="10" text-anchor="middle">
      <text x="60" y="55" fill="#059669" font-weight="700">0.87</text>
      <text x="60" y="75" fill="#64748b">passed: true</text>
    </g>
  </g>

  <path d="M 850 240 C 850 380, 105 380, 105 285" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="8 4" marker-end="url(#arrow-green)"/>
  <text x="470" y="363" text-anchor="middle" font-size="10" font-weight="800" fill="#166534">SYNC SCORES BACK TO PRODUCTION DASHBOARD</text>

  <text x="470" y="438" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Langfuse Integration Lifecycle • 2026 Documentation</text>
</svg>