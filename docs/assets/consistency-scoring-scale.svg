<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="900" height="480" fill="#f8fafc"/>

  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Consistency Scoring Scale</text>
  <text x="450" y="65" text-anchor="middle" font-size="14" fill="#64748b">How the LLM judge evaluates conversation consistency (0.0 - 1.0)</text>

  <!-- Gradient bar -->
  <g transform="translate(50, 100)">
    <rect width="160" height="40" rx="6" fill="#ef4444"/>
    <rect x="160" width="160" height="40" fill="#f59e0b"/>
    <rect x="320" width="160" height="40" fill="#eab308"/>
    <rect x="480" width="160" height="40" fill="#22c55e"/>
    <rect x="640" width="160" height="40" rx="6" fill="#10b981"/>

    <rect x="150" width="20" height="40" fill="#f59e0b"/>
    <rect x="310" width="20" height="40" fill="#eab308"/>
    <rect x="470" width="20" height="40" fill="#22c55e"/>
    <rect x="630" width="20" height="40" fill="#10b981"/>

    <g font-size="11" font-weight="700" fill="white" text-anchor="middle">
      <text x="80" y="25">CONTRADICTORY</text>
      <text x="240" y="25">INCONSISTENT</text>
      <text x="400" y="25">MIXED</text>
      <text x="560" y="25">MOSTLY STABLE</text>
      <text x="720" y="25">FULLY CONSISTENT</text>
    </g>

    <g font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">
      <text x="0" y="60">0.0</text>
      <text x="160" y="60">0.3</text>
      <text x="320" y="60">0.5</text>
      <text x="480" y="60">0.7</text>
      <text x="640" y="60">0.9</text>
      <text x="800" y="60">1.0</text>
    </g>
  </g>

  <!-- Score cards -->
  <g transform="translate(26, 200)">
    <!-- Card 1 -->
    <g filter="url(#shadow)">
      <rect width="160" height="140" rx="12" fill="white" stroke="#fecaca" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#fef2f2"/>
      <rect y="20" width="160" height="12" fill="#fef2f2"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">0.0 - 0.3</text>
      <text x="12" y="52" font-size="11" fill="#475569">Major contradictions</text>
      <text x="12" y="68" font-size="11" fill="#475569">across turns. Key facts</text>
      <text x="12" y="84" font-size="11" fill="#475569">directly conflict.</text>
      <text x="12" y="115" font-size="10" font-style="italic" fill="#94a3b8">Ex: "30 day returns"</text>
      <text x="12" y="130" font-size="10" font-style="italic" fill="#94a3b8">then "14 day returns"</text>
    </g>

    <!-- Card 2 -->
    <g transform="translate(172, 0)" filter="url(#shadow)">
      <rect width="160" height="140" rx="12" fill="white" stroke="#fde68a" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#fffbeb"/>
      <rect y="20" width="160" height="12" fill="#fffbeb"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">0.3 - 0.5</text>
      <text x="12" y="52" font-size="11" fill="#475569">Notable inconsistencies</text>
      <text x="12" y="68" font-size="11" fill="#475569">or drifting stance on</text>
      <text x="12" y="84" font-size="11" fill="#475569">key topics.</text>
      <text x="12" y="115" font-size="10" font-style="italic" fill="#94a3b8">Ex: Recommends A,</text>
      <text x="12" y="130" font-size="10" font-style="italic" fill="#94a3b8">then switches to B</text>
    </g>

    <!-- Card 3 -->
    <g transform="translate(344, 0)" filter="url(#shadow)">
      <rect width="160" height="140" rx="12" fill="white" stroke="#fde68a" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#fefce8"/>
      <rect y="20" width="160" height="12" fill="#fefce8"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#ca8a04">0.5 - 0.7</text>
      <text x="12" y="52" font-size="11" fill="#475569">Minor inconsistencies.</text>
      <text x="12" y="68" font-size="11" fill="#475569">Small detail shifts but</text>
      <text x="12" y="84" font-size="11" fill="#475569">core info is stable.</text>
      <text x="12" y="115" font-size="10" font-style="italic" fill="#94a3b8">Ex: "About 50 people"</text>
      <text x="12" y="130" font-size="10" font-style="italic" fill="#94a3b8">then "around 45 people"</text>
    </g>

    <!-- Card 4 -->
    <g transform="translate(516, 0)" filter="url(#shadow)">
      <rect width="160" height="140" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#ecfdf5"/>
      <rect y="20" width="160" height="12" fill="#ecfdf5"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">0.7 - 0.9</text>
      <text x="12" y="52" font-size="11" fill="#475569">Largely consistent.</text>
      <text x="12" y="68" font-size="11" fill="#475569">Facts align with minor</text>
      <text x="12" y="84" font-size="11" fill="#475569">phrasing differences.</text>
      <text x="12" y="115" font-size="10" font-style="italic" fill="#94a3b8">Ex: Same facts, slightly</text>
      <text x="12" y="130" font-size="10" font-style="italic" fill="#94a3b8">different wording</text>
    </g>

    <!-- Card 5 -->
    <g transform="translate(688, 0)" filter="url(#shadow)">
      <rect width="160" height="140" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#ecfdf5"/>
      <rect y="20" width="160" height="12" fill="#ecfdf5"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">0.9 - 1.0</text>
      <text x="12" y="52" font-size="11" fill="#475569">Perfectly consistent.</text>
      <text x="12" y="68" font-size="11" fill="#475569">No contradictions,</text>
      <text x="12" y="84" font-size="11" fill="#475569">stable throughout.</text>
      <text x="12" y="115" font-size="10" font-style="italic" fill="#94a3b8">Ex: All facts match</text>
      <text x="12" y="130" font-size="10" font-style="italic" fill="#94a3b8">across every turn</text>
    </g>
  </g>

  <!-- Threshold recommendations -->
  <g transform="translate(50, 390)">
    <rect width="800" height="40" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
    <text x="400" y="25" text-anchor="middle" font-size="11" fill="#475569">
      <tspan font-weight="700">Recommended Thresholds:</tspan>
      Chatbots: <tspan fill="#3b82f6" font-weight="700">0.7</tspan> *
      Support Agents: <tspan fill="#8b5cf6" font-weight="700">0.8</tspan> *
      Medical/Legal/Financial: <tspan fill="#10b981" font-weight="700">0.9+</tspan>
    </text>
  </g>

  <text x="450" y="468" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval * consistency Metric Scoring * Architectural Standards 2026</text>
</svg>