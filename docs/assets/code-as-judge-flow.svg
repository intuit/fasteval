<svg viewBox="0 0 900 340" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="900" height="340" fill="#f8fafc"/>

  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Code as a Judge - Evaluation Flow</text>
  <text x="450" y="65" text-anchor="middle" font-size="14" fill="#64748b">Your function scores the output. fasteval wires it all together.</text>

  <!-- Step 1: Define function -->
  <g transform="translate(30, 105)" filter="url(#shadow)">
    <rect width="155" height="110" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect width="155" height="32" rx="12" fill="#eef2ff"/>
    <rect y="20" width="155" height="12" fill="#eef2ff"/>
    <text x="78" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#4f46e5">YOUR FUNCTION</text>
    <text x="78" y="55" text-anchor="middle" font-size="11" fill="#475569">Plain Python</text>
    <text x="78" y="72" text-anchor="middle" font-size="11" fill="#475569">Returns 0.0 - 1.0</text>
    <text x="78" y="97" text-anchor="middle" font-size="10" font-family="monospace" fill="#94a3b8">def check(...) -&gt; float</text>
  </g>

  <!-- Arrow 1-2 -->
  <line x1="185" y1="160" x2="218" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="206" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8">pass to</text>

  <!-- Step 2: @fe.judge -->
  <g transform="translate(228, 105)" filter="url(#shadow)">
    <rect width="155" height="110" rx="12" fill="white" stroke="#3b82f6" stroke-width="2"/>
    <rect width="155" height="32" rx="12" fill="#eff6ff"/>
    <rect y="20" width="155" height="12" fill="#eff6ff"/>
    <text x="78" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#2563eb">@fe.judge(...)</text>
    <text x="78" y="55" text-anchor="middle" font-size="11" fill="#475569">Wraps function into</text>
    <text x="78" y="72" text-anchor="middle" font-size="11" fill="#475569">CodeJudgeMetric</text>
    <text x="78" y="97" text-anchor="middle" font-size="10" font-family="monospace" fill="#94a3b8">threshold, weight, name</text>
  </g>

  <!-- Arrow 2-3 -->
  <line x1="383" y1="160" x2="416" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="405" y="150" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8">score</text>

  <!-- Step 3: fe.score() -->
  <g transform="translate(426, 105)" filter="url(#shadow)">
    <rect width="155" height="110" rx="12" fill="white" stroke="#a78bfa" stroke-width="1.5"/>
    <rect width="155" height="32" rx="12" fill="#f5f3ff"/>
    <rect y="20" width="155" height="12" fill="#f5f3ff"/>
    <text x="78" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#7c3aed">fe.score()</text>
    <text x="78" y="55" text-anchor="middle" font-size="11" fill="#475569">Inspects fn signature</text>
    <text x="78" y="72" text-anchor="middle" font-size="11" fill="#475569">Maps EvalInput to kwargs</text>
    <text x="78" y="97" text-anchor="middle" font-size="10" font-family="monospace" fill="#94a3b8">fn(actual_output=...)</text>
  </g>

  <!-- Arrow 3-4 -->
  <line x1="581" y1="160" x2="614" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 4: MetricResult -->
  <g transform="translate(624, 105)" filter="url(#shadow)">
    <rect width="130" height="110" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <text x="65" y="30" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">MetricResult</text>
    <text x="65" y="62" text-anchor="middle" font-size="28" font-weight="800" fill="#10b981">0.85</text>
    <text x="65" y="82" text-anchor="middle" font-size="10" fill="#94a3b8">score: 0.0 - 1.0</text>
    <text x="65" y="100" text-anchor="middle" font-size="10" fill="#94a3b8">+ reasoning</text>
  </g>

  <!-- Arrow 4-5 -->
  <line x1="754" y1="160" x2="787" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Step 5: Pass/Fail -->
  <g transform="translate(797, 115)">
    <g filter="url(#shadow)">
      <rect width="80" height="36" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="1.5"/>
      <text x="40" y="23" text-anchor="middle" font-size="14" font-weight="800" fill="#047857">PASS</text>
    </g>
    <g transform="translate(0, 50)" filter="url(#shadow)">
      <rect width="80" height="36" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1.5"/>
      <text x="40" y="23" text-anchor="middle" font-size="14" font-weight="800" fill="#991b1b">FAIL</text>
    </g>
    <text x="40" y="-5" text-anchor="middle" font-size="9" font-weight="600" fill="#94a3b8">&gt;= threshold?</text>
  </g>

  <!-- Bottom labels -->
  <g transform="translate(0, 260)">
    <rect x="30" y="0" width="155" height="28" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="108" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">You write this</text>

    <rect x="228" y="0" width="353" height="28" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="405" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">fasteval handles this</text>

    <rect x="624" y="0" width="253" height="28" rx="6" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="751" y="18" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">You get this</text>
  </g>

  <text x="450" y="328" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval - Code as a Judge Evaluation Pipeline - 2026</text>
</svg>
