<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Decorator Execution Flow</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Lifecycle of a FastEval test from discovery to scoring</text>

  <g transform="translate(70, 110)">
    <g filter="url(#shadow)">
      <rect width="160" height="90" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#f1f5f9"/>
      <rect y="20" width="160" height="12" fill="#f1f5f9"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Pytest Discovery</text>
      <text x="80" y="58" text-anchor="middle" font-size="12" fill="#475569">test_*.py collection</text>
      <text x="80" y="76" text-anchor="middle" font-size="11" fill="#94a3b8">Initiation Phase</text>
    </g>

    <line x1="160" y1="45" x2="200" y2="45" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(200, 0)" filter="url(#shadow)">
      <rect width="160" height="90" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#eff6ff"/>
      <rect y="20" width="160" height="12" fill="#eff6ff"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">Registration</text>
      <text x="80" y="58" text-anchor="middle" font-size="12" fill="#475569">@fe.correctness()</text>
      <text x="80" y="76" text-anchor="middle" font-size="11" fill="#94a3b8">Context Setup</text>
    </g>

    <line x1="360" y1="45" x2="400" y2="45" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(400, 0)" filter="url(#shadow)">
      <rect width="160" height="90" rx="12" fill="white" stroke="#ddd6fe" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#f5f3ff"/>
      <rect y="20" width="160" height="12" fill="#f5f3ff"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">Test Execution</text>
      <text x="80" y="58" text-anchor="middle" font-size="12" fill="#475569">Your Agent Runs</text>
      <text x="80" y="76" text-anchor="middle" font-size="11" fill="#94a3b8">Input/Output Generation</text>
    </g>

    <line x1="560" y1="45" x2="600" y2="45" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(600, 0)" filter="url(#shadow)">
      <rect width="160" height="90" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#eef2ff"/>
      <rect y="20" width="160" height="12" fill="#eef2ff"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">fe.score()</text>
      <text x="80" y="58" text-anchor="middle" font-size="12" fill="#475569">Records data</text>
      <text x="80" y="76" text-anchor="middle" font-size="11" fill="#94a3b8">Post-Run Hook</text>
    </g>
  </g>

  <line x1="750" y1="200" x2="750" y2="230" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <g transform="translate(150, 230)" filter="url(#shadow)">
    <rect width="600" height="110" rx="12" fill="white" stroke="#86efac" stroke-width="2"/>
    <rect width="600" height="40" rx="12" fill="#ecfdf5"/>
    <rect y="30" width="600" height="10" fill="#ecfdf5"/>
    <text x="300" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Metrics Evaluation (LLM Judge)</text>
    
    <g transform="translate(25, 55)">
      <rect width="100" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="50" y="25" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">correctness</text>
      
      <rect x="112" width="100" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="162" y="25" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">relevance</text>
      
      <rect x="224" width="100" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="274" y="25" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">toxicity</text>
      
      <rect x="336" width="100" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="386" y="25" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">hallucination</text>
      
      <rect x="448" width="100" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="498" y="25" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">custom...</text>
    </g>
  </g>

  <g fill="none" stroke="#cbd5e1" stroke-width="2">
    <path d="M 450 340 L 450 370 L 270 370 L 270 395" marker-end="url(#arrowhead)"/>
    <path d="M 450 370 L 630 370 L 630 395" marker-end="url(#arrowhead)"/>
  </g>
  <text x="360" y="365" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">ALL ≥ THRESHOLD</text>
  <text x="540" y="365" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">ANY &lt; THRESHOLD</text>

  <g transform="translate(190, 395)">
    <g filter="url(#shadow)">
      <rect width="160" height="50" rx="25" fill="white" stroke="#22c55e" stroke-width="2"/>
      <text x="80" y="31" text-anchor="middle" font-size="15" font-weight="800" fill="#16a34a">PASS</text>
    </g>
    <g transform="translate(360, 0)" filter="url(#shadow)">
      <rect width="160" height="50" rx="25" fill="white" stroke="#ef4444" stroke-width="2"/>
      <text x="80" y="31" text-anchor="middle" font-size="15" font-weight="800" fill="#dc2626">FAIL</text>
    </g>
  </g>

  <text x="450" y="508" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Seamless Pytest Integration • Architectural Standards 2026</text>
</svg>
