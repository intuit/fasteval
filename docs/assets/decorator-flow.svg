<svg viewBox="0 0 800 385" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="pytestGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
    <linearGradient id="decorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="runGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="feScoreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="metricsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="passGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="failGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="shadowDec" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowDec" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="385" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Decorator Execution Flow</text>
  
  <!-- Row 1: 4 boxes evenly spaced -->
  <!-- Step 1: Pytest Discovers -->
  <g filter="url(#shadowDec)">
    <rect x="40" y="60" width="150" height="75" rx="12" fill="url(#pytestGrad)"/>
    <text x="115" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="white">pytest discovers</text>
    <text x="115" y="106" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">test_*.py functions</text>
    <text x="115" y="122" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.6)">collection phase</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="190" y1="97" x2="230" y2="97" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDec)"/>
  
  <!-- Step 2: Decorators Register -->
  <g filter="url(#shadowDec)">
    <rect x="240" y="60" width="150" height="75" rx="12" fill="url(#decorGrad)"/>
    <text x="315" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="white">Decorators register</text>
    <text x="315" y="106" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">metrics to context</text>
    <text x="315" y="122" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.6)">@fe.correctness()</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="390" y1="97" x2="430" y2="97" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDec)"/>
  
  <!-- Step 3: Test Runs -->
  <g filter="url(#shadowDec)">
    <rect x="440" y="60" width="150" height="75" rx="12" fill="url(#runGrad)"/>
    <text x="515" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="white">Test function runs</text>
    <text x="515" y="106" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">calls your LLM</text>
    <text x="515" y="122" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.6)">my_agent("...")</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="590" y1="97" x2="630" y2="97" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDec)"/>
  
  <!-- Step 4: fe.score() -->
  <g filter="url(#shadowDec)">
    <rect x="640" y="60" width="130" height="75" rx="12" fill="url(#feScoreGrad)"/>
    <text x="705" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="white">fe.score()</text>
    <text x="705" y="106" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">records outputs</text>
    <text x="705" y="122" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.6)">actual, expected</text>
  </g>
  
  <!-- Arrow down from fe.score -->
  <line x1="705" y1="135" x2="705" y2="165" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDec)"/>
  
  <!-- Step 5: Metrics Evaluate (wide box) -->
  <g filter="url(#shadowDec)">
    <rect x="150" y="175" width="600" height="95" rx="12" fill="url(#metricsGrad)"/>
    <text x="450" y="202" text-anchor="middle" font-size="13" font-weight="600" fill="white">Metrics Evaluate (LLM Judge)</text>
    
    <!-- Metric boxes inside -->
    <rect x="180" y="215" width="90" height="35" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="225" y="237" text-anchor="middle" font-size="10" fill="white">correctness</text>
    
    <rect x="290" y="215" width="90" height="35" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="335" y="237" text-anchor="middle" font-size="10" fill="white">relevance</text>
    
    <rect x="400" y="215" width="90" height="35" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="445" y="237" text-anchor="middle" font-size="10" fill="white">toxicity</text>
    
    <rect x="510" y="215" width="90" height="35" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="555" y="237" text-anchor="middle" font-size="10" fill="white">hallucination</text>
    
    <rect x="620" y="215" width="90" height="35" rx="6" fill="rgba(255,255,255,0.2)"/>
    <text x="665" y="237" text-anchor="middle" font-size="10" fill="white">...</text>
  </g>
  
  <!-- Arrow down and split -->
  <line x1="450" y1="270" x2="450" y2="295" stroke="#64748b" stroke-width="2"/>
  
  <!-- Horizontal split line -->
  <line x1="250" y1="295" x2="650" y2="295" stroke="#64748b" stroke-width="2"/>
  
  <!-- Left branch (Pass) -->
  <line x1="250" y1="295" x2="250" y2="315" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDec)"/>
  <text x="210" y="310" font-size="9" fill="#64748b">all ≥ threshold</text>
  
  <!-- Right branch (Fail) -->
  <line x1="650" y1="295" x2="650" y2="315" stroke="#64748b" stroke-width="2" marker-end="url(#arrowDec)"/>
  <text x="665" y="310" font-size="9" fill="#64748b">any &lt; threshold</text>
  
  <!-- Pass Result -->
  <g filter="url(#shadowDec)">
    <rect x="180" y="325" width="140" height="35" rx="17" fill="url(#passGrad)"/>
    <text x="250" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="white">PASS ✓</text>
  </g>
  
  <!-- Fail Result -->
  <g filter="url(#shadowDec)">
    <rect x="580" y="325" width="140" height="35" rx="17" fill="url(#failGrad)"/>
    <text x="650" y="348" text-anchor="middle" font-size="13" font-weight="700" fill="white">FAIL ✗</text>
  </g>
  
  <!-- Footer -->
  <text x="400" y="375" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Seamless pytest integration</text>
</svg>
