<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="900" height="420" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Provider Ecosystem</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Configurable backends for LLM-as-a-Judge evaluation</text>

  <g stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8 4" fill="none">
    <path d="M 450 200 L 220 120"/>
    <path d="M 450 200 L 220 280"/>
    <path d="M 450 200 L 680 120"/>
    <path d="M 450 200 L 680 280"/>
  </g>

  <g transform="translate(450, 200)" filter="url(#shadow)">
    <circle r="60" fill="#4f46e5"/>
    <text y="-5" text-anchor="middle" font-size="16" font-weight="800" fill="white">fasteval</text>
    <text y="15" text-anchor="middle" font-size="11" font-weight="600" fill="#c7d2fe">EVAL HUB</text>
  </g>

  <g transform="translate(60, 80)" filter="url(#shadow)">
    <rect width="160" height="80" rx="12" fill="white" stroke="#10b981" stroke-width="1.5"/>
    <rect width="160" height="30" rx="12" fill="#ecfdf5"/>
    <rect y="20" width="160" height="10" fill="#ecfdf5"/>
    <text x="80" y="19" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">OpenAI</text>
    <text x="80" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">GPT-4o, 4o-mini</text>
    <text x="80" y="65" text-anchor="middle" font-size="10" fill="#64748b">Primary choice for judges</text>
  </g>

  <g transform="translate(60, 240)" filter="url(#shadow)">
    <rect width="160" height="80" rx="12" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
    <rect width="160" height="30" rx="12" fill="#fffbeb"/>
    <rect y="20" width="160" height="10" fill="#fffbeb"/>
    <text x="80" y="19" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Anthropic</text>
    <text x="80" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Claude 3.5 Sonnet</text>
    <text x="80" y="65" text-anchor="middle" font-size="10" fill="#64748b">Deep reasoning capabilities</text>
  </g>

  <g transform="translate(680, 80)" filter="url(#shadow)">
    <rect width="160" height="80" rx="12" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <rect width="160" height="30" rx="12" fill="#eff6ff"/>
    <rect y="20" width="160" height="10" fill="#eff6ff"/>
    <text x="80" y="19" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Azure OpenAI</text>
    <text x="80" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Enterprise Ready</text>
    <text x="80" y="65" text-anchor="middle" font-size="10" fill="#64748b">VPC &amp; Compliance focused</text>
  </g>

  <g transform="translate(680, 240)" filter="url(#shadow)">
    <rect width="160" height="80" rx="12" fill="white" stroke="#64748b" stroke-width="1.5"/>
    <rect width="160" height="30" rx="12" fill="#f1f5f9"/>
    <rect y="20" width="160" height="10" fill="#f1f5f9"/>
    <text x="80" y="19" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">Ollama</text>
    <text x="80" y="50" text-anchor="middle" font-size="11" font-weight="600" fill="#1e293b">Local LLMs</text>
    <text x="80" y="65" text-anchor="middle" font-size="10" fill="#64748b">Private, zero-cost eval</text>
  </g>

  <g transform="translate(150, 360)">
    <rect width="600" height="40" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="300" y="25" text-anchor="middle" font-size="11" fill="#475569">
      <tspan font-weight="700" fill="#1e293b">Quick Selection:</tspan> 
      Dev: <tspan fill="#10b981" font-weight="700">gpt-4o-mini</tspan> | 
      Prod: <tspan fill="#10b981" font-weight="700">gpt-4o</tspan> | 
      Private: <tspan fill="#64748b" font-weight="700">Llama-3 (Ollama)</tspan>
    </text>
  </g>

  <text x="450" y="412" text-anchor="middle" font-size="11" fill="#94a3b8">FastEval Documentation • Provider Standards 2026</text>
</svg>
