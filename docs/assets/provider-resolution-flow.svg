<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10b981"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Provider Resolution Flow</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Hierarchy of logic fasteval uses to select an LLM judge</text>

  <line x1="80" y1="100" x2="80" y2="500" stroke="#e2e8f0" stroke-width="4" stroke-linecap="round"/>
  <text x="65" y="300" text-anchor="middle" font-size="11" font-weight="800" fill="#94a3b8" transform="rotate(-90 65 300)">RESOLUTION PRIORITY</text>

  <g transform="translate(280, 100)">
    <path d="M 120 0 L 240 45 L 120 90 L 0 45 Z" fill="#f59e0b" filter="url(#shadow)"/>
    <text x="120" y="40" text-anchor="middle" font-size="12" font-weight="700" fill="white">PER-METRIC LLM=</text>
    <text x="120" y="55" text-anchor="middle" font-size="11" fill="white" opacity="0.9">PARAMETER SET?</text>
    <text x="-30" y="48" text-anchor="end" font-size="11" font-weight="700" fill="#4f46e5">PRIORITY 1</text>
    
    <line x1="240" y1="45" x2="310" y2="45" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead-green)"/>
    <text x="275" y="38" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">YES</text>
    <g transform="translate(310, 15)" filter="url(#shadow)">
      <rect width="220" height="60" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
      <text x="110" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">Use Custom Client</text>
      <text x="110" y="46" text-anchor="middle" font-size="11" font-family="monospace" fill="#059669">@fe.metric(llm=client)</text>
    </g>
    
    <line x1="120" y1="90" x2="120" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g transform="translate(280, 220)">
    <path d="M 120 0 L 240 45 L 120 90 L 0 45 Z" fill="#f59e0b" filter="url(#shadow)"/>
    <text x="120" y="40" text-anchor="middle" font-size="12" font-weight="700" fill="white">PER-METRIC MODEL=</text>
    <text x="120" y="55" text-anchor="middle" font-size="11" fill="white" opacity="0.9">PARAMETER SET?</text>
    <text x="-30" y="48" text-anchor="end" font-size="11" font-weight="700" fill="#7c3aed">PRIORITY 2</text>

    <line x1="240" y1="45" x2="310" y2="45" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead-green)"/>
    <g transform="translate(310, 15)" filter="url(#shadow)">
      <rect width="220" height="60" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
      <text x="110" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">Use Specific Model</text>
      <text x="110" y="46" text-anchor="middle" font-size="11" font-family="monospace" fill="#059669">model="gpt-4o-mini"</text>
    </g>

    <line x1="120" y1="90" x2="120" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g transform="translate(280, 340)">
    <path d="M 120 0 L 240 45 L 120 90 L 0 45 Z" fill="#f59e0b" filter="url(#shadow)"/>
    <text x="120" y="40" text-anchor="middle" font-size="12" font-weight="700" fill="white">GLOBAL PROVIDER</text>
    <text x="120" y="55" text-anchor="middle" font-size="11" fill="white" opacity="0.9">CONFIGURED?</text>
    <text x="-30" y="48" text-anchor="end" font-size="11" font-weight="700" fill="#2563eb">PRIORITY 3</text>

    <line x1="240" y1="45" x2="310" y2="45" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead-green)"/>
    <g transform="translate(310, 15)" filter="url(#shadow)">
      <rect width="220" height="60" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
      <text x="110" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">Use Global Setting</text>
      <text x="110" y="46" text-anchor="middle" font-size="11" font-family="monospace" fill="#059669">fe.set_default_provider()</text>
    </g>

    <line x1="120" y1="90" x2="120" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g transform="translate(280, 460)">
    <path d="M 120 0 L 240 45 L 120 90 L 0 45 Z" fill="#f59e0b" filter="url(#shadow)"/>
    <text x="120" y="40" text-anchor="middle" font-size="12" font-weight="700" fill="white">ENV API KEY</text>
    <text x="120" y="55" text-anchor="middle" font-size="11" fill="white" opacity="0.9">DETECTED?</text>
    <text x="-30" y="48" text-anchor="end" font-size="11" font-weight="700" fill="#475569">PRIORITY 4</text>

    <line x1="240" y1="45" x2="310" y2="45" stroke="#10b981" stroke-width="2" marker-end="url(#arrowhead-green)"/>
    <g transform="translate(310, 15)" filter="url(#shadow)">
      <rect width="220" height="60" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
      <text x="110" y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">Auto-Detect Provider</text>
      <text x="110" y="46" text-anchor="middle" font-size="10" fill="#059669">OPENAI_API_KEY / ANTHROPIC_...</text>
    </g>

    <path d="M 120 90 L 120 125 L 310 125" fill="none" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="130" y="115" font-size="11" font-weight="700" fill="#dc2626">NO</text>
    
    <g transform="translate(310, 95)" filter="url(#shadow)">
      <rect width="220" height="60" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
      <text x="110" y="28" text-anchor="middle" font-size="13" font-weight="800" fill="#991b1b">CONFIGURATION ERROR</text>
      <text x="110" y="46" text-anchor="middle" font-size="11" fill="#b91c1c">No valid provider found</text>
    </g>
  </g>

  <text x="450" y="608" text-anchor="middle" font-size="11" fill="#94a3b8">FastEval Documentation • Architectural Resolution Standards • 2026</text>
</svg>
