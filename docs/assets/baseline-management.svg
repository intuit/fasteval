<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Baseline Management Workflow</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Tracking and promoting prompt version baselines</text>

  <g transform="translate(50, 110)">
    
    <g transform="translate(0, 0)">
      <rect width="180" height="230" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="90" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">ARCHIVE</text>
      
      <g transform="translate(15, 45)">
        <rect width="150" height="45" rx="8" fill="white" stroke="#cbd5e1" filter="url(#shadow)"/>
        <text x="75" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b">v1.2</text>
        <text x="75" y="36" text-anchor="middle" font-size="11" fill="#94a3b8">Score: 0.83</text>
      </g>
      <g transform="translate(15, 105)">
        <rect width="150" height="45" rx="8" fill="white" stroke="#cbd5e1" filter="url(#shadow)"/>
        <text x="75" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b">v1.1</text>
        <text x="75" y="36" text-anchor="middle" font-size="11" fill="#94a3b8">Score: 0.84</text>
      </g>
      <g transform="translate(15, 165)">
        <rect width="150" height="45" rx="8" fill="white" stroke="#cbd5e1" filter="url(#shadow)"/>
        <text x="75" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b">v1.0</text>
        <text x="75" y="36" text-anchor="middle" font-size="11" fill="#94a3b8">Score: 0.82</text>
      </g>
    </g>

    <g transform="translate(260, 0)">
      <rect width="220" height="160" rx="12" fill="white" stroke="#86efac" stroke-width="2" filter="url(#shadow)"/>
      <rect width="220" height="40" rx="12" fill="#ecfdf5"/>
      <rect y="30" width="220" height="10" fill="#ecfdf5"/>
      <text x="110" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">PRODUCTION</text>
      
      <text x="110" y="75" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">v2.0</text>
      <text x="110" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#059669">Score: 0.85</text>
      <text x="110" y="125" text-anchor="middle" font-size="12" fill="#64748b">production.json</text>
      <text x="110" y="142" text-anchor="middle" font-size="11" fill="#94a3b8">Active Baseline</text>

      <line x1="0" y1="115" x2="-80" y2="115" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
      <text x="-40" y="105" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">archive</text>
    </g>

    <g transform="translate(580, 0)">
      <rect width="220" height="160" rx="12" fill="white" stroke="#c7d2fe" stroke-width="2" filter="url(#shadow)"/>
      <rect width="220" height="40" rx="12" fill="#f5f3ff"/>
      <rect y="30" width="220" height="10" fill="#f5f3ff"/>
      <text x="110" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#4f46e5">CANDIDATE</text>
      
      <text x="110" y="75" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">v2.1</text>
      <text x="110" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#7c3aed">Score: 0.87</text>
      <text x="110" y="125" text-anchor="middle" font-size="12" fill="#64748b">candidate.json</text>
      <text x="110" y="142" text-anchor="middle" font-size="11" fill="#8b5cf6">Δ +0.02</text>
    </g>

    <g transform="translate(380, 190)">
      <rect x="200" y="0" width="220" height="50" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="310" y="22" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">Compare vs Production</text>
      <text x="310" y="38" text-anchor="middle" font-size="11" fill="#d97706">Regression Testing</text>

      <line x1="310" y1="-30" x2="310" y2="0" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <path d="M 200 25 L -10 25 L -10 -30" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowhead-green)"/>
      <text x="95" y="15" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">promote_to_production()</text>
    </g>
  </g>

  <g transform="translate(50, 400)">
    <rect width="800" height="45" rx="22.5" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    
    <g transform="translate(30, 23)">
      <circle r="10" fill="#8b5cf6"/>
      <text text-anchor="middle" y="4" font-size="11" font-weight="700" fill="white">1</text>
      <text x="15" y="4" font-size="12" fill="#475569">Create candidate</text>
    </g>

    <g transform="translate(230, 23)">
      <circle r="10" fill="#f59e0b"/>
      <text text-anchor="middle" y="4" font-size="11" font-weight="700" fill="white">2</text>
      <text x="15" y="4" font-size="12" fill="#475569">Run regression</text>
    </g>

    <g transform="translate(430, 23)">
      <circle r="10" fill="#10b981"/>
      <text text-anchor="middle" y="4" font-size="11" font-weight="700" fill="white">3</text>
      <text x="15" y="4" font-size="12" fill="#475569">Promote to Prod</text>
    </g>

    <g transform="translate(630, 23)">
      <circle r="10" fill="#94a3b8"/>
      <text text-anchor="middle" y="4" font-size="11" font-weight="700" fill="white">4</text>
      <text x="15" y="4" font-size="12" fill="#475569">Archive previous</text>
    </g>
  </g>

  <text x="450" y="468" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Baseline Version Management • 2026 Architectural Standard</text>
</svg>
