<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="540" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Agent Tool Trajectory Evaluation</text>
  <text x="450" y="68" text-anchor="middle" font-size="14" fill="#64748b">Analyzing sequential tool-calling logic and argument precision</text>

  <g transform="translate(50, 110)">
    <g filter="url(#shadow)">
      <rect width="240" height="160" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
      <rect width="240" height="40" rx="12" fill="#eff6ff"/>
      <rect y="30" width="240" height="10" fill="#eff6ff"/>
      <text x="120" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#4f46e5">LangGraph Agent</text>
      
      <text x="120" y="75" text-anchor="middle" font-size="12" fill="#475569">Receives user query</text>
      <text x="120" y="93" text-anchor="middle" font-size="12" fill="#475569">Decides tool trajectory</text>
      <path d="M 80 120 L 160 120" stroke="#e2e8f0" stroke-width="1"/>
      <text x="120" y="140" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">PLANNING PHASE</text>
    </g>

    <line x1="240" y1="80" x2="280" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(280, 0)" filter="url(#shadow)">
      <rect width="240" height="160" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="120" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">Tool Trajectory</text>
      
      <rect x="15" y="45" width="210" height="100" rx="8" fill="#0f172a"/>
      <text x="30" y="70" font-family="monospace" font-size="12" fill="#a78bfa">search_web<tspan fill="#f8fafc">(</tspan><tspan fill="#fbbf24">"..."</tspan><tspan fill="#f8fafc">)</tspan></text>
      <line x1="40" y1="85" x2="40" y2="105" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
      <text x="50" y="100" font-family="monospace" font-size="10" fill="#64748b">next</text>
      <text x="30" y="130" font-family="monospace" font-size="12" fill="#a78bfa">calculate<tspan fill="#f8fafc">(</tspan><tspan fill="#fbbf24">"15*8"</tspan><tspan fill="#f8fafc">)</tspan></text>
    </g>

    <line x1="520" y1="80" x2="560" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(560, 0)" filter="url(#shadow)">
      <rect width="240" height="160" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
      <rect width="240" height="40" rx="12" fill="#ecfdf5"/>
      <rect y="30" width="240" height="10" fill="#ecfdf5"/>
      <text x="120" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Evaluation Results</text>
      
      <g transform="translate(20, 55)">
        <text y="15" font-size="12" fill="#475569">Call Accuracy</text>
        <text x="200" y="15" text-anchor="end" font-size="13" font-weight="700" fill="#10b981">0.95</text>
        <rect y="25" width="200" height="4" rx="2" fill="#f1f5f9"/>
        <rect y="25" width="190" height="4" rx="2" fill="#10b981"/>

        <text y="50" font-size="12" fill="#475569">Sequence</text>
        <text x="200" y="50" text-anchor="end" font-size="13" font-weight="700" fill="#10b981">1.00</text>
        <rect y="60" width="200" height="4" rx="2" fill="#f1f5f9"/>
        <rect y="60" width="200" height="4" rx="2" fill="#10b981"/>

        <text y="85" font-size="12" fill="#475569">Args Match</text>
        <text x="200" y="85" text-anchor="end" font-size="13" font-weight="700" fill="#f59e0b">0.88</text>
        <rect y="95" width="200" height="4" rx="2" fill="#f1f5f9"/>
        <rect y="95" width="176" height="4" rx="2" fill="#f59e0b"/>
      </g>
    </g>
  </g>

  <text x="450" y="320" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">METRIC DEFINITIONS</text>

  <g transform="translate(50, 345)">
    <g filter="url(#shadow)">
      <rect width="240" height="130" rx="12" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="120" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Tool Call Accuracy</text>
      <text x="120" y="55" text-anchor="middle" font-size="12" fill="#64748b">Selection Validity</text>
      <text x="20" y="85" font-size="11" fill="#475569">Verifies if the agent selected</text>
      <text x="20" y="103" font-size="11" fill="#475569">the ground-truth tools required</text>
      <text x="20" y="121" font-size="11" fill="#475569">to resolve the specific intent.</text>
    </g>

    <g transform="translate(280, 0)" filter="url(#shadow)">
      <rect width="240" height="130" rx="12" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
      <text x="120" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">Tool Sequence</text>
      <text x="120" y="55" text-anchor="middle" font-size="12" fill="#64748b">Logical Flow</text>
      <text x="20" y="85" font-size="11" fill="#475569">Validates the order of calls.</text>
      <text x="20" y="103" font-size="11" fill="#475569">Essential for multi-step tasks</text>
      <text x="20" y="121" font-size="11" fill="#475569">(e.g., Search before Calculate).</text>
    </g>

    <g transform="translate(560, 0)" filter="url(#shadow)">
      <rect width="240" height="130" rx="12" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="120" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Tool Args Match</text>
      <text x="120" y="55" text-anchor="middle" font-size="12" fill="#64748b">Parameter Precision</text>
      <text x="20" y="85" font-size="11" fill="#475569">Deep-compares JSON arguments</text>
      <text x="20" y="103" font-size="11" fill="#475569">passed to tools against</text>
      <text x="20" y="121" font-size="11" fill="#475569">expected schema and values.</text>
    </g>
  </g>

  <text x="450" y="528" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Comprehensive Agent Evaluation • 2026 Standards</text>
</svg>
