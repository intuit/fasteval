<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Choosing Your Data Source</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Decision tree for selecting the right test data approach</text>

  <g filter="url(#shadow)">
    <path d="M 450 90 L 580 135 L 450 180 L 320 135 Z" fill="#f59e0b"/>
    <text x="450" y="130" text-anchor="middle" font-size="13" font-weight="700" fill="white">WHAT ARE YOU</text>
    <text x="450" y="148" text-anchor="middle" font-size="13" font-weight="700" fill="white">TESTING?</text>
  </g>

  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <path d="M 320 135 Q 150 135 150 210" marker-end="url(#arrowhead)"/>
    <path d="M 450 180 L 450 210" marker-end="url(#arrowhead)"/>
    <path d="M 580 135 Q 750 135 750 210" marker-end="url(#arrowhead)"/>
  </g>

  <g font-size="11" font-weight="600" fill="#64748b">
    <text x="200" y="125" text-anchor="middle">Golden Datasets</text>
    <text x="460" y="198">Multi-turn Dialogues</text>
    <text x="700" y="125" text-anchor="middle">Real User Traffic</text>
  </g>

  <g transform="translate(45, 210)" filter="url(#shadow)">
    <rect width="220" height="260" rx="12" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <rect width="220" height="45" rx="12" fill="#eff6ff"/>
    <rect y="30" width="220" height="15" fill="#eff6ff"/>
    <text x="110" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">CSV / JSON Files</text>
    <text x="110" y="65" text-anchor="middle" font-size="11" font-family="monospace" fill="#3b82f6">@fe.dataset("data.csv")</text>
    
    <g transform="translate(20, 90)">
      <text font-size="12" font-weight="700" fill="#1e293b">BEST FOR</text>
      <text y="20" font-size="11" fill="#475569">• Regression Testing</text>
      <text y="36" font-size="11" fill="#475569">• CI/CD Pipelines</text>
      
      <text y="65" font-size="12" font-weight="700" fill="#1e293b">PROS</text>
      <text y="85" font-size="11" fill="#059669">• Version Controlled</text>
      <text y="101" font-size="11" fill="#059669">• Highly Reproducible</text>
      
      <text y="130" font-size="12" font-weight="700" fill="#1e293b">VOLUME</text>
      <text y="150" font-size="11" fill="#475569">10 - 1,000+ Cases</text>
    </g>
  </g>

  <g transform="translate(340, 210)" filter="url(#shadow)">
    <rect width="220" height="260" rx="12" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
    <rect width="220" height="45" rx="12" fill="#f5f3ff"/>
    <rect y="30" width="220" height="15" fill="#f5f3ff"/>
    <text x="110" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">Conversations</text>
    <text x="110" y="65" text-anchor="middle" font-size="11" font-family="monospace" fill="#8b5cf6">@fe.conversation([...])</text>
    
    <g transform="translate(20, 90)">
      <text font-size="12" font-weight="700" fill="#1e293b">BEST FOR</text>
      <text y="20" font-size="11" fill="#475569">• Chatbot Interaction</text>
      <text y="36" font-size="11" fill="#475569">• Context Retention</text>
      
      <text y="65" font-size="12" font-weight="700" fill="#1e293b">PROS</text>
      <text y="85" font-size="11" fill="#059669">• Tests Agent Memory</text>
      <text y="101" font-size="11" fill="#059669">• Multi-turn Logic</text>
      
      <text y="130" font-size="12" font-weight="700" fill="#1e293b">TURNS</text>
      <text y="150" font-size="11" fill="#475569">2 - 20 Turns / Test</text>
    </g>
  </g>

  <g transform="translate(635, 210)" filter="url(#shadow)">
    <rect width="220" height="260" rx="12" fill="white" stroke="#10b981" stroke-width="1.5"/>
    <rect width="220" height="45" rx="12" fill="#ecfdf5"/>
    <rect y="30" width="220" height="15" fill="#ecfdf5"/>
    <text x="110" y="28" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">Production Traces</text>
    <text x="110" y="65" text-anchor="middle" font-size="11" font-family="monospace" fill="#10b981">@fe.traces(sample=0.1)</text>
    
    <g transform="translate(20, 90)">
      <text font-size="12" font-weight="700" fill="#1e293b">BEST FOR</text>
      <text y="20" font-size="11" fill="#475569">• Quality Monitoring</text>
      <text y="36" font-size="11" fill="#475569">• Finding Edge Cases</text>
      
      <text y="65" font-size="12" font-weight="700" fill="#1e293b">PROS</text>
      <text y="85" font-size="11" fill="#059669">• Real-world Intent</text>
      <text y="101" font-size="11" fill="#059669">• Detects User Drift</text>
      
      <text y="130" font-size="12" font-weight="700" fill="#1e293b">FREQUENCY</text>
      <text y="150" font-size="11" fill="#475569">Continuous Sampling</text>
    </g>
  </g>

  <text x="450" y="508" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Data Source Selection Guide • Architectural Standards 2026</text>
</svg>
