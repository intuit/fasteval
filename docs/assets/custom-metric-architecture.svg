<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Custom Metric Architecture</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Class hierarchy for building your own evaluation metrics</text>

  <g transform="translate(330, 110)" filter="url(#shadow)">
    <rect width="240" height="85" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect width="240" height="32" rx="12" fill="#eef2ff"/>
    <rect y="20" width="240" height="12" fill="#eef2ff"/>
    <text x="120" y="21" text-anchor="middle" font-size="14" font-weight="700" fill="#4f46e5">BaseMetric</text>
    <text x="120" y="55" text-anchor="middle" font-size="12" fill="#475569">Abstract Base Class</text>
    <text x="120" y="73" text-anchor="middle" font-size="11" fill="#94a3b8">name, threshold, weight</text>
  </g>

  <g fill="none" stroke="#94a3b8" stroke-width="2">
    <path d="M 450 195 L 450 210 L 270 210 L 270 225" marker-end="url(#arrowhead)"/>
    <path d="M 450 210 L 630 210 L 630 225" marker-end="url(#arrowhead)"/>
  </g>

  <g transform="translate(110, 225)">
    <g filter="url(#shadow)">
      <rect width="320" height="170" rx="12" fill="white" stroke="#f5f3ff" stroke-width="1.5"/>
      <rect width="320" height="35" rx="12" fill="#f5f3ff"/>
      <rect y="20" width="320" height="15" fill="#f5f3ff"/>
      <text x="160" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">BaseLLMMetric</text>
      
      <text x="20" y="60" font-size="13" font-weight="700" fill="#6d28d9">Implement:</text>
      <text x="20" y="78" font-size="12" font-family="monospace" fill="#475569">get_evaluation_prompt()</text>
      
      <rect x="20" y="95" width="280" height="60" rx="6" fill="#0f172a"/>
      <text x="35" y="115" font-size="11" font-weight="700" fill="#a78bfa">Characteristics:</text>
      <text x="35" y="133" font-size="11" fill="#f8fafc">• 1-3s per evaluation (LLM call)</text>
      <text x="35" y="148" font-size="11" fill="#f8fafc">• Semantic &amp; Complex Analysis</text>
    </g>

    <g transform="translate(360, 0)" filter="url(#shadow)">
      <rect width="320" height="170" rx="12" fill="white" stroke="#ecfdf5" stroke-width="1.5"/>
      <rect width="320" height="35" rx="12" fill="#ecfdf5"/>
      <rect y="20" width="320" height="15" fill="#ecfdf5"/>
      <text x="160" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">BaseDeterministicMetric</text>
      
      <text x="20" y="60" font-size="13" font-weight="700" fill="#047857">Implement:</text>
      <text x="20" y="78" font-size="12" font-family="monospace" fill="#475569">evaluate(eval_input)</text>
      
      <rect x="20" y="95" width="280" height="60" rx="6" fill="#0f172a"/>
      <text x="35" y="115" font-size="11" font-weight="700" fill="#10b981">Characteristics:</text>
      <text x="35" y="133" font-size="11" fill="#f8fafc">• Instant Execution (No LLM)</text>
      <text x="35" y="148" font-size="11" fill="#f8fafc">• RegEx &amp; Rule-based logic</text>
    </g>
  </g>

  <g fill="none" stroke="#94a3b8" stroke-width="2">
    <line x1="270" y1="395" x2="270" y2="425" marker-end="url(#arrowhead)"/>
    <line x1="630" y1="395" x2="630" y2="425" marker-end="url(#arrowhead)"/>
  </g>

  <g transform="translate(110, 425)">
    <g filter="url(#shadow)">
      <rect width="320" height="75" rx="12" fill="white" stroke="#fffbeb" stroke-width="2"/>
      <text x="160" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Custom LLM Metrics</text>
      <text x="160" y="52" text-anchor="middle" font-size="11" fill="#64748b">ToneMetric, MedicalAccuracyMetric</text>
    </g>

    <g transform="translate(360, 0)" filter="url(#shadow)">
      <rect width="320" height="75" rx="12" fill="white" stroke="#fffbeb" stroke-width="2"/>
      <text x="160" y="30" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Custom Deterministic Metrics</text>
      <text x="160" y="52" text-anchor="middle" font-size="11" fill="#64748b">KeywordsMetric, JSONSchemaMetric</text>
    </g>
  </g>

  <g transform="translate(370, 400)">
    <rect width="160" height="30" rx="8" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
    <text x="80" y="19" text-anchor="middle" font-size="11" font-family="monospace" fill="#475569">@fe.metric(MyMetric())</text>
  </g>

  <text x="450" y="548" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Custom Metric Class Hierarchy • Architectural Standards 2026</text>
</svg>
