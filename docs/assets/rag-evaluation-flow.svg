<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="retrievalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="generationGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="evalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="500" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">RAG Pipeline Evaluation</text>
  
  <!-- User Query -->
  <g filter="url(#shadow2)">
    <rect x="380" y="55" width="140" height="50" rx="25" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <text x="450" y="85" text-anchor="middle" font-size="13" font-weight="500" fill="#1e293b">User Query</text>
  </g>
  
  <!-- Arrow down -->
  <line x1="450" y1="105" x2="450" y2="135" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
  
  <!-- RETRIEVAL STAGE -->
  <g>
    <!-- Stage Container -->
    <rect x="50" y="145" width="380" height="160" rx="12" fill="#eff6ff" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="70" y="170" font-size="12" font-weight="600" fill="#1d4ed8" text-transform="uppercase" letter-spacing="1">Retrieval Stage</text>
    
    <!-- Vector Search -->
    <g filter="url(#shadow2)">
      <rect x="70" y="190" width="100" height="60" rx="8" fill="url(#retrievalGradient)"/>
      <text x="120" y="215" text-anchor="middle" font-size="11" font-weight="500" fill="white">Vector</text>
      <text x="120" y="230" text-anchor="middle" font-size="11" font-weight="500" fill="white">Search</text>
    </g>
    
    <!-- Arrow -->
    <line x1="170" y1="220" x2="195" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
    
    <!-- Top-K Results -->
    <g filter="url(#shadow2)">
      <rect x="205" y="190" width="100" height="60" rx="8" fill="url(#retrievalGradient)"/>
      <text x="255" y="215" text-anchor="middle" font-size="11" font-weight="500" fill="white">Top-K</text>
      <text x="255" y="230" text-anchor="middle" font-size="11" font-weight="500" fill="white">Results</text>
    </g>
    
    <!-- Arrow -->
    <line x1="305" y1="220" x2="325" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
    
    <!-- Retrieved Docs -->
    <g filter="url(#shadow2)">
      <rect x="335" y="190" width="80" height="60" rx="8" fill="white" stroke="#3b82f6" stroke-width="2"/>
      <text x="375" y="215" text-anchor="middle" font-size="10" font-weight="500" fill="#1d4ed8">Retrieved</text>
      <text x="375" y="228" text-anchor="middle" font-size="10" font-weight="500" fill="#1d4ed8">Docs</text>
    </g>
    
    <!-- Retrieval Metrics -->
    <g>
      <text x="70" y="275" font-size="10" font-weight="600" fill="#1d4ed8">Evaluate with:</text>
      <text x="70" y="290" font-size="9" fill="#64748b">• contextual_precision</text>
      <text x="180" y="290" font-size="9" fill="#64748b">• contextual_recall</text>
    </g>
  </g>
  
  <!-- Arrow to Generation -->
  <path d="M 375 250 L 375 300 L 500 300 L 500 330" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
  
  <!-- GENERATION STAGE -->
  <g>
    <!-- Stage Container -->
    <rect x="470" y="145" width="380" height="160" rx="12" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="490" y="170" font-size="12" font-weight="600" fill="#6d28d9" text-transform="uppercase" letter-spacing="1">Generation Stage</text>
    
    <!-- Query + Context -->
    <g filter="url(#shadow2)">
      <rect x="490" y="190" width="100" height="60" rx="8" fill="url(#generationGradient)"/>
      <text x="540" y="215" text-anchor="middle" font-size="11" font-weight="500" fill="white">Query +</text>
      <text x="540" y="230" text-anchor="middle" font-size="11" font-weight="500" fill="white">Context</text>
    </g>
    
    <!-- Arrow -->
    <line x1="590" y1="220" x2="620" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
    
    <!-- LLM -->
    <g filter="url(#shadow2)">
      <rect x="630" y="190" width="100" height="60" rx="8" fill="url(#generationGradient)"/>
      <text x="680" y="215" text-anchor="middle" font-size="11" font-weight="500" fill="white">LLM</text>
      <text x="680" y="230" text-anchor="middle" font-size="11" font-weight="500" fill="white">Generation</text>
    </g>
    
    <!-- Arrow -->
    <line x1="730" y1="220" x2="755" y2="220" stroke="#64748b" stroke-width="2" marker-end="url(#arrow2)"/>
    
    <!-- Response -->
    <g filter="url(#shadow2)">
      <rect x="765" y="190" width="70" height="60" rx="8" fill="white" stroke="#8b5cf6" stroke-width="2"/>
      <text x="800" y="225" text-anchor="middle" font-size="10" font-weight="500" fill="#6d28d9">Response</text>
    </g>
    
    <!-- Generation Metrics -->
    <g>
      <text x="490" y="275" font-size="10" font-weight="600" fill="#6d28d9">Evaluate with:</text>
      <text x="490" y="290" font-size="9" fill="#64748b">• faithfulness</text>
      <text x="580" y="290" font-size="9" fill="#64748b">• answer_correctness</text>
    </g>
  </g>
  
  <!-- EVALUATION RESULTS -->
  <g>
    <rect x="200" y="340" width="500" height="120" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="450" y="365" text-anchor="middle" font-size="14" font-weight="600" fill="#059669">Evaluation Results</text>
    
    <!-- Metrics Grid -->
    <g>
      <!-- Precision -->
      <rect x="230" y="380" width="100" height="60" rx="6" fill="white" stroke="#d1fae5" stroke-width="1"/>
      <text x="280" y="400" text-anchor="middle" font-size="9" fill="#64748b">Precision</text>
      <text x="280" y="425" text-anchor="middle" font-size="18" font-weight="700" fill="#10b981">0.85</text>
      
      <!-- Recall -->
      <rect x="350" y="380" width="100" height="60" rx="6" fill="white" stroke="#d1fae5" stroke-width="1"/>
      <text x="400" y="400" text-anchor="middle" font-size="9" fill="#64748b">Recall</text>
      <text x="400" y="425" text-anchor="middle" font-size="18" font-weight="700" fill="#10b981">0.78</text>
      
      <!-- Faithfulness -->
      <rect x="470" y="380" width="100" height="60" rx="6" fill="white" stroke="#d1fae5" stroke-width="1"/>
      <text x="520" y="400" text-anchor="middle" font-size="9" fill="#64748b">Faithfulness</text>
      <text x="520" y="425" text-anchor="middle" font-size="18" font-weight="700" fill="#10b981">0.92</text>
      
      <!-- Correctness -->
      <rect x="590" y="380" width="100" height="60" rx="6" fill="white" stroke="#d1fae5" stroke-width="1"/>
      <text x="640" y="400" text-anchor="middle" font-size="9" fill="#64748b">Correctness</text>
      <text x="640" y="425" text-anchor="middle" font-size="18" font-weight="700" fill="#10b981">0.88</text>
    </g>
  </g>
  
  <!-- Footer -->
  <text x="450" y="485" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • RAG Pipeline Evaluation</text>
</svg>
