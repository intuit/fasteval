<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="550" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">RAG Pipeline Evaluation</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Mapping specialized metrics to the retrieval and generation lifecycles</text>

  <g transform="translate(370, 95)" filter="url(#shadow)">
    <rect width="160" height="45" rx="22.5" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <text x="80" y="27" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">USER QUERY</text>
  </g>

  <path d="M 450 140 L 450 165 L 240 165 L 240 185" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 450 165 L 660 165 L 660 185" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <g transform="translate(40, 185)">
    <rect width="400" height="170" rx="12" fill="white" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6 4" filter="url(#shadow)"/>
    <rect width="400" height="35" rx="12" fill="#eff6ff"/>
    <rect y="25" width="400" height="10" fill="#eff6ff"/>
    <text x="20" y="23" font-size="12" font-weight="700" fill="#1d4ed8" letter-spacing="0.5">RETRIEVAL STAGE</text>
    
    <g transform="translate(20, 55)">
      <rect width="110" height="50" rx="8" fill="#2563eb"/>
      <text x="55" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="white">Vector Search</text>
      
      <line x1="110" y1="25" x2="135" y2="25" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <rect x="135" width="110" height="50" rx="8" fill="#2563eb"/>
      <text x="190" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="white">Top-K Docs</text>

      <line x1="245" y1="25" x2="270" y2="25" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

      <rect x="270" width="90" height="50" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
      <text x="315" y="30" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">Context</text>
    </g>

    <text x="20" y="135" font-size="12" font-weight="700" fill="#1d4ed8">RETRIEVAL METRICS:</text>
    <text x="20" y="153" font-size="11" font-family="monospace" fill="#475569">@fe.contextual_precision • @fe.contextual_recall</text>
  </g>

  <g transform="translate(460, 185)">
    <rect width="400" height="170" rx="12" fill="white" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 4" filter="url(#shadow)"/>
    <rect width="400" height="35" rx="12" fill="#f5f3ff"/>
    <rect y="25" width="400" height="10" fill="#f5f3ff"/>
    <text x="20" y="23" font-size="12" font-weight="700" fill="#6d28d9" letter-spacing="0.5">GENERATION STAGE</text>
    
    <g transform="translate(20, 55)">
      <rect width="110" height="50" rx="8" fill="#7c3aed"/>
      <text x="55" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="white">Prompting</text>
      
      <line x1="110" y1="25" x2="135" y2="25" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
      
      <rect x="135" width="110" height="50" rx="8" fill="#7c3aed"/>
      <text x="190" y="30" text-anchor="middle" font-size="11" font-weight="700" fill="white">LLM Generation</text>

      <line x1="245" y1="25" x2="270" y2="25" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

      <rect x="270" width="90" height="50" rx="8" fill="white" stroke="#7c3aed" stroke-width="1.5"/>
      <text x="315" y="30" text-anchor="middle" font-size="10" font-weight="700" fill="#6d28d9">Response</text>
    </g>

    <text x="20" y="135" font-size="12" font-weight="700" fill="#6d28d9">GENERATION METRICS:</text>
    <text x="20" y="153" font-size="11" font-family="monospace" fill="#475569">@fe.faithfulness • @fe.answer_correctness</text>
  </g>

  <g transform="translate(150, 385)" filter="url(#shadow)">
    <rect width="600" height="120" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
    <rect width="600" height="35" rx="12" fill="#ecfdf5"/>
    <rect y="25" width="600" height="10" fill="#ecfdf5"/>
    <text x="300" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">EVALUATION SUMMARY</text>
    
    <g transform="translate(30, 55)">
      <rect width="125" height="45" rx="8" fill="#f8fafc" stroke="#d1fae5"/>
      <text x="62.5" y="18" text-anchor="middle" font-size="10" fill="#64748b">PRECISION</text>
      <text x="62.5" y="38" text-anchor="middle" font-size="16" font-weight="800" fill="#059669">0.85</text>

      <rect x="140" width="125" height="45" rx="8" fill="#f8fafc" stroke="#d1fae5"/>
      <text x="202.5" y="18" text-anchor="middle" font-size="10" fill="#64748b">RECALL</text>
      <text x="202.5" y="38" text-anchor="middle" font-size="16" font-weight="800" fill="#059669">0.78</text>

      <rect x="280" width="125" height="45" rx="8" fill="#f8fafc" stroke="#d1fae5"/>
      <text x="342.5" y="18" text-anchor="middle" font-size="10" fill="#64748b">FAITHFULNESS</text>
      <text x="342.5" y="38" text-anchor="middle" font-size="16" font-weight="800" fill="#059669">0.92</text>

      <rect x="420" width="125" height="45" rx="8" fill="#f8fafc" stroke="#d1fae5"/>
      <text x="482.5" y="18" text-anchor="middle" font-size="10" fill="#64748b">CORRECTNESS</text>
      <text x="482.5" y="38" text-anchor="middle" font-size="16" font-weight="800" fill="#059669">0.88</text>
    </g>
  </g>

  <text x="450" y="538" text-anchor="middle" font-size="11" fill="#94a3b8">FastEval Documentation • RAG Architectural Standards • 2026</text>
</svg>
