<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">CI/CD Integration Architecture</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Automated evaluation in your deployment pipeline</text>

  <g transform="translate(50, 110)">
    <g filter="url(#shadow)">
      <rect width="140" height="90" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect width="140" height="32" rx="12" fill="#f1f5f9"/>
      <rect y="20" width="140" height="12" fill="#f1f5f9"/>
      <text x="70" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Git Push</text>
      <text x="70" y="58" text-anchor="middle" font-size="12" fill="#475569">PR / main</text>
      <text x="70" y="76" text-anchor="middle" font-size="11" fill="#94a3b8">Source Event</text>
    </g>

    <line x1="140" y1="45" x2="180" y2="45" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(180, 0)" filter="url(#shadow)">
      <rect width="140" height="90" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect width="140" height="32" rx="12" fill="#eff6ff"/>
      <rect y="20" width="140" height="12" fill="#eff6ff"/>
      <text x="70" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">CI Trigger</text>
      <text x="70" y="58" text-anchor="middle" font-size="12" fill="#475569">GitHub Actions</text>
      <text x="70" y="76" text-anchor="middle" font-size="11" fill="#94a3b8">Workflow Start</text>
    </g>

    <line x1="320" y1="45" x2="360" y2="45" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(360, 0)" filter="url(#shadow)">
      <rect width="140" height="90" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect width="140" height="32" rx="12" fill="#f5f3ff"/>
      <rect y="20" width="140" height="12" fill="#f5f3ff"/>
      <text x="70" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">Run Tests</text>
      <text x="70" y="58" text-anchor="middle" font-size="12" fill="#475569">pytest fasteval</text>
      <text x="70" y="76" text-anchor="middle" font-size="11" fill="#94a3b8">Test Execution</text>
    </g>

    <line x1="500" y1="45" x2="540" y2="45" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(540, 0)" filter="url(#shadow)">
      <rect width="260" height="90" rx="12" fill="white" stroke="#fde68a" stroke-width="2"/>
      <rect width="260" height="32" rx="12" fill="#fffbeb"/>
      <rect y="20" width="260" height="12" fill="#fffbeb"/>
      <text x="130" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">LLM Evaluation</text>
      <text x="130" y="58" text-anchor="middle" font-size="12" fill="#475569">Agent Quality Metrics</text>
      <text x="130" y="76" text-anchor="middle" font-size="11" fill="#d97706">Trajectory &amp; Accuracy Analysis</text>
    </g>
  </g>

  <path d="M 720 200 L 720 230 L 400 230 L 400 250" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 720 230 L 790 230 L 790 250" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)"/>

  <g transform="translate(320, 250)">
    <g filter="url(#shadow)">
      <rect width="160" height="85" rx="12" fill="white" stroke="#86efac" stroke-width="2"/>
      <rect width="160" height="30" rx="12" fill="#ecfdf5"/>
      <rect y="20" width="160" height="10" fill="#ecfdf5"/>
      <text x="80" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="#047857">Merge OK</text>
      <text x="80" y="50" text-anchor="middle" font-size="11" fill="#475569">All metrics pass</text>
      <text x="80" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">AUTO-APPROVE</text>
    </g>

    <g transform="translate(390, 0)" filter="url(#shadow)">
      <rect width="160" height="85" rx="12" fill="white" stroke="#fecaca" stroke-width="2"/>
      <rect width="160" height="30" rx="12" fill="#fef2f2"/>
      <rect y="20" width="160" height="10" fill="#fef2f2"/>
      <text x="80" y="19" text-anchor="middle" font-size="12" font-weight="700" fill="#991b1b">Block PR</text>
      <text x="80" y="50" text-anchor="middle" font-size="11" fill="#475569">Quality regression</text>
      <text x="80" y="68" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">REQUIRE FIXES</text>
    </g>
  </g>

  <g transform="translate(50, 230)">
    <g filter="url(#shadow)">
      <rect width="180" height="105" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="20" y="25" font-size="13" font-weight="700" fill="#1e293b">CI PROVIDERS</text>
      <text x="20" y="48" font-size="12" fill="#64748b">• GitHub Actions</text>
      <text x="20" y="66" font-size="12" fill="#64748b">• GitLab CI / Jenkins</text>
      <text x="20" y="84" font-size="12" fill="#64748b">• CircleCI / Travis</text>
    </g>

    <g transform="translate(0, 120)" filter="url(#shadow)">
      <rect width="180" height="85" rx="12" fill="#eff6ff" stroke="#c7d2fe" stroke-width="1.5"/>
      <text x="20" y="25" font-size="13" font-weight="700" fill="#1d4ed8">TRIGGERS</text>
      <text x="20" y="48" font-size="12" fill="#475569">• Pull Requests</text>
      <text x="20" y="66" font-size="12" fill="#475569">• Nightly Builds</text>
    </g>
  </g>

  <g transform="translate(320, 360)">
    <rect width="550" height="50" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="20" y="30" font-size="13" font-weight="700" fill="#047857">NOTIFICATIONS</text>
    <text x="135" y="30" font-size="12" fill="#64748b">Slack Alerts • PR Comments • Dashboard Updates • Email Reports</text>
  </g>

  <text x="450" y="488" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Continuous LLM Quality Assurance • 2026</text>
</svg>
