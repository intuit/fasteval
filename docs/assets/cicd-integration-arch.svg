<svg viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="cicdGitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
    <linearGradient id="cicdCIGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="cicdTestGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="cicdEvalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="cicdPassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="cicdFailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="cicdNotifyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="cicdShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.12"/>
    </filter>
    <marker id="cicdArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="420" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">CI/CD Integration Architecture</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#64748b">Automated evaluation in your deployment pipeline</text>
  
  <!-- Step 1: Git Push -->
  <g filter="url(#cicdShadow)" transform="translate(30, 85)">
    <rect x="0" y="0" width="120" height="75" rx="10" fill="url(#cicdGitGrad)"/>
    <text x="60" y="30" text-anchor="middle" font-size="24" fill="white">🔀</text>
    <text x="60" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="white">Git Push</text>
    <text x="60" y="67" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">PR / main branch</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="150" y1="122" x2="185" y2="122" stroke="#64748b" stroke-width="2" marker-end="url(#cicdArrow)"/>
  
  <!-- Step 2: CI Trigger -->
  <g filter="url(#cicdShadow)" transform="translate(195, 85)">
    <rect x="0" y="0" width="120" height="75" rx="10" fill="url(#cicdCIGrad)"/>
    <text x="60" y="30" text-anchor="middle" font-size="24" fill="white">⚙️</text>
    <text x="60" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="white">CI Triggered</text>
    <text x="60" y="67" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">GitHub Actions</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="315" y1="122" x2="350" y2="122" stroke="#64748b" stroke-width="2" marker-end="url(#cicdArrow)"/>
  
  <!-- Step 3: Run Tests -->
  <g filter="url(#cicdShadow)" transform="translate(360, 85)">
    <rect x="0" y="0" width="120" height="75" rx="10" fill="url(#cicdTestGrad)"/>
    <text x="60" y="30" text-anchor="middle" font-size="24" fill="white">🧪</text>
    <text x="60" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="white">Run Tests</text>
    <text x="60" y="67" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">pytest fasteval</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="480" y1="122" x2="515" y2="122" stroke="#64748b" stroke-width="2" marker-end="url(#cicdArrow)"/>
  
  <!-- Step 4: LLM Evaluation -->
  <g filter="url(#cicdShadow)" transform="translate(525, 85)">
    <rect x="0" y="0" width="130" height="75" rx="10" fill="url(#cicdEvalGrad)"/>
    <text x="65" y="30" text-anchor="middle" font-size="24" fill="white">🤖</text>
    <text x="65" y="52" text-anchor="middle" font-size="11" font-weight="600" fill="white">LLM Evaluation</text>
    <text x="65" y="67" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.8)">Quality metrics</text>
  </g>
  
  <!-- Arrow down and split -->
  <line x1="590" y1="160" x2="590" y2="190" stroke="#64748b" stroke-width="2"/>
  <line x1="590" y1="190" x2="430" y2="190" stroke="#64748b" stroke-width="2"/>
  <line x1="590" y1="190" x2="750" y2="190" stroke="#64748b" stroke-width="2"/>
  
  <!-- Pass branch -->
  <line x1="430" y1="190" x2="430" y2="215" stroke="#22c55e" stroke-width="2" marker-end="url(#cicdArrow)"/>
  <text x="450" y="205" font-size="9" font-weight="600" fill="#22c55e">Pass</text>
  
  <!-- Fail branch -->
  <line x1="750" y1="190" x2="750" y2="215" stroke="#ef4444" stroke-width="2" marker-end="url(#cicdArrow)"/>
  <text x="730" y="205" font-size="9" font-weight="600" fill="#ef4444">Fail</text>
  
  <!-- Pass result -->
  <g filter="url(#cicdShadow)" transform="translate(360, 225)">
    <rect x="0" y="0" width="140" height="70" rx="10" fill="url(#cicdPassGrad)"/>
    <text x="70" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="white">Merge OK</text>
    <text x="70" y="50" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)">All metrics pass</text>
    <text x="70" y="63" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.75)">Auto-approve PR</text>
  </g>
  
  <!-- Fail result -->
  <g filter="url(#cicdShadow)" transform="translate(680, 225)">
    <rect x="0" y="0" width="140" height="70" rx="10" fill="url(#cicdFailGrad)"/>
    <text x="70" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="white">Block PR</text>
    <text x="70" y="50" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)">Quality regression</text>
    <text x="70" y="63" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.75)">Require fixes</text>
  </g>
  
  <!-- Notification arrows -->
  <line x1="430" y1="295" x2="430" y2="315" stroke="#64748b" stroke-width="2" marker-end="url(#cicdArrow)"/>
  <line x1="750" y1="295" x2="750" y2="315" stroke="#64748b" stroke-width="2" marker-end="url(#cicdArrow)"/>
  
  <!-- Notifications -->
  <g filter="url(#cicdShadow)" transform="translate(300, 325)">
    <rect x="0" y="0" width="400" height="55" rx="8" fill="url(#cicdNotifyGrad)"/>
    <text x="200" y="25" text-anchor="middle" font-size="12" font-weight="600" fill="white">📬 Notifications</text>
    <text x="200" y="45" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)">Slack alerts - PR comments - Dashboard updates - Email reports</text>
  </g>
  
  <!-- CI providers on left -->
  <g transform="translate(30, 195)">
    <rect x="0" y="0" width="150" height="95" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="75" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">CI Providers</text>
    <text x="15" y="40" font-size="9" fill="#64748b">- GitHub Actions</text>
    <text x="15" y="55" font-size="9" fill="#64748b">- GitLab CI</text>
    <text x="15" y="70" font-size="9" fill="#64748b">- Jenkins</text>
    <text x="15" y="85" font-size="9" fill="#64748b">- CircleCI</text>
  </g>
  
  <!-- Triggers on left bottom -->
  <g transform="translate(30, 305)">
    <rect x="0" y="0" width="150" height="75" rx="8" fill="#dbeafe" stroke="#3b82f6"/>
    <text x="75" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#1d4ed8">Triggers</text>
    <text x="15" y="40" font-size="9" fill="#475569">- Pull requests</text>
    <text x="15" y="55" font-size="9" fill="#475569">- Scheduled (nightly)</text>
    <text x="15" y="70" font-size="9" fill="#475569">- Manual dispatch</text>
  </g>
  
  <!-- Footer -->
  <text x="400" y="410" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Continuous LLM Quality Assurance</text>
</svg>