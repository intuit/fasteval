<svg viewBox="0 0 850 310" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="decoratorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="testGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="evalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="resultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="shadowOverview" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowOverview" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="850" height="310" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="425" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">How fasteval Works</text>
  
  <!-- Step 1: Decorate -->
  <g filter="url(#shadowOverview)">
    <rect x="25" y="60" width="130" height="85" rx="12" fill="url(#decoratorGrad)"/>
    <text x="90" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="white">1. DECORATE</text>
    <line x1="40" y1="98" x2="140" y2="98" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="90" y="118" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">@fe.correctness()</text>
    <text x="90" y="133" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">@fe.toxicity()</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="155" y1="102" x2="185" y2="102" stroke="#64748b" stroke-width="2" marker-end="url(#arrowOverview)"/>
  
  <!-- Step 2: Test -->
  <g filter="url(#shadowOverview)">
    <rect x="195" y="60" width="130" height="85" rx="12" fill="url(#testGrad)"/>
    <text x="260" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="white">2. TEST</text>
    <line x1="210" y1="98" x2="310" y2="98" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="260" y="118" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">Call your LLM</text>
    <text x="260" y="133" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">agent or app</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="325" y1="102" x2="355" y2="102" stroke="#64748b" stroke-width="2" marker-end="url(#arrowOverview)"/>
  
  <!-- Step 3: Score -->
  <g filter="url(#shadowOverview)">
    <rect x="365" y="60" width="130" height="85" rx="12" fill="url(#scoreGrad)"/>
    <text x="430" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="white">3. SCORE</text>
    <line x1="380" y1="98" x2="480" y2="98" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="430" y="118" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">fe.score(actual,</text>
    <text x="430" y="133" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">expected)</text>
  </g>
  
  <!-- Arrow 3 -->
  <line x1="495" y1="102" x2="525" y2="102" stroke="#64748b" stroke-width="2" marker-end="url(#arrowOverview)"/>
  
  <!-- Step 4: Evaluate -->
  <g filter="url(#shadowOverview)">
    <rect x="535" y="60" width="130" height="85" rx="12" fill="url(#evalGrad)"/>
    <text x="600" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="white">4. EVALUATE</text>
    <line x1="550" y1="98" x2="650" y2="98" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="600" y="118" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">LLM judge runs</text>
    <text x="600" y="133" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.9)">each metric</text>
  </g>
  
  <!-- Arrow 4 -->
  <line x1="665" y1="102" x2="695" y2="102" stroke="#64748b" stroke-width="2" marker-end="url(#arrowOverview)"/>
  
  <!-- Step 5: Result (same size as other boxes) -->
  <g filter="url(#shadowOverview)">
    <rect x="705" y="60" width="130" height="85" rx="12" fill="url(#resultGrad)"/>
    <text x="770" y="88" text-anchor="middle" font-size="11" font-weight="700" fill="white">5. RESULT</text>
    <line x1="720" y1="98" x2="820" y2="98" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="770" y="122" text-anchor="middle" font-size="22" font-weight="700" fill="white">✓</text>
    <text x="770" y="140" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.9)">PASS</text>
  </g>
  
  <!-- Code Example Box -->
  <g filter="url(#shadowOverview)">
    <rect x="25" y="170" width="810" height="120" rx="12" fill="#1e293b"/>
    <text x="45" y="195" font-family="monospace" font-size="11" fill="#94a3b8">import fasteval as fe</text>
    <text x="45" y="215" font-family="monospace" font-size="11" fill="#a78bfa">@fe.correctness</text><text x="143" y="215" font-family="monospace" font-size="11" fill="#fbbf24">(threshold=0.8)</text>
    <text x="45" y="235" font-family="monospace" font-size="11" fill="#60a5fa">def</text><text x="70" y="235" font-family="monospace" font-size="11" fill="#f8fafc"> test_my_agent():</text>
    <text x="65" y="255" font-family="monospace" font-size="11" fill="#f8fafc">response = my_agent(</text><text x="197" y="255" font-family="monospace" font-size="11" fill="#fbbf24">"What is 2+2?"</text><text x="288" y="255" font-family="monospace" font-size="11" fill="#f8fafc">)</text>
    <text x="65" y="275" font-family="monospace" font-size="11" fill="#f8fafc">fe.score(response, </text><text x="187" y="275" font-family="monospace" font-size="11" fill="#fbbf24">"4"</text><text x="207" y="275" font-family="monospace" font-size="11" fill="#f8fafc">)</text>
    
    <!-- Run with pytest label -->
    <rect x="625" y="180" width="190" height="30" rx="6" fill="#374151"/>
    <text x="720" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#10b981">$ pytest test_agent.py</text>
  </g>
  
  <!-- Footer -->
  <text x="425" y="302" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Decorator-first LLM evaluation</text>
</svg>
