<svg viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="400" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">How fasteval Works</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">A streamlined 5-step lifecycle for LLM evaluation</text>

  <g transform="translate(25, 110)">
    <g filter="url(#shadow)">
      <rect width="150" height="95" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
      <rect width="150" height="32" rx="12" fill="#eef2ff"/>
      <rect y="22" width="150" height="10" fill="#eef2ff"/>
      <text x="75" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">1. DECORATE</text>
      <text x="75" y="60" text-anchor="middle" font-size="11" fill="#475569">@fe.correctness()</text>
      <text x="75" y="78" text-anchor="middle" font-size="11" fill="#475569">@fe.toxicity()</text>
    </g>

    <line x1="150" y1="48" x2="175" y2="48" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(175, 0)" filter="url(#shadow)">
      <rect width="150" height="95" rx="12" fill="white" stroke="#ddd6fe" stroke-width="1.5"/>
      <rect width="150" height="32" rx="12" fill="#f5f3ff"/>
      <rect y="22" width="150" height="10" fill="#f5f3ff"/>
      <text x="75" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">2. TEST</text>
      <text x="75" y="60" text-anchor="middle" font-size="11" fill="#475569">Call your LLM</text>
      <text x="75" y="78" text-anchor="middle" font-size="11" fill="#475569">Agent or App</text>
    </g>

    <line x1="325" y1="48" x2="350" y2="48" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(350, 0)" filter="url(#shadow)">
      <rect width="150" height="95" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
      <rect width="150" height="32" rx="12" fill="#eff6ff"/>
      <rect y="22" width="150" height="10" fill="#eff6ff"/>
      <text x="75" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">3. SCORE</text>
      <text x="75" y="60" text-anchor="middle" font-size="11" fill="#475569">fe.score(actual,</text>
      <text x="75" y="78" text-anchor="middle" font-size="11" fill="#475569">expected)</text>
    </g>

    <line x1="500" y1="48" x2="525" y2="48" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(525, 0)" filter="url(#shadow)">
      <rect width="150" height="95" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
      <rect width="150" height="32" rx="12" fill="#ecfdf5"/>
      <rect y="22" width="150" height="10" fill="#ecfdf5"/>
      <text x="75" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">4. EVALUATE</text>
      <text x="75" y="60" text-anchor="middle" font-size="11" fill="#475569">LLM Judge runs</text>
      <text x="75" y="78" text-anchor="middle" font-size="11" fill="#475569">each metric</text>
    </g>

    <line x1="675" y1="48" x2="700" y2="48" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(700, 0)" filter="url(#shadow)">
      <rect width="150" height="95" rx="12" fill="white" stroke="#fcd34d" stroke-width="1.5"/>
      <rect width="150" height="32" rx="12" fill="#fffbeb"/>
      <rect y="22" width="150" height="10" fill="#fffbeb"/>
      <text x="75" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">5. RESULT</text>
      <text x="75" y="72" text-anchor="middle" font-size="28" font-weight="800" fill="#d97706">PASS</text>
    </g>
  </g>

  <g transform="translate(25, 235)">
    <rect width="850" height="120" rx="12" fill="#0f172a" filter="url(#shadow)"/>
    <g transform="translate(30, 40)" font-family="monospace" font-size="12">
      <text y="0"><tspan fill="#94a3b8">import</tspan> <tspan fill="#f8fafc">fasteval</tspan> <tspan fill="#94a3b8">as</tspan> <tspan fill="#f8fafc">fe</tspan></text>
      <text y="22"><tspan fill="#a78bfa">@fe.correctness</tspan><tspan fill="#fbbf24">(threshold=0.8)</tspan></text>
      <text y="44"><tspan fill="#60a5fa">def</tspan> <tspan fill="#f8fafc">test_my_agent():</tspan></text>
      <text y="66"><tspan fill="#f8fafc">  fe.score(response, </tspan><tspan fill="#fbbf24">"Expected Output"</tspan><tspan fill="#f8fafc">)</tspan></text>
    </g>

    <rect x="620" y="25" width="200" height="32" rx="6" fill="#1e293b" stroke="#334155"/>
    <text x="720" y="46" text-anchor="middle" font-family="monospace" font-size="11" fill="#10b981">$ pytest test_agent.py</text>
  </g>

  <text x="450" y="388" text-anchor="middle" font-size="11" fill="#94a3b8">FastEval Documentation • Decorator-First Architecture • 2026 Standards</text>
</svg>
