<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">CI/CD Evaluation Pipeline</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Optimizing developer velocity with tiered testing strategies</text>

  <g filter="url(#shadow)" transform="translate(365, 100)">
    <rect width="170" height="45" rx="22.5" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="85" y="27" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Code Push</text>
  </g>

  <line x1="450" y1="145" x2="450" y2="175" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <g transform="translate(250, 175)" filter="url(#shadow)">
    <rect width="400" height="70" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
    <rect width="400" height="30" rx="12" fill="#ecfdf5"/>
    <rect y="20" width="400" height="10" fill="#ecfdf5"/>
    <text x="200" y="21" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">FAST TESTS (Always Run)</text>
    
    <text x="20" y="52" font-size="12" fill="#475569">Unit tests &amp; Deterministic evals</text>
    <text x="380" y="52" text-anchor="end" font-family="monospace" font-size="11" fill="#059669">-m "not slow"</text>
    <text x="20" y="62" font-size="11" fill="#94a3b8">Execution: ~30 seconds</text>
  </g>

  <line x1="450" y1="245" x2="450" y2="275" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="460" y="265" font-size="11" font-weight="600" fill="#64748b">PASS</text>

  <g transform="translate(250, 275)" filter="url(#shadow)">
    <rect width="400" height="70" rx="12" fill="white" stroke="#8b5cf6" stroke-width="2"/>
    <rect width="400" height="30" rx="12" fill="#f5f3ff"/>
    <rect y="20" width="400" height="10" fill="#f5f3ff"/>
    <text x="200" y="21" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">LLM TESTS (PR/Merge)</text>
    
    <text x="20" y="52" font-size="12" fill="#475569">Correctness, Relevance &amp; Accuracy</text>
    <text x="380" y="52" text-anchor="end" font-family="monospace" font-size="11" fill="#7c3aed">-m slow</text>
    <text x="20" y="62" font-size="11" fill="#94a3b8">Execution: ~2-5 minutes</text>
  </g>

  <path d="M 250 310 L 150 310 L 150 340" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowhead)"/>
  
  <g transform="translate(50, 340)" filter="url(#shadow)">
    <rect width="200" height="70" rx="12" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="100" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">FULL SUITE</text>
    <text x="100" y="45" text-anchor="middle" font-size="11" fill="#475569">Nightly / Release Build</text>
    <text x="100" y="60" text-anchor="middle" font-size="11" fill="#94a3b8">~15-30 minutes</text>
  </g>

  <line x1="450" y1="345" x2="450" y2="375" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="460" y="365" font-size="11" font-weight="600" fill="#64748b">PASS</text>

  <g transform="translate(350, 375)" filter="url(#shadow)">
    <rect width="200" height="45" rx="22.5" fill="white" stroke="#f59e0b" stroke-width="2"/>
    <text x="100" y="27" text-anchor="middle" font-size="15" font-weight="800" fill="#b45309">DEPLOY</text>
  </g>

  <g transform="translate(680, 175)">
    <rect width="170" height="130" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="85" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">STRATEGY</text>
    <line x1="20" y1="35" x2="150" y2="35" stroke="#f1f5f9" stroke-width="1.5"/>
    
    <circle cx="30" cy="55" r="5" fill="#10b981"/>
    <text x="45" y="59" font-size="11" fill="#475569">Every commit</text>
    
    <circle cx="30" cy="85" r="5" fill="#8b5cf6"/>
    <text x="45" y="89" font-size="11" fill="#475569">Pull requests</text>
    
    <circle cx="30" cy="115" r="5" fill="#3b82f6"/>
    <text x="45" y="119" font-size="11" fill="#475569">Scheduled</text>
  </g>

  <text x="450" y="488" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Tiered CI/CD Testing Strategy • 2026 Documentation Standard</text>
</svg>
