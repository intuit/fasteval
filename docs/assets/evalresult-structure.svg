<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">EvalResult Object Structure</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Schema for the objects returned by fe.score() for inspection and assertions</text>

  <g transform="translate(60, 110)" filter="url(#shadow)">
    <rect width="340" height="320" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect width="340" height="45" rx="12" fill="#eff6ff"/>
    <rect y="30" width="340" height="15" fill="#eff6ff"/>
    <text x="170" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#4f46e5">EvalResult</text>
    
    <g transform="translate(20, 65)">
      <rect width="300" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="12" y="22" font-size="12" font-weight="700" fill="#4f46e5">passed</text>
      <text x="65" y="22" font-size="12" fill="#64748b">: bool</text>
      <text x="288" y="22" text-anchor="end" font-size="11" fill="#94a3b8" font-style="italic">True if all metrics pass</text>

      <rect y="44" width="300" height="36" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="12" y="66" font-size="12" font-weight="700" fill="#4f46e5">aggregate_score</text>
      <text x="125" y="66" font-size="12" fill="#64748b">: float</text>
      <text x="288" y="66" text-anchor="end" font-size="11" fill="#94a3b8" font-style="italic">0.0 - 1.0 (weighted)</text>

      <rect y="88" width="300" height="36" rx="6" fill="#ecfdf5" stroke="#86efac"/>
      <text x="12" y="110" font-size="12" font-weight="700" fill="#059669">metric_results</text>
      <text x="110" y="110" font-size="12" fill="#64748b">: List[MetricResult]</text>

      <rect y="132" width="300" height="36" rx="6" fill="#f5f3ff" stroke="#c7d2fe"/>
      <text x="12" y="154" font-size="12" font-weight="700" fill="#6d28d9">eval_input</text>
      <text x="85" y="154" font-size="12" fill="#64748b">: EvalInput</text>
    </g>

    <line x1="20" y1="260" x2="320" y2="260" stroke="#f1f5f9" stroke-width="1.5"/>
    <text x="170" y="285" text-anchor="middle" font-size="11" fill="#94a3b8" font-family="monospace">result = fe.score(...)</text>
    <text x="170" y="302" text-anchor="middle" font-size="11" fill="#94a3b8">Entry point for assertions</text>
  </g>

  <g transform="translate(500, 110)">
    <g filter="url(#shadow)">
      <rect width="340" height="180" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
      <rect width="340" height="40" rx="12" fill="#ecfdf5"/>
      <rect y="25" width="340" height="15" fill="#ecfdf5"/>
      <text x="170" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">MetricResult</text>
      
      <g transform="translate(15, 55)" font-size="11">
        <text y="15" font-weight="700" fill="#059669">metric_name<tspan font-weight="400" fill="#64748b">: str</tspan></text>
        <text x="310" y="15" text-anchor="end" fill="#94a3b8">"correctness"</text>
        
        <text y="38" font-weight="700" fill="#059669">score<tspan font-weight="400" fill="#64748b">: float</tspan></text>
        <text x="310" y="38" text-anchor="end" fill="#94a3b8">0.0 - 1.0</text>
        
        <text y="61" font-weight="700" fill="#059669">passed<tspan font-weight="400" fill="#64748b">: bool</tspan></text>
        <text x="310" y="61" text-anchor="end" fill="#94a3b8">score ≥ threshold</text>
        
        <text y="84" font-weight="700" fill="#059669">reasoning<tspan font-weight="400" fill="#64748b">: str</tspan></text>
        <text x="310" y="84" text-anchor="end" fill="#94a3b8">LLM Explanation</text>
      </g>
    </g>

    <g transform="translate(0, 205)" filter="url(#shadow)">
      <rect width="340" height="115" rx="12" fill="white" stroke="#ddd6fe" stroke-width="1.5"/>
      <rect width="340" height="35" rx="12" fill="#f5f3ff"/>
      <rect y="20" width="340" height="15" fill="#f5f3ff"/>
      <text x="170" y="22" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">EvalInput</text>
      
      <g transform="translate(15, 55)" font-size="11">
        <text y="15" font-weight="700" fill="#7c3aed">actual_output<tspan font-weight="400" fill="#64748b">: str</tspan></text>
        <text y="36" font-weight="700" fill="#7c3aed">expected_output<tspan font-weight="400" fill="#64748b">: str</tspan></text>
        <text y="57" font-weight="700" fill="#7c3aed">input<tspan font-weight="400" fill="#64748b">: str</tspan> • context<tspan font-weight="400" fill="#64748b">: List[str]</tspan></text>
      </g>
    </g>
  </g>

  <g stroke="#cbd5e1" stroke-width="2" fill="none">
    <path d="M 400 213 L 450 213 L 450 200 L 500 200" marker-end="url(#arrowhead)"/>
    <path d="M 400 257 L 450 257 L 450 315 L 500 315" marker-end="url(#arrowhead)"/>
  </g>

  <text x="450" y="508" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Object Data Structures • Architectural Standards 2026</text>
</svg>
