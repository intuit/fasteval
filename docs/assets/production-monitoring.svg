<svg viewBox="0 0 800 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="trafficGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="collectorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="workerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="shadowProd" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowProd" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="380" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Production Monitoring Architecture</text>
  
  <!-- Row 1: Pipeline boxes (centered) -->
  <!-- Production Traffic -->
  <g filter="url(#shadowProd)">
    <rect x="80" y="60" width="140" height="70" rx="12" fill="url(#trafficGrad)"/>
    <text x="150" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="white">Production</text>
    <text x="150" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="white">Traffic</text>
  </g>
  
  <!-- Arrow 1 -->
  <line x1="220" y1="95" x2="280" y2="95" stroke="#64748b" stroke-width="2" marker-end="url(#arrowProd)"/>
  
  <!-- Sample Collector -->
  <g filter="url(#shadowProd)">
    <rect x="290" y="60" width="140" height="70" rx="12" fill="url(#collectorGrad)"/>
    <text x="360" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="white">Sample</text>
    <text x="360" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="white">Collector</text>
  </g>
  
  <!-- Arrow 2 -->
  <line x1="430" y1="95" x2="490" y2="95" stroke="#64748b" stroke-width="2" marker-end="url(#arrowProd)"/>
  
  <!-- Evaluation Worker -->
  <g filter="url(#shadowProd)">
    <rect x="500" y="60" width="140" height="70" rx="12" fill="url(#workerGrad)"/>
    <text x="570" y="90" text-anchor="middle" font-size="12" font-weight="600" fill="white">Evaluation</text>
    <text x="570" y="108" text-anchor="middle" font-size="12" font-weight="600" fill="white">Worker</text>
  </g>
  
  <!-- Arrow 3 (down to DB) -->
  <line x1="570" y1="130" x2="570" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrowProd)"/>
  
  <!-- Results DB (centered under Worker) -->
  <g filter="url(#shadowProd)">
    <rect x="500" y="170" width="140" height="60" rx="12" fill="url(#dbGrad)"/>
    <text x="570" y="197" text-anchor="middle" font-size="12" font-weight="600" fill="white">Results DB</text>
    <text x="570" y="215" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">PostgreSQL / ClickHouse</text>
  </g>
  
  <!-- Arrow down from DB -->
  <line x1="570" y1="230" x2="570" y2="260" stroke="#64748b" stroke-width="2"/>
  
  <!-- Horizontal split line -->
  <line x1="150" y1="260" x2="700" y2="260" stroke="#64748b" stroke-width="2"/>
  
  <!-- Vertical connectors to output boxes (centered above each box) -->
  <line x1="150" y1="260" x2="150" y2="285" stroke="#64748b" stroke-width="2" marker-end="url(#arrowProd)"/>
  <line x1="400" y1="260" x2="400" y2="285" stroke="#64748b" stroke-width="2" marker-end="url(#arrowProd)"/>
  <line x1="650" y1="260" x2="650" y2="285" stroke="#64748b" stroke-width="2" marker-end="url(#arrowProd)"/>
  
  <!-- Dashboard (centered under first connector) -->
  <g filter="url(#shadowProd)">
    <rect x="65" y="295" width="170" height="55" rx="10" fill="white" stroke="#3b82f6" stroke-width="2"/>
    <text x="150" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#1d4ed8">Dashboard</text>
    <text x="150" y="337" text-anchor="middle" font-size="10" fill="#64748b">Grafana / Custom UI</text>
  </g>
  
  <!-- Alerting (centered under middle connector) -->
  <g filter="url(#shadowProd)">
    <rect x="315" y="295" width="170" height="55" rx="10" fill="white" stroke="#ef4444" stroke-width="2"/>
    <text x="400" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">Alerting</text>
    <text x="400" y="337" text-anchor="middle" font-size="10" fill="#64748b">PagerDuty / Slack</text>
  </g>
  
  <!-- ML Ops (centered under right connector) -->
  <g filter="url(#shadowProd)">
    <rect x="565" y="295" width="170" height="55" rx="10" fill="white" stroke="#10b981" stroke-width="2"/>
    <text x="650" y="320" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">ML Ops</text>
    <text x="650" y="337" text-anchor="middle" font-size="10" fill="#64748b">Model retraining triggers</text>
  </g>
  
  <!-- Footer -->
  <text x="400" y="372" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Continuous evaluation in production</text>
</svg>
