<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Production Monitoring Architecture</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Continuous quality assurance and drift detection for live AI systems</text>

  <g transform="translate(130, 110)">
    <g filter="url(#shadow)">
      <rect width="160" height="80" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#eff6ff"/>
      <rect y="22" width="160" height="10" fill="#eff6ff"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">LIVE TRAFFIC</text>
      <text x="80" y="58" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Real-time requests</text>
    </g>

    <line x1="160" y1="40" x2="220" y2="40" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(220, 0)" filter="url(#shadow)">
      <rect width="160" height="80" rx="12" fill="white" stroke="#ddd6fe" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#f5f3ff"/>
      <rect y="22" width="160" height="10" fill="#f5f3ff"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">COLLECTOR</text>
      <text x="80" y="58" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Probabilistic sampling</text>
    </g>

    <line x1="380" y1="40" x2="440" y2="40" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(440, 0)" filter="url(#shadow)">
      <rect width="160" height="80" rx="12" fill="white" stroke="#86efac" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#ecfdf5"/>
      <rect y="22" width="160" height="10" fill="#ecfdf5"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">EVAL WORKER</text>
      <text x="80" y="58" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">LLM Judge execution</text>
    </g>
  </g>

  <g transform="translate(350, 230)" filter="url(#shadow)">
    <rect width="200" height="80" rx="12" fill="white" stroke="#fde68a" stroke-width="1.5"/>
    <rect width="200" height="32" rx="12" fill="#fffbeb"/>
    <rect y="22" width="200" height="10" fill="#fffbeb"/>
    <text x="100" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">RESULTS DATABASE</text>
    <text x="100" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">PostgreSQL / ClickHouse</text>
    <line x1="100" y1="-40" x2="100" y2="-10" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g stroke="#cbd5e1" stroke-width="2" fill="none">
    <path d="M 450 310 L 450 350"/>
    <path d="M 150 350 L 750 350"/>
    <path d="M 150 350 L 150 380" marker-end="url(#arrowhead)"/>
    <path d="M 450 350 L 450 380" marker-end="url(#arrowhead)"/>
    <path d="M 750 350 L 750 380" marker-end="url(#arrowhead)"/>
  </g>

  <g transform="translate(50, 380)">
    <g filter="url(#shadow)">
      <rect width="200" height="70" rx="12" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="100" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#1e293b">DASHBOARD</text>
      <text x="100" y="52" text-anchor="middle" font-size="11" fill="#64748b">Grafana / Score Trends</text>
    </g>

    <g transform="translate(300, 0)" filter="url(#shadow)">
      <rect width="200" height="70" rx="12" fill="white" stroke="#fecaca" stroke-width="1.5"/>
      <text x="100" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#dc2626">ALERTING</text>
      <text x="100" y="52" text-anchor="middle" font-size="11" fill="#64748b">PagerDuty / PR Slack</text>
    </g>

    <g transform="translate(600, 0)" filter="url(#shadow)">
      <rect width="200" height="70" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
      <text x="100" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">ML OPS</text>
      <text x="100" y="52" text-anchor="middle" font-size="11" fill="#64748b">Retraining Triggers</text>
    </g>
  </g>

  <text x="450" y="508" text-anchor="middle" font-size="11" fill="#94a3b8">FastEval Documentation • Architectural Standards • 2026</text>
</svg>
