<svg viewBox="0 0 900 580" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="580" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Context Retention in Conversations</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Testing if the bot remembers information from earlier turns</text>

  <g transform="translate(50, 110)">
    <g transform="translate(0, 0)">
      <text x="0" y="0" font-size="13" font-weight="700" fill="#64748b">TURN 1</text>
      <g transform="translate(0, 15)" filter="url(#shadow)">
        <rect width="240" height="45" rx="8" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
        <text x="12" y="18" font-size="11" font-weight="700" fill="#4f46e5">USER</text>
        <text x="12" y="34" font-size="12" fill="#334155">"My name is Alice"</text>
      </g>
      <g transform="translate(30, 70)" filter="url(#shadow)">
        <rect width="240" height="45" rx="8" fill="white" stroke="#ddd6fe" stroke-width="1.5"/>
        <text x="12" y="18" font-size="11" font-weight="700" fill="#7c3aed">BOT</text>
        <text x="12" y="34" font-size="12" fill="#334155">"Nice to meet you, Alice!"</text>
      </g>
      <rect x="280" y="45" width="100" height="45" rx="6" fill="#ecfdf5" stroke="#86efac" stroke-dasharray="4 2"/>
      <text x="330" y="63" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">STORED</text>
      <text x="330" y="78" text-anchor="middle" font-size="10" fill="#059669">name=Alice</text>
    </g>

    <line x1="390" y1="70" x2="420" y2="70" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(420, 0)">
      <text x="0" y="0" font-size="13" font-weight="700" fill="#64748b">TURN 2</text>
      <g transform="translate(0, 15)" filter="url(#shadow)">
        <rect width="240" height="45" rx="8" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
        <text x="12" y="18" font-size="11" font-weight="700" fill="#4f46e5">USER</text>
        <text x="12" y="34" font-size="12" fill="#334155">"I ordered product #12345"</text>
      </g>
      <g transform="translate(30, 70)" filter="url(#shadow)">
        <rect width="240" height="45" rx="8" fill="white" stroke="#ddd6fe" stroke-width="1.5"/>
        <text x="12" y="18" font-size="11" font-weight="700" fill="#7c3aed">BOT</text>
        <text x="12" y="34" font-size="12" fill="#334155">"I'll help with order #12345"</text>
      </g>
      <rect x="280" y="45" width="100" height="45" rx="6" fill="#ecfdf5" stroke="#86efac" stroke-dasharray="4 2"/>
      <text x="330" y="63" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">STORED</text>
      <text x="330" y="78" text-anchor="middle" font-size="10" fill="#059669">order=#12345</text>
    </g>
  </g>

  <g transform="translate(50, 290)">
    <g transform="translate(0, 0)">
      <text x="0" y="0" font-size="13" font-weight="700" fill="#b45309">TURN 3 (EVALUATION)</text>
      <g transform="translate(0, 15)" filter="url(#shadow)">
        <rect width="240" height="45" rx="8" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
        <text x="12" y="18" font-size="11" font-weight="700" fill="#4f46e5">USER</text>
        <text x="12" y="34" font-size="12" fill="#334155">"What is my name again?"</text>
      </g>
      <g transform="translate(30, 70)" filter="url(#shadow)">
        <rect width="240" height="45" rx="8" fill="white" stroke="#f59e0b" stroke-width="2"/>
        <text x="12" y="18" font-size="11" font-weight="700" fill="#b45309">BOT RESPONSE</text>
        <text x="12" y="34" font-size="12" fill="#334155">"Your name is Alice"</text>
      </g>
      
      <path d="M 0 115 Q -30 115 -30 60 Q -30 15 0 15" fill="none" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4 4"/>
      <text x="-40" y="65" text-anchor="middle" font-size="10" font-weight="600" fill="#059669" transform="rotate(-90 -40 65)">RETRIEVAL</text>
    </g>

    <g transform="translate(380, 15)" filter="url(#shadow)">
      <rect width="420" height="120" rx="12" fill="white" stroke="#fcd34d" stroke-width="1.5"/>
      <rect width="420" height="35" rx="12" fill="#fffbeb"/>
      <rect y="25" width="420" height="10" fill="#fffbeb"/>
      <text x="210" y="22" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">CONTEXT RETENTION METRIC</text>
      
      <text x="20" y="55" font-size="12" font-weight="600" fill="#475569">Analysis:</text>
      <text x="20" y="75" font-size="12" fill="#475569">• Question references historical context ("name")</text>
      <text x="20" y="93" font-size="12" fill="#475569">• Bot correctly identified stored value "Alice" from Turn 1</text>
      
      <rect x="330" y="48" width="70" height="30" rx="6" fill="#ecfdf5" stroke="#10b981"/>
      <text x="365" y="68" text-anchor="middle" font-size="14" font-weight="800" fill="#059669">1.0 PASS</text>
    </g>
  </g>

  <g transform="translate(50, 460)">
    <rect width="800" height="70" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="400" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.05em">EVALUATION CRITERIA</text>
    
    <g transform="translate(20, 35)">
      <rect width="180" height="25" rx="6" fill="#eff6ff"/>
      <text x="90" y="16" text-anchor="middle" font-size="11" fill="#1d4ed8">Pronoun resolution</text>
      
      <rect x="190" width="180" height="25" rx="6" fill="#f5f3ff"/>
      <text x="280" y="16" text-anchor="middle" font-size="11" fill="#6d28d9">Name/ID callbacks</text>
      
      <rect x="380" width="180" height="25" rx="6" fill="#ecfdf5"/>
      <text x="470" y="16" text-anchor="middle" font-size="11" fill="#047857">Past info reference</text>
      
      <rect x="570" width="190" height="25" rx="6" fill="#fffbeb"/>
      <text x="665" y="16" text-anchor="middle" font-size="11" fill="#b45309">Multi-turn consistency</text>
    </g>
  </g>

  <text x="450" y="568" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • context_retention Metric • Architectural Standards 2026</text>
</svg>
