<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Batch Evaluation Strategy</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Efficient pipeline for evaluating large datasets with streaming and concurrency</text>

  <g transform="translate(50, 110)">
    <g filter="url(#shadow)">
      <rect width="170" height="110" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect width="170" height="32" rx="12" fill="#eff6ff"/>
      <rect y="20" width="170" height="12" fill="#eff6ff"/>
      <text x="85" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">Load Data</text>
      <text x="85" y="58" text-anchor="middle" font-size="12" fill="#475569">CSV / JSON / DB</text>
      <text x="85" y="78" text-anchor="middle" font-size="11" fill="#64748b">10,000+ cases</text>
      <text x="85" y="94" text-anchor="middle" font-size="11" fill="#94a3b8">Streaming load</text>
    </g>

    <line x1="170" y1="55" x2="210" y2="55" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(210, 0)" filter="url(#shadow)">
      <rect width="170" height="110" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect width="170" height="32" rx="12" fill="#f5f3ff"/>
      <rect y="20" width="170" height="12" fill="#f5f3ff"/>
      <text x="85" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">Batch</text>
      <text x="85" y="58" text-anchor="middle" font-size="12" fill="#475569">Size: 50-100</text>
      <text x="85" y="78" text-anchor="middle" font-size="11" fill="#64748b">Memory efficient</text>
      <text x="85" y="94" text-anchor="middle" font-size="11" fill="#94a3b8">Iterator pattern</text>
    </g>

    <line x1="380" y1="55" x2="420" y2="55" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(420, 0)" filter="url(#shadow)">
      <rect width="170" height="110" rx="12" fill="white" stroke="#86efac" stroke-width="1.5"/>
      <rect width="170" height="32" rx="12" fill="#ecfdf5"/>
      <rect y="20" width="170" height="12" fill="#ecfdf5"/>
      <text x="85" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">Parallel Eval</text>
      
      <g transform="translate(25, 45)">
        <rect width="35" height="20" rx="4" fill="#dcfce7" stroke="#86efac"/>
        <text x="17.5" y="14" text-anchor="middle" font-size="9" font-weight="700" fill="#059669">W1</text>
        <rect x="45" width="35" height="20" rx="4" fill="#dcfce7" stroke="#86efac"/>
        <text x="62.5" y="14" text-anchor="middle" font-size="9" font-weight="700" fill="#059669">W2</text>
        <rect x="90" width="35" height="20" rx="4" fill="#dcfce7" stroke="#86efac"/>
        <text x="107.5" y="14" text-anchor="middle" font-size="9" font-weight="700" fill="#059669">W3</text>
      </g>
      <text x="85" y="85" text-anchor="middle" font-size="11" fill="#475569">asyncio.gather()</text>
      <text x="85" y="100" text-anchor="middle" font-size="10" fill="#94a3b8">max_concurrent=20</text>
    </g>

    <line x1="590" y1="55" x2="630" y2="55" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(630, 0)" filter="url(#shadow)">
      <rect width="170" height="110" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect width="170" height="32" rx="12" fill="#fffbeb"/>
      <rect y="20" width="170" height="12" fill="#fffbeb"/>
      <text x="85" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Aggregate</text>
      <text x="85" y="58" text-anchor="middle" font-size="12" fill="#475569">Collect results</text>
      <text x="85" y="78" text-anchor="middle" font-size="11" fill="#64748b">Pass/fail stats</text>
      <text x="85" y="94" text-anchor="middle" font-size="11" fill="#94a3b8">Per-metric scores</text>
    </g>
  </g>

  <line x1="715" y1="220" x2="715" y2="250" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <g transform="translate(60, 250)">
    <g filter="url(#shadow)">
      <rect width="240" height="100" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="120" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Progress Tracking</text>
      <circle cx="30" cy="50" r="4" fill="#64748b"/>
      <text x="45" y="54" font-size="12" fill="#475569">tqdm integration</text>
      <circle cx="30" cy="70" r="4" fill="#64748b"/>
      <text x="45" y="74" font-size="12" fill="#475569">ETA estimation</text>
      <circle cx="30" cy="90" r="4" fill="#64748b"/>
      <text x="45" y="94" font-size="12" fill="#475569">Real-time pass rate</text>
    </g>

    <g transform="translate(270, 0)" filter="url(#shadow)">
      <rect width="240" height="100" rx="12" fill="white" stroke="#fde68a" stroke-width="1.5"/>
      <text x="120" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Cost Management</text>
      <circle cx="30" cy="50" r="4" fill="#f59e0b"/>
      <text x="45" y="54" font-size="12" fill="#475569">Pre-run estimation</text>
      <circle cx="30" cy="70" r="4" fill="#f59e0b"/>
      <text x="45" y="74" font-size="12" fill="#475569">Budget enforcement</text>
      <circle cx="30" cy="90" r="4" fill="#f59e0b"/>
      <text x="45" y="94" font-size="12" fill="#475569">Model-based tiering</text>
    </g>

    <g transform="translate(540, 0)" filter="url(#shadow)">
      <rect width="240" height="100" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
      <rect width="240" height="40" rx="12" fill="#eef2ff"/>
      <rect y="30" width="240" height="10" fill="#eef2ff"/>
      <text x="120" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">Generate Report</text>
      <text x="120" y="65" text-anchor="middle" font-size="12" fill="#475569">JSON / HTML / CSV export</text>
      <text x="120" y="85" text-anchor="middle" font-size="11" fill="#64748b">Failure analysis • CI integration</text>
    </g>
  </g>

  <g transform="translate(50, 390)">
    <rect width="800" height="65" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="400" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8" letter-spacing="0.05em">KEY PERFORMANCE METRICS</text>
    
    <g transform="translate(0, 30)">
      <text x="100" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">~100 evals/min</text>
      <text x="100" y="30" text-anchor="middle" font-size="10" fill="#94a3b8">20 Workers</text>
      
      <line x1="200" y1="5" x2="200" y2="25" stroke="#e2e8f0" stroke-width="1.5"/>
      
      <text x="300" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">~$0.50 / 1k</text>
      <text x="300" y="30" text-anchor="middle" font-size="10" fill="#94a3b8">gpt-4o-mini</text>

      <line x1="400" y1="5" x2="400" y2="25" stroke="#e2e8f0" stroke-width="1.5"/>

      <text x="500" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">Batch: 50-100</text>
      <text x="500" y="30" text-anchor="middle" font-size="10" fill="#94a3b8">Optimal Range</text>

      <line x1="600" y1="5" x2="600" y2="25" stroke="#e2e8f0" stroke-width="1.5"/>

      <text x="700" y="15" text-anchor="middle" font-size="13" font-weight="700" fill="#1e293b">O(batch)</text>
      <text x="700" y="30" text-anchor="middle" font-size="10" fill="#94a3b8">Memory Usage</text>
    </g>
  </g>

  <text x="450" y="548" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Batch Evaluation Standards • 2026 Documentation</text>
</svg>
