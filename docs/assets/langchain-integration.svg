<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">LangChain Integration</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Standardized wrapper for evaluating existing LangChain model instances</text>

  <g transform="translate(50, 110)" filter="url(#shadow)">
    <rect width="240" height="220" rx="12" fill="white" stroke="#86efac" stroke-width="1.5"/>
    <rect width="240" height="40" rx="12" fill="#ecfdf5"/>
    <rect y="30" width="240" height="10" fill="#ecfdf5"/>
    <text x="120" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">LANGCHAIN MODEL</text>
    
    <g transform="translate(20, 65)" font-family="monospace" font-size="12" fill="#475569">
      <text y="0">ChatOpenAI()</text>
      <text y="22">ChatAnthropic()</text>
      <text y="44">ChatOllama()</text>
    </g>
    <text x="20" y="145" font-size="12" fill="#64748b">Uses native LangChain</text>
    <text x="20" y="163" font-size="12" fill="#64748b">message schema.</text>
  </g>

  <line x1="290" y1="220" x2="330" y2="220" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <g transform="translate(330, 110)" filter="url(#shadow)">
    <rect width="240" height="220" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect width="240" height="40" rx="12" fill="#f5f3ff"/>
    <rect y="30" width="240" height="10" fill="#f5f3ff"/>
    <text x="120" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">WRAPPER CLASS</text>
    
    <text x="20" y="65" font-size="12" font-weight="700" fill="#7c3aed">Message Mapping:</text>
    <rect x="15" y="75" width="210" height="55" rx="6" fill="#f1f5f9"/>
    <g font-family="monospace" font-size="11" fill="#475569">
      <text x="25" y="93">"user" -&gt; HumanMsg</text>
      <text x="25" y="111">"sys"  -&gt; SystemMsg</text>
    </g>

    <text x="20" y="155" font-size="12" font-weight="700" fill="#7c3aed">Interface Implementation:</text>
    <text x="20" y="175" font-family="monospace" font-size="11" fill="#475569">async def invoke(...):</text>
    <text x="20" y="193" font-family="monospace" font-size="11" fill="#475569">  return llm.ainvoke()</text>
  </g>

  <line x1="570" y1="220" x2="610" y2="220" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <g transform="translate(610, 110)" filter="url(#shadow)">
    <rect width="240" height="220" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect width="240" height="40" rx="12" fill="#eef2ff"/>
    <rect y="30" width="240" height="10" fill="#eef2ff"/>
    <text x="120" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#4338ca">FASTEVAL ENTRY</text>
    
    <g transform="translate(20, 65)">
      <text y="0" font-size="12" fill="#475569">Provider Registration:</text>
      <rect y="12" width="200" height="45" rx="6" fill="#0f172a"/>
      <text x="10" y="32" font-family="monospace" font-size="11" fill="#a78bfa">fe.set_default_provider(</text>
      <text x="10" y="47" font-family="monospace" font-size="11" fill="#a78bfa">  client</text>
      <text x="60" y="47" font-family="monospace" font-size="11" fill="#f8fafc">)</text>
    </g>
    
    <text x="120" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#10b981">Ready for Eval</text>
    <text x="120" y="180" text-anchor="middle" font-size="12" fill="#64748b">Full decorator support</text>
    <text x="120" y="198" text-anchor="middle" font-size="12" fill="#64748b">enabled for model.</text>
  </g>

  <g transform="translate(50, 370)">
    <rect width="800" height="85" rx="12" fill="#0f172a" filter="url(#shadow)"/>
    <g transform="translate(25, 32)" font-family="monospace" font-size="12">
      <text y="0"><tspan fill="#60a5fa">llm</tspan> <tspan fill="#f8fafc"> = ChatOpenAI(model=</tspan><tspan fill="#fbbf24">"gpt-4o"</tspan><tspan fill="#f8fafc">)</tspan></text>
      <text y="22"><tspan fill="#60a5fa">client</tspan><tspan fill="#f8fafc"> = LangChainClient(llm) </tspan><tspan fill="#94a3b8"># Wrap model</tspan></text>
      <text y="44"><tspan fill="#f8fafc">fe.</tspan><tspan fill="#a78bfa">set_default_provider</tspan><tspan fill="#f8fafc">(client)</tspan></text>
    </g>
  </g>

  <text x="450" y="488" text-anchor="middle" font-size="11" fill="#94a3b8">FastEval Documentation • LangChain Client Standards • 2026</text>
</svg>
