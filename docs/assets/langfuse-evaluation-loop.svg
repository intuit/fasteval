<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">The Evaluation Loop</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Continuous quality improvement from production traces to validated deployment</text>

  <g transform="translate(345, 100)" filter="url(#shadow)">
    <rect width="210" height="75" rx="12" fill="white" stroke="#3b82f6" stroke-width="2"/>
    <circle cx="25" cy="37.5" r="12" fill="#2563eb"/>
    <text x="25" y="42" text-anchor="middle" font-size="11" font-weight="800" fill="white">1</text>
    <text x="120" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Online Evaluation</text>
    <text x="120" y="46" text-anchor="middle" font-size="10" fill="#64748b">Sample &amp; evaluate live traces</text>
    <text x="120" y="62" text-anchor="middle" font-size="9" font-family="monospace" fill="#2563eb">@fe.langfuse_traces</text>
  </g>

  <path d="M 555 137 C 650 137, 705 160, 705 210" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(600, 210)" filter="url(#shadow)">
    <rect width="210" height="75" rx="12" fill="white" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="25" cy="37.5" r="12" fill="#f59e0b"/>
    <text x="25" y="42" text-anchor="middle" font-size="11" font-weight="800" fill="white">2</text>
    <text x="120" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Identify Issues</text>
    <text x="120" y="46" text-anchor="middle" font-size="10" fill="#64748b">Filter by low quality scores</text>
    <text x="120" y="62" text-anchor="middle" font-size="9" font-family="monospace" fill="#b45309">correctness &lt; 0.7</text>
  </g>

  <path d="M 705 285 C 705 335, 650 357, 555 357" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(345, 320)" filter="url(#shadow)">
    <rect width="210" height="75" rx="12" fill="white" stroke="#7c3aed" stroke-width="2"/>
    <circle cx="25" cy="37.5" r="12" fill="#7c3aed"/>
    <text x="25" y="42" text-anchor="middle" font-size="11" font-weight="800" fill="white">3</text>
    <text x="120" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Build Datasets</text>
    <text x="120" y="46" text-anchor="middle" font-size="10" fill="#64748b">Promote failures to golden sets</text>
    <text x="120" y="62" text-anchor="middle" font-size="9" font-family="monospace" fill="#6d28d9">fe.create_dataset_item()</text>
  </g>

  <path d="M 345 357 C 250 357, 195 335, 195 285" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(90, 210)" filter="url(#shadow)">
    <rect width="210" height="75" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
    <circle cx="25" cy="37.5" r="12" fill="#059669"/>
    <text x="25" y="42" text-anchor="middle" font-size="11" font-weight="800" fill="white">4</text>
    <text x="120" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#1e293b">Offline Evaluation</text>
    <text x="120" y="46" text-anchor="middle" font-size="10" fill="#64748b">Regression-test new logic</text>
    <text x="120" y="62" text-anchor="middle" font-size="9" font-family="monospace" fill="#059669">@fe.langfuse_dataset</text>
  </g>

  <path d="M 195 210 C 195 160, 250 137, 345 137" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(345, 450)" filter="url(#shadow)">
    <rect width="210" height="60" rx="30" fill="#059669"/>
    <text x="105" y="32" text-anchor="middle" font-size="14" font-weight="800" fill="white">5. DEPLOY TO PROD</text>
    <text x="105" y="50" text-anchor="middle" font-size="10" font-weight="600" fill="#d1fae5">CI GATES PASS • SHIP IT</text>
  </g>

  <path d="M 195 285 C 195 400, 280 480, 345 480" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrow-green)"/>

  <rect x="400" y="235" width="100" height="30" rx="15" fill="#f1f5f9"/>
  <text x="450" y="254" text-anchor="middle" font-size="10" font-weight="800" fill="#94a3b8" letter-spacing="1">CONTINUOUS LOOP</text>

  <text x="450" y="540" text-anchor="middle" font-size="11" fill="#94a3b8">FastEval Documentation • Langfuse Evaluation Cookbook • 2026 Standards</text>
</svg>