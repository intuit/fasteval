<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Batch Evaluation Pipeline</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">End-to-end flow from raw data to aggregated failure analysis</text>

  <g transform="translate(50, 110)">
    <g filter="url(#shadow)">
      <rect width="180" height="100" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect width="180" height="32" rx="12" fill="#eff6ff"/>
      <rect y="20" width="180" height="12" fill="#eff6ff"/>
      <text x="90" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">Dataset</text>
      <text x="90" y="58" text-anchor="middle" font-size="12" fill="#475569">CSV / JSON / DB</text>
      <text x="90" y="80" text-anchor="middle" font-size="11" fill="#94a3b8">10,000 test cases</text>
    </g>

    <line x1="180" y1="50" x2="220" y2="50" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(220, 0)" filter="url(#shadow)">
      <rect width="180" height="100" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect width="180" height="32" rx="12" fill="#f5f3ff"/>
      <rect y="20" width="180" height="12" fill="#f5f3ff"/>
      <text x="90" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">Batch Loader</text>
      <text x="90" y="58" text-anchor="middle" font-size="12" fill="#475569">Streaming Chunks</text>
      <text x="90" y="80" text-anchor="middle" font-size="11" fill="#94a3b8">Batch size: 100</text>
    </g>

    <line x1="400" y1="50" x2="440" y2="50" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(440, -10)" filter="url(#shadow)">
      <rect width="360" height="120" rx="12" fill="white" stroke="#86efac" stroke-width="2"/>
      <rect width="360" height="32" rx="12" fill="#ecfdf5"/>
      <rect y="20" width="360" height="12" fill="#ecfdf5"/>
      <text x="180" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">Parallel Executor</text>
      
      <g transform="translate(20, 45)">
        <rect width="70" height="35" rx="6" fill="#dcfce7" stroke="#86efac"/>
        <text x="35" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">Worker 1</text>
        <rect x="85" width="70" height="35" rx="6" fill="#dcfce7" stroke="#86efac"/>
        <text x="120" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">Worker 2</text>
        <rect x="170" width="70" height="35" rx="6" fill="#dcfce7" stroke="#86efac"/>
        <text x="205" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">Worker 3</text>
        <rect x="255" width="70" height="35" rx="6" fill="#dcfce7" stroke="#86efac"/>
        <text x="290" y="22" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">Worker 4</text>
      </g>
      <text x="180" y="105" text-anchor="middle" font-size="11" font-family="monospace" fill="#64748b">asyncio.gather(*workers)</text>
    </g>
  </g>

  <g transform="translate(180, 260)">
    <g filter="url(#shadow)">
      <rect width="250" height="90" rx="12" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
      <text x="125" y="25" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">Progress Monitoring</text>
      <rect x="25" y="45" width="200" height="12" rx="6" fill="#f1f5f9"/>
      <rect x="25" y="45" width="120" height="12" rx="6" fill="#6366f1"/>
      <text x="125" y="78" text-anchor="middle" font-size="11" font-weight="700" fill="#6366f1">60% Complete • ETA 2m</text>
    </g>

    <path d="M 500 -20 L 500 45 L 250 45" fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="4 4"/>

    <g transform="translate(290, 0)" filter="url(#shadow)">
      <rect width="250" height="90" rx="12" fill="white" stroke="#fde68a" stroke-width="1.5"/>
      <rect width="250" height="32" rx="12" fill="#fffbeb"/>
      <rect y="20" width="250" height="12" fill="#fffbeb"/>
      <text x="125" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Results Aggregator</text>
      <text x="125" y="60" text-anchor="middle" font-size="12" fill="#475569">Merge individual scores</text>
      <text x="125" y="78" text-anchor="middle" font-size="11" fill="#94a3b8">Normalizing metrics...</text>
    </g>

    <line x1="415" y1="90" x2="415" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g transform="translate(50, 400)">
    <rect width="800" height="60" rx="12" fill="white" stroke="#c7d2fe" stroke-width="2" filter="url(#shadow)"/>
    <rect width="800" height="25" rx="12" fill="#eef2ff"/>
    <rect y="15" width="800" height="10" fill="#eef2ff"/>
    <text x="400" y="17" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">ANALYSIS &amp; REPORTING</text>
    <text x="400" y="48" text-anchor="middle" font-size="12" fill="#64748b">Failure Clustering • Regression Detection • PDF/HTML Export</text>
  </g>

  <text x="450" y="508" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Batch Evaluation Pipeline • 2026 Documentation Standard</text>
</svg>
