<?xml version="1.0" encoding="UTF-8"?>
<svg width="900" height="400" viewBox="0 0 900 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="900" height="400" fill="#f8fafc"/>

  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Code as a Judge vs LLM as a Judge</text>
  <text x="450" y="65" text-anchor="middle" font-size="14" fill="#64748b">Use both together for the strongest evaluation coverage</text>

  <!-- Code Judge card -->
  <g transform="translate(40, 90)" filter="url(#shadow)">
    <rect width="380" height="260" rx="16" fill="white" stroke="#c7d2fe" stroke-width="2"/>
    <rect width="380" height="48" rx="16" fill="#eef2ff"/>
    <rect y="36" width="380" height="12" fill="#eef2ff"/>
    <text x="190" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#4f46e5">Code as a Judge</text>

    <!-- Icon: code brackets -->
    <text x="190" y="88" text-anchor="middle" font-size="28" font-family="monospace" fill="#4f46e5">{ }</text>

    <text x="35" y="118" font-size="12" font-weight="600" fill="#1e293b">Speed</text>
    <rect x="130" y="106" width="220" height="18" rx="4" fill="#f1f5f9"/>
    <rect x="130" y="106" width="220" height="18" rx="4" fill="#c7d2fe"/>
    <text x="240" y="119" text-anchor="middle" font-size="10" font-weight="700" fill="#3730a3">Microseconds</text>

    <text x="35" y="148" font-size="12" font-weight="600" fill="#1e293b">Cost</text>
    <rect x="130" y="136" width="220" height="18" rx="4" fill="#f1f5f9"/>
    <rect x="130" y="136" width="220" height="18" rx="4" fill="#c7d2fe"/>
    <text x="240" y="149" text-anchor="middle" font-size="10" font-weight="700" fill="#3730a3">Free</text>

    <text x="35" y="178" font-size="12" font-weight="600" fill="#1e293b">Determinism</text>
    <rect x="130" y="166" width="220" height="18" rx="4" fill="#f1f5f9"/>
    <rect x="130" y="166" width="220" height="18" rx="4" fill="#c7d2fe"/>
    <text x="240" y="179" text-anchor="middle" font-size="10" font-weight="700" fill="#3730a3">100% Reproducible</text>

    <text x="35" y="208" font-size="12" font-weight="600" fill="#1e293b">Semantics</text>
    <rect x="130" y="196" width="220" height="18" rx="4" fill="#f1f5f9"/>
    <rect x="130" y="196" width="55" height="18" rx="4" fill="#fde68a"/>
    <text x="240" y="209" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Rule-based only</text>

    <text x="190" y="242" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">Best for: format, structure, rules, regex, PII</text>
  </g>

  <!-- VS divider -->
  <g transform="translate(450, 195)">
    <circle r="24" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <text y="6" text-anchor="middle" font-size="14" font-weight="800" fill="#94a3b8">vs</text>
  </g>

  <!-- LLM Judge card -->
  <g transform="translate(480, 90)" filter="url(#shadow)">
    <rect width="380" height="260" rx="16" fill="white" stroke="#bbf7d0" stroke-width="2"/>
    <rect width="380" height="48" rx="16" fill="#ecfdf5"/>
    <rect y="36" width="380" height="12" fill="#ecfdf5"/>
    <text x="190" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#059669">LLM as a Judge</text>

    <!-- Icon: AI symbol -->
    <text x="190" y="88" text-anchor="middle" font-size="24" font-family="monospace" fill="#059669">AI</text>

    <text x="35" y="118" font-size="12" font-weight="600" fill="#1e293b">Speed</text>
    <rect x="130" y="106" width="220" height="18" rx="4" fill="#f1f5f9"/>
    <rect x="130" y="106" width="80" height="18" rx="4" fill="#bbf7d0"/>
    <text x="240" y="119" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">1 - 5 seconds</text>

    <text x="35" y="148" font-size="12" font-weight="600" fill="#1e293b">Cost</text>
    <rect x="130" y="136" width="220" height="18" rx="4" fill="#f1f5f9"/>
    <rect x="130" y="136" width="80" height="18" rx="4" fill="#bbf7d0"/>
    <text x="240" y="149" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">~$0.001 / eval</text>

    <text x="35" y="178" font-size="12" font-weight="600" fill="#1e293b">Determinism</text>
    <rect x="130" y="166" width="220" height="18" rx="4" fill="#f1f5f9"/>
    <rect x="130" y="166" width="110" height="18" rx="4" fill="#fde68a"/>
    <text x="240" y="179" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Varies across runs</text>

    <text x="35" y="208" font-size="12" font-weight="600" fill="#1e293b">Semantics</text>
    <rect x="130" y="196" width="220" height="18" rx="4" fill="#f1f5f9"/>
    <rect x="130" y="196" width="220" height="18" rx="4" fill="#bbf7d0"/>
    <text x="240" y="209" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">Deep understanding</text>

    <text x="190" y="242" text-anchor="middle" font-size="11" font-weight="600" fill="#64748b">Best for: correctness, tone, relevance, quality</text>
  </g>

  <!-- Bottom: combined usage -->
  <g transform="translate(190, 362)" filter="url(#shadow)">
    <rect width="520" height="30" rx="8" fill="#0f172a"/>
    <text x="260" y="20" text-anchor="middle" font-size="12" font-weight="600" fill="#f8fafc">Combine both: @fe.judge(check, ...) + @fe.correctness(...) for full coverage</text>
  </g>
</svg>
