<svg viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="prfBaselineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
    <linearGradient id="prfCandidateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="prfGoldenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="prfCompareGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="prfPassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="prfFailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb7185"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
    <filter id="prfShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.12"/>
    </filter>
    <marker id="prfArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="450" fill="#f8fafc"/>

  <text x="450" y="35" text-anchor="middle" font-size="24" font-weight="700" fill="#1e293b">Prompt Regression Testing Flow</text>
  <text x="450" y="58" text-anchor="middle" font-size="14" fill="#64748b">Compare prompt versions against a golden dataset</text>

  <g filter="url(#prfShadow)">
    <rect x="30" y="90" width="150" height="85" rx="10" fill="url(#prfBaselineGrad)"/>
    <text x="105" y="115" text-anchor="middle" font-size="13" font-weight="600" fill="white">Baseline Prompt</text>
    <text x="105" y="135" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">(v1.0)</text>
    <text x="105" y="160" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">Production version</text>
  </g>

  <g filter="url(#prfShadow)">
    <rect x="30" y="195" width="150" height="85" rx="10" fill="url(#prfCandidateGrad)"/>
    <text x="105" y="220" text-anchor="middle" font-size="13" font-weight="600" fill="white">Candidate Prompt</text>
    <text x="105" y="240" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">(v2.0)</text>
    <text x="105" y="265" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">New version to test</text>
  </g>

  <g filter="url(#prfShadow)">
    <rect x="220" y="120" width="170" height="130" rx="10" fill="white" stroke="#f59e0b" stroke-width="2"/>
    <rect x="220" y="120" width="170" height="35" rx="10" fill="url(#prfGoldenGrad)"/>
    <rect x="220" y="143" width="170" height="12" fill="url(#prfGoldenGrad)"/>
    <text x="305" y="143" text-anchor="middle" font-size="13" font-weight="600" fill="white">📋 Golden Dataset</text>

    <text x="235" y="172" font-size="11" fill="#475569">• Curated test cases</text>
    <text x="235" y="190" font-size="11" fill="#475569">• Expected behaviors</text>
    <text x="235" y="208" font-size="11" fill="#475569">• Minimum scores</text>
    <text x="305" y="235" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">100+ test cases</text>
  </g>

  <line x1="180" y1="132" x2="210" y2="160" stroke="#64748b" stroke-width="2" stroke-linecap="round" marker-end="url(#prfArrow)"/>
  <line x1="180" y1="237" x2="210" y2="210" stroke="#64748b" stroke-width="2" stroke-linecap="round" marker-end="url(#prfArrow)"/>

  <g filter="url(#prfShadow)">
    <rect x="430" y="90" width="140" height="65" rx="8" fill="#f1f5f9" stroke="#64748b"/>
    <text x="500" y="115" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Run Baseline</text>
    <text x="500" y="138" text-anchor="middle" font-size="16" font-weight="700" fill="#475569">Score: 0.85</text>
  </g>

  <g filter="url(#prfShadow)">
    <rect x="430" y="210" width="140" height="65" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="500" y="235" text-anchor="middle" font-size="12" font-weight="600" fill="#6d28d9">Run Candidate</text>
    <text x="500" y="258" text-anchor="middle" font-size="16" font-weight="700" fill="#6d28d9">Score: 0.82</text>
  </g>

  <line x1="390" y1="165" x2="420" y2="130" stroke="#64748b" stroke-width="2" stroke-linecap="round" marker-end="url(#prfArrow)"/>
  <line x1="390" y1="205" x2="420" y2="235" stroke="#64748b" stroke-width="2" stroke-linecap="round" marker-end="url(#prfArrow)"/>

  <line x1="570" y1="122" x2="615" y2="165" stroke="#64748b" stroke-width="2" stroke-linecap="round" marker-end="url(#prfArrow)"/>
  <line x1="570" y1="242" x2="615" y2="205" stroke="#64748b" stroke-width="2" stroke-linecap="round" marker-end="url(#prfArrow)"/>

  <g filter="url(#prfShadow)">
    <rect x="620" y="140" width="150" height="90" rx="10" fill="url(#prfCompareGrad)"/>
    <text x="695" y="165" text-anchor="middle" font-size="13" font-weight="600" fill="white">Compare Results</text>
    <text x="695" y="195" text-anchor="middle" font-size="24" font-weight="700" fill="white">Δ = -0.03</text>
    <text x="695" y="218" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.85)">0.82 - 0.85 = -0.03</text>
  </g>

  <line x1="695" y1="230" x2="695" y2="265" stroke="#64748b" stroke-width="2" stroke-linecap="round" marker-end="url(#prfArrow)"/>

  <g transform="translate(620, 275)">
    <polygon points="75,0 150,45 75,90 0,45" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <text x="75" y="43" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Δ ≥ -0.05?</text>
    <text x="75" y="58" text-anchor="middle" font-size="11" fill="#64748b">(5% tolerance)</text>
  </g>

  <line x1="620" y1="320" x2="530" y2="320" stroke="#10b981" stroke-width="2" stroke-linecap="round"/>
  <line x1="530" y1="320" x2="530" y2="355" stroke="#10b981" stroke-width="2" stroke-linecap="round" marker-end="url(#prfArrow)"/>
  <text x="560" y="312" font-size="12" font-weight="600" fill="#10b981">Yes</text>

  <line x1="770" y1="320" x2="820" y2="320" stroke="#e11d48" stroke-width="2" stroke-linecap="round"/>
  <line x1="820" y1="320" x2="820" y2="355" stroke="#e11d48" stroke-width="2" stroke-linecap="round" marker-end="url(#prfArrow)"/>
  <text x="800" y="312" font-size="12" font-weight="600" fill="#e11d48">No</text>

  <g filter="url(#prfShadow)">
    <rect x="460" y="365" width="140" height="45" rx="22" fill="url(#prfPassGrad)"/>
    <text x="530" y="393" text-anchor="middle" font-size="16" font-weight="700" fill="white">PASS</text>
  </g>

  <g filter="url(#prfShadow)">
    <rect x="750" y="365" width="140" height="45" rx="22" fill="url(#prfFailGrad)"/>
    <text x="820" y="393" text-anchor="middle" font-size="16" font-weight="700" fill="white">FAIL</text>
  </g>

  <g transform="translate(30, 290)">
    <rect x="0" y="0" width="180" height="130" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="90" y="25" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Evaluation Criteria</text>
    <text x="15" y="50" font-size="11" fill="#475569">• Overall score delta</text>
    <text x="15" y="68" font-size="11" fill="#475569">• Per-category scores</text>
    <text x="15" y="86" font-size="11" fill="#475569">• New failure cases</text>
    <text x="15" y="104" font-size="11" fill="#475569">• Safety regressions</text>
    <text x="90" y="122" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">Block PRs with regression</text>
  </g>

  <g transform="translate(225, 290)">
    <rect x="0" y="0" width="180" height="130" rx="8" fill="#dcfce7" stroke="#10b981"/>
    <text x="90" y="25" text-anchor="middle" font-size="12" font-weight="600" fill="#059669">CI Integration</text>
    <text x="15" y="50" font-size="11" fill="#475569">1. PR modifies prompts</text>
    <text x="15" y="68" font-size="11" fill="#475569">2. CI runs regression test</text>
    <text x="15" y="86" font-size="11" fill="#475569">3. Compare vs baseline</text>
    <text x="15" y="104" font-size="11" fill="#475569">4. Auto-approve or block</text>
    <text x="90" y="122" text-anchor="middle" font-size="10" fill="#059669" font-style="italic">Nightly: update baseline</text>
  </g>

  <text x="450" y="440" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Prompt Regression Testing Workflow</text>
</svg>