<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="prfBaselineGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b"/>
      <stop offset="100%" style="stop-color:#475569"/>
    </linearGradient>
    <linearGradient id="prfCandidateGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="prfGoldenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="prfCompareGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="prfPassGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="prfFailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="prfShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-opacity="0.12"/>
    </filter>
    <marker id="prfArrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="450" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Prompt Regression Testing Flow</text>
  <text x="400" y="52" text-anchor="middle" font-size="12" fill="#64748b">Compare prompt versions against a golden dataset</text>
  
  <!-- Step 1: Baseline Prompt -->
  <g filter="url(#prfShadow)">
    <rect x="30" y="80" width="150" height="85" rx="10" fill="url(#prfBaselineGrad)"/>
    <text x="105" y="105" text-anchor="middle" font-size="12" font-weight="600" fill="white">Baseline Prompt</text>
    <text x="105" y="125" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">(v1.0)</text>
    <text x="105" y="150" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.7)">Production version</text>
  </g>
  
  <!-- Step 2: Candidate Prompt -->
  <g filter="url(#prfShadow)">
    <rect x="30" y="185" width="150" height="85" rx="10" fill="url(#prfCandidateGrad)"/>
    <text x="105" y="210" text-anchor="middle" font-size="12" font-weight="600" fill="white">Candidate Prompt</text>
    <text x="105" y="230" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">(v2.0)</text>
    <text x="105" y="255" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.7)">New version to test</text>
  </g>
  
  <!-- Step 3: Golden Dataset -->
  <g filter="url(#prfShadow)">
    <rect x="220" y="110" width="170" height="130" rx="10" fill="white" stroke="#f59e0b" stroke-width="2"/>
    <rect x="220" y="110" width="170" height="35" rx="10" fill="url(#prfGoldenGrad)"/>
    <rect x="220" y="133" width="170" height="12" fill="url(#prfGoldenGrad)"/>
    <text x="305" y="133" text-anchor="middle" font-size="11" font-weight="600" fill="white">📋 Golden Dataset</text>
    
    <text x="235" y="165" font-size="9" fill="#475569">- Curated test cases</text>
    <text x="235" y="180" font-size="9" fill="#475569">- Expected behaviors</text>
    <text x="235" y="195" font-size="9" fill="#475569">- Minimum scores</text>
    <text x="235" y="215" font-size="9" fill="#64748b" font-style="italic">100+ test cases</text>
  </g>
  
  <!-- Arrows from prompts to golden dataset -->
  <line x1="180" y1="122" x2="210" y2="150" stroke="#64748b" stroke-width="2" marker-end="url(#prfArrow)"/>
  <line x1="180" y1="227" x2="210" y2="200" stroke="#64748b" stroke-width="2" marker-end="url(#prfArrow)"/>
  
  <!-- Step 4: Run Evaluations -->
  <g filter="url(#prfShadow)">
    <rect x="430" y="80" width="140" height="65" rx="8" fill="#f1f5f9" stroke="#64748b"/>
    <text x="500" y="105" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Run Baseline</text>
    <text x="500" y="125" text-anchor="middle" font-size="14" font-weight="700" fill="#475569">Score: 0.85</text>
  </g>
  
  <g filter="url(#prfShadow)">
    <rect x="430" y="200" width="140" height="65" rx="8" fill="#ede9fe" stroke="#8b5cf6"/>
    <text x="500" y="225" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Run Candidate</text>
    <text x="500" y="245" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">Score: 0.82</text>
  </g>
  
  <!-- Arrows from dataset to evaluations -->
  <line x1="390" y1="155" x2="420" y2="120" stroke="#64748b" stroke-width="2" marker-end="url(#prfArrow)"/>
  <line x1="390" y1="195" x2="420" y2="225" stroke="#64748b" stroke-width="2" marker-end="url(#prfArrow)"/>
  
  <!-- Arrows to comparison -->
  <line x1="570" y1="112" x2="610" y2="155" stroke="#64748b" stroke-width="2" marker-end="url(#prfArrow)"/>
  <line x1="570" y1="232" x2="610" y2="195" stroke="#64748b" stroke-width="2" marker-end="url(#prfArrow)"/>
  
  <!-- Step 5: Compare Results -->
  <g filter="url(#prfShadow)">
    <rect x="620" y="130" width="150" height="90" rx="10" fill="url(#prfCompareGrad)"/>
    <text x="695" y="155" text-anchor="middle" font-size="12" font-weight="600" fill="white">Compare Results</text>
    <text x="695" y="180" text-anchor="middle" font-size="20" font-weight="700" fill="white">Δ = -0.03</text>
    <text x="695" y="205" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">0.82 - 0.85 = -0.03</text>
  </g>
  
  <!-- Arrow to decision -->
  <line x1="695" y1="220" x2="695" y2="260" stroke="#64748b" stroke-width="2" marker-end="url(#prfArrow)"/>
  
  <!-- Step 6: Decision -->
  <g transform="translate(620, 270)">
    <polygon points="75,0 150,45 75,90 0,45" fill="#f1f5f9" stroke="#64748b" stroke-width="2"/>
    <text x="75" y="40" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Δ ≥ -0.05?</text>
    <text x="75" y="55" text-anchor="middle" font-size="9" fill="#64748b">(5% tolerance)</text>
  </g>
  
  <!-- Branches -->
  <line x1="620" y1="315" x2="530" y2="315" stroke="#22c55e" stroke-width="2"/>
  <line x1="530" y1="315" x2="530" y2="355" stroke="#22c55e" stroke-width="2" marker-end="url(#prfArrow)"/>
  <text x="560" y="308" font-size="10" font-weight="600" fill="#22c55e">Yes</text>
  
  <line x1="770" y1="315" x2="860" y2="315" stroke="#ef4444" stroke-width="2"/>
  <line x1="860" y1="315" x2="860" y2="355" stroke="#ef4444" stroke-width="2"/>
  <text x="800" y="308" font-size="10" font-weight="600" fill="#ef4444">No</text>
  
  <!-- Note: Adjust fail branch to fit -->
  <line x1="770" y1="315" x2="820" y2="355" stroke="#ef4444" stroke-width="2" marker-end="url(#prfArrow)"/>
  
  <!-- Pass Result -->
  <g filter="url(#prfShadow)">
    <rect x="460" y="365" width="140" height="45" rx="22" fill="url(#prfPassGrad)"/>
    <text x="530" y="393" text-anchor="middle" font-size="14" font-weight="700" fill="white">PASS</text>
  </g>
  
  <!-- Fail Result -->
  <g filter="url(#prfShadow)">
    <rect x="750" y="365" width="140" height="45" rx="22" fill="url(#prfFailGrad)"/>
    <text x="820" y="393" text-anchor="middle" font-size="14" font-weight="700" fill="white">FAIL</text>
  </g>
  
  <!-- Info boxes at bottom left -->
  <g transform="translate(30, 295)">
    <rect x="0" y="0" width="180" height="115" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
    <text x="90" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#475569">Evaluation Criteria</text>
    <text x="10" y="40" font-size="9" fill="#475569">- Overall score delta</text>
    <text x="10" y="55" font-size="9" fill="#475569">- Per-category scores</text>
    <text x="10" y="70" font-size="9" fill="#475569">- New failure cases</text>
    <text x="10" y="85" font-size="9" fill="#475569">- Safety regressions</text>
    <text x="10" y="105" font-size="9" fill="#64748b" font-style="italic">Block PRs with regression</text>
  </g>
  
  <g transform="translate(230, 295)">
    <rect x="0" y="0" width="180" height="115" rx="8" fill="#dcfce7" stroke="#10b981"/>
    <text x="90" y="20" text-anchor="middle" font-size="10" font-weight="600" fill="#059669">CI Integration</text>
    <text x="10" y="40" font-size="9" fill="#475569">1. PR modifies prompts</text>
    <text x="10" y="55" font-size="9" fill="#475569">2. CI runs regression test</text>
    <text x="10" y="70" font-size="9" fill="#475569">3. Compare vs baseline</text>
    <text x="10" y="85" font-size="9" fill="#475569">4. Auto-approve or block</text>
    <text x="10" y="105" font-size="9" fill="#059669" font-style="italic">Nightly: update baseline</text>
  </g>
  
  <!-- Footer -->
  <text x="400" y="440" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Prompt Regression Testing Workflow</text>
</svg>