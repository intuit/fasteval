<svg viewBox="0 0 900 540" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="540" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Human Review Flow</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Validating subjective AI quality through interactive human-in-the-loop scoring</text>

  <g transform="translate(52, 110)">
    <g filter="url(#shadow)">
      <rect width="160" height="90" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#eff6ff"/>
      <rect y="22" width="160" height="10" fill="#eff6ff"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">1. TEST RUNS</text>
      <text x="80" y="58" text-anchor="middle" font-size="12" fill="#475569">LLM generates</text>
      <text x="80" y="76" text-anchor="middle" font-size="12" fill="#475569">response</text>
    </g>

    <line x1="160" y1="45" x2="212" y2="45" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(212, 0)" filter="url(#shadow)">
      <rect width="160" height="90" rx="12" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#f1f5f9"/>
      <rect y="22" width="160" height="10" fill="#f1f5f9"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">2. AUTO METRICS</text>
      <text x="80" y="58" text-anchor="middle" font-size="12" fill="#475569">Correctness &amp;</text>
      <text x="80" y="76" text-anchor="middle" font-size="12" fill="#475569">Relevance</text>
    </g>

    <line x1="372" y1="45" x2="424" y2="45" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(424, 0)" filter="url(#shadow)">
      <rect width="160" height="90" rx="12" fill="white" stroke="#fcd34d" stroke-width="2"/>
      <rect width="160" height="32" rx="12" fill="#fffbeb"/>
      <rect y="22" width="160" height="10" fill="#fffbeb"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">3. HUMAN REVIEW</text>
      <text x="80" y="58" text-anchor="middle" font-size="12" fill="#475569">Interactive</text>
      <text x="80" y="76" text-anchor="middle" font-size="12" fill="#475569">CLI Scoring</text>
    </g>

    <line x1="584" y1="45" x2="636" y2="45" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(636, 0)" filter="url(#shadow)">
      <rect width="160" height="90" rx="12" fill="white" stroke="#86efac" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#ecfdf5"/>
      <rect y="22" width="160" height="10" fill="#ecfdf5"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">4. FINAL RESULT</text>
      <text x="80" y="70" text-anchor="middle" font-size="18" font-weight="800" fill="#10b981">PASS</text>
    </g>
  </g>

  <g transform="translate(60, 240)" filter="url(#shadow)">
    <rect width="780" height="250" rx="12" fill="#0f172a"/>
    <rect width="780" height="32" rx="12" fill="#1e293b"/>
    <rect y="20" width="780" height="12" fill="#1e293b"/>
    <circle cx="20" cy="16" r="5" fill="#ef4444"/>
    <circle cx="36" cy="16" r="5" fill="#f59e0b"/>
    <circle cx="52" cy="16" r="5" fill="#22c55e"/>
    <text x="390" y="21" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Interactive Human Review Prompt</text>

    <g transform="translate(25, 60)" font-family="monospace" font-size="12">
      <text y="0" fill="#fbbf24">══════════════════════════════════════════</text>
      <text y="20" font-weight="700" fill="#fbbf24">HUMAN REVIEW REQUESTED</text>
      <text y="40" fill="#fbbf24">══════════════════════════════════════════</text>
      
      <text y="70" fill="#94a3b8">User Request:</text>
      <text x="120" y="70" fill="#f8fafc">"What is the capital of France?"</text>
      
      <text y="90" fill="#94a3b8">Agent Response:</text>
      <text x="120" y="90" fill="#f8fafc">"The capital of France is Paris."</text>
      
      <text y="120" fill="#94a3b8">Auto-Metrics:</text>
      <text x="120" y="120" fill="#10b981">PASS (correctness: 0.92, toxicity: 0.98)</text>
      
      <text y="150" fill="#60a5fa">Question: Is this response helpful?</text>
      <text y="170" fill="#fbbf24">Score [1-5] or [p]ass/[f]ail/[s]kip: _</text>

    </g>
  </g>

  <text x="450" y="528" text-anchor="middle" font-size="11" fill="#94a3b8">FastEval Documentation • Human-in-the-loop Evaluation • 2026 Standards</text>
</svg>
