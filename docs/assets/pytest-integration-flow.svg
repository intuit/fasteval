<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Pytest Integration Flow</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Lifecycle of a FastEval test from discovery to final outcome</text>

  <g transform="translate(70, 110)">
    <g filter="url(#shadow)">
      <rect width="160" height="90" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#f1f5f9"/>
      <rect y="20" width="160" height="12" fill="#f1f5f9"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">1. COLLECTION</text>
      <text x="80" y="58" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Pytest Discovers</text>
      <text x="80" y="76" text-anchor="middle" font-size="11" fill="#94a3b8">test_*.py files</text>
    </g>

    <line x1="160" y1="45" x2="200" y2="45" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(200, 0)" filter="url(#shadow)">
      <rect width="160" height="90" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#eff6ff"/>
      <rect y="20" width="160" height="12" fill="#eff6ff"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">2. REGISTRATION</text>
      <text x="80" y="58" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">FastEval Intercepts</text>
      <text x="80" y="76" text-anchor="middle" font-size="11" fill="#94a3b8">@fe decorators</text>
    </g>

    <line x1="360" y1="45" x2="400" y2="45" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(400, 0)" filter="url(#shadow)">
      <rect width="160" height="90" rx="12" fill="white" stroke="#ddd6fe" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#f5f3ff"/>
      <rect y="20" width="160" height="12" fill="#f5f3ff"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">3. EXECUTION</text>
      <text x="80" y="58" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">Test Function Runs</text>
      <text x="80" y="76" text-anchor="middle" font-size="11" fill="#94a3b8">LLM/Agent generation</text>
    </g>

    <line x1="560" y1="45" x2="600" y2="45" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(600, 0)" filter="url(#shadow)">
      <rect width="160" height="90" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#eef2ff"/>
      <rect y="20" width="160" height="12" fill="#eef2ff"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">4. RECORDING</text>
      <text x="80" y="58" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">fe.score() Calls</text>
      <text x="80" y="76" text-anchor="middle" font-size="11" fill="#94a3b8">Log inputs/outputs</text>
    </g>
  </g>

  <line x1="750" y1="200" x2="750" y2="230" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <g transform="translate(150, 230)" filter="url(#shadow)">
    <rect width="625" height="110" rx="12" fill="white" stroke="#86efac" stroke-width="2"/>
    <rect width="625" height="40" rx="12" fill="#ecfdf5"/>
    <rect y="30" width="600" height="10" fill="#ecfdf5"/>
    <text x="300" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#047857">5. EVALUATION: LLM JUDGE BENCHMARK</text>
    
    <g transform="translate(25, 55)">
      <rect width="105" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="52.5" y="25" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">correctness</text>
      
      <rect x="115" width="105" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="167.5" y="25" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">relevance</text>
      
      <rect x="230" width="105" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="282.5" y="25" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">toxicity</text>
      
      <rect x="345" width="105" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="397.5" y="25" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">faithfulness</text>
      
      <rect x="460" width="115" height="40" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="517.5" y="25" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">custom_logic</text>
    </g>
  </g>

  <g fill="none" stroke="#cbd5e1" stroke-width="2">
    <path d="M 450 340 L 450 370 L 270 370 L 270 395" marker-end="url(#arrowhead)"/>
    <path d="M 450 370 L 630 370 L 630 395" marker-end="url(#arrowhead)"/>
  </g>
  <text x="360" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">ALL ≥ THRESHOLD</text>
  <text x="540" y="365" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">ANY &lt; THRESHOLD</text>

  <g transform="translate(190, 395)">
    <g filter="url(#shadow)">
      <rect width="160" height="50" rx="25" fill="white" stroke="#22c55e" stroke-width="2"/>
      <text x="80" y="31" text-anchor="middle" font-size="15" font-weight="800" fill="#166534">RESULT: PASS</text>
    </g>
    <g transform="translate(360, 0)" filter="url(#shadow)">
      <rect width="160" height="50" rx="25" fill="white" stroke="#ef4444" stroke-width="2"/>
      <text x="80" y="31" text-anchor="middle" font-size="15" font-weight="800" fill="#991b1b">RESULT: FAIL</text>
    </g>
  </g>

  <g transform="translate(40, 240)" filter="url(#shadow)">
    <rect width="100" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-dasharray="4 2"/>
    <text x="50" y="25" text-anchor="middle" font-size="10" font-weight="700" fill="#64748b">PLUG-AND-PLAY</text>
    <text x="10" y="45" font-size="9" fill="#94a3b8">FastEval is auto-</text>
    <text x="10" y="58" font-size="9" fill="#94a3b8">registered as a</text>
    <text x="10" y="71" font-size="9" fill="#94a3b8">pytest plugin on</text>
    <text x="10" y="84" font-size="9" fill="#94a3b8">installation.</text>
  </g>

  <text x="450" y="508" text-anchor="middle" font-size="11" fill="#94a3b8">FastEval Documentation • Pytest Integration Standards • 2026</text>
</svg>
