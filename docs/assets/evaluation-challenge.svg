<svg viewBox="0 0 850 330" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="challengeAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <filter id="challengeShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="850" height="420" fill="#f8fafc"/>

  <text x="425" y="35" text-anchor="middle" font-size="24" font-weight="700" fill="#1e293b">The Evaluation Challenge</text>

  <line x1="425" y1="65" x2="425" y2="300" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="6 6"/>
  <circle cx="425" cy="180" r="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="425" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#64748b">VS</text>

  <g transform="translate(20, 65)">
    <rect x="0" y="0" width="380" height="40" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <circle cx="25" cy="20" r="9" fill="#ef4444"/>
    <text x="25" y="24" text-anchor="middle" font-size="11" font-weight="700" fill="white">✗</text>
    <text x="45" y="25" font-size="14" font-weight="600" fill="#991b1b">Before: Traditional Approaches</text>

    <g transform="translate(0, 55)" filter="url(#challengeShadow)">
      <rect width="180" height="80" rx="8" fill="white" stroke="#fecaca" stroke-width="1.5"/>
      <text x="15" y="25" font-size="13" font-weight="600" fill="#991b1b">String Matching</text>
      <text x="15" y="45" font-size="11" font-family="monospace" fill="#7f1d1d">assert "42" == text</text>
      <text x="15" y="65" font-size="11" font-weight="500" fill="#dc2626">✗ Fails on format changes</text>
    </g>

    <g transform="translate(200, 55)" filter="url(#challengeShadow)">
      <rect width="180" height="80" rx="8" fill="white" stroke="#fecaca" stroke-width="1.5"/>
      <text x="15" y="25" font-size="13" font-weight="600" fill="#991b1b">Manual Review</text>
      <text x="15" y="45" font-size="11" fill="#7f1d1d">Human reads outputs</text>
      <text x="15" y="65" font-size="11" font-weight="500" fill="#dc2626">✗ $1k+/mo for 1% coverage</text>
    </g>

    <g transform="translate(0, 150)" filter="url(#challengeShadow)">
      <rect width="180" height="80" rx="8" fill="white" stroke="#fecaca" stroke-width="1.5"/>
      <text x="15" y="25" font-size="13" font-weight="600" fill="#991b1b">Regex Patterns</text>
      <text x="15" y="45" font-size="11" font-family="monospace" fill="#7f1d1d">re.match(pattern, text)</text>
      <text x="15" y="65" font-size="11" font-weight="500" fill="#dc2626">✗ Brittle and unscalable</text>
    </g>

    <g transform="translate(200, 150)" filter="url(#challengeShadow)">
      <rect width="180" height="80" rx="8" fill="white" stroke="#fecaca" stroke-width="1.5"/>
      <text x="15" y="25" font-size="13" font-weight="600" fill="#991b1b">Human Annotation</text>
      <text x="15" y="45" font-size="11" fill="#7f1d1d">Paid annotators grade</text>
      <text x="15" y="65" font-size="11" font-weight="500" fill="#dc2626">✗ Days of latency</text>
    </g>
  </g>

  <g transform="translate(450, 65)">
    <rect x="0" y="0" width="380" height="40" rx="8" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1"/>
    <circle cx="25" cy="20" r="9" fill="#22c55e"/>
    <text x="25" y="24" text-anchor="middle" font-size="11" font-weight="700" fill="white">✓</text>
    <text x="45" y="25" font-size="14" font-weight="600" fill="#166534">After: fasteval</text>

    <g transform="translate(0, 55)" filter="url(#challengeShadow)">
      <rect width="380" height="175" rx="12" fill="white" stroke="#86efac" stroke-width="2"/>

      <rect x="15" y="15" width="350" height="100" rx="8" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
      <text x="30" y="38" font-family="monospace" font-size="12" xml:space="preserve"><tspan fill="#c7d2fe">import</tspan> <tspan fill="#f8fafc">fasteval</tspan> <tspan fill="#c7d2fe">as</tspan> <tspan fill="#f8fafc">fe</tspan></text>

      <text x="30" y="60" font-family="monospace" font-size="12" xml:space="preserve"><tspan fill="#a78bfa">@fe.correctness</tspan><tspan fill="#fbbf24">(threshold=0.8)</tspan></text>

      <text x="30" y="82" font-family="monospace" font-size="12" xml:space="preserve"><tspan fill="#60a5fa">def</tspan> <tspan fill="#818cf8">test_qa</tspan><tspan fill="#f8fafc">():</tspan></text>

      <text x="50" y="104" font-family="monospace" font-size="12" xml:space="preserve"><tspan fill="#f8fafc">fe.score(response, </tspan><tspan fill="#fbbf24">"42"</tspan><tspan fill="#f8fafc">)</tspan></text>

      <text x="25" y="145" font-size="12" font-weight="600" fill="#166534">✓ Semantic grading <tspan font-weight="400">("The answer is 42" passes)</tspan></text>
      <text x="25" y="163" font-size="12" font-weight="600" fill="#166534">✓ Runs natively in your CI pipeline</text>
    </g>

  </g>

</svg>