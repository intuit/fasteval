<svg viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="460" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">The Evaluation Challenge</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Moving from rigid assertions to semantic intelligence</text>

  <line x1="450" y1="100" x2="450" y2="400" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="8 4"/>
  <circle cx="450" cy="250" r="22" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <text x="450" y="255" text-anchor="middle" font-size="13" font-weight="800" fill="#94a3b8">VS</text>

  <g transform="translate(40, 100)">
    <rect width="380" height="40" rx="8" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
    <text x="20" y="25" font-size="14" font-weight="700" fill="#991b1b">BEFORE: Rigid &amp; Manual</text>

    <g transform="translate(0, 55)">
      <g filter="url(#shadow)">
        <rect width="180" height="85" rx="12" fill="white" stroke="#fecaca" stroke-width="1.5"/>
        <text x="15" y="28" font-size="13" font-weight="700" fill="#991b1b">String Matching</text>
        <text x="15" y="48" font-size="11" font-family="monospace" fill="#475569">assert result == "42"</text>
        <text x="15" y="68" font-size="11" font-weight="600" fill="#ef4444">Fails on formatting</text>
      </g>
      <g transform="translate(200, 0)" filter="url(#shadow)">
        <rect width="180" height="85" rx="12" fill="white" stroke="#fecaca" stroke-width="1.5"/>
        <text x="15" y="28" font-size="13" font-weight="700" fill="#991b1b">Regex Patterns</text>
        <text x="15" y="48" font-size="11" font-family="monospace" fill="#475569">re.match(r"^\d+$", ...)</text>
        <text x="15" y="68" font-size="11" font-weight="600" fill="#ef4444">Brittle &amp; unscalable</text>
      </g>
      <g transform="translate(0, 100)" filter="url(#shadow)">
        <rect width="180" height="85" rx="12" fill="white" stroke="#fecaca" stroke-width="1.5"/>
        <text x="15" y="28" font-size="13" font-weight="700" fill="#991b1b">Manual Review</text>
        <text x="15" y="48" font-size="11" fill="#475569">Human reads outputs</text>
        <text x="15" y="68" font-size="11" font-weight="600" fill="#ef4444">Prohibitively expensive</text>
      </g>
      <g transform="translate(200, 100)" filter="url(#shadow)">
        <rect width="180" height="85" rx="12" fill="white" stroke="#fecaca" stroke-width="1.5"/>
        <text x="15" y="28" font-size="13" font-weight="700" fill="#991b1b">Paid Annotation</text>
        <text x="15" y="48" font-size="11" fill="#475569">External labeling</text>
        <text x="15" y="68" font-size="11" font-weight="600" fill="#ef4444">High latency (days)</text>
      </g>
    </g>
  </g>

  <g transform="translate(480, 100)">
    <rect width="380" height="40" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="1"/>
    <text x="20" y="25" font-size="14" font-weight="700" fill="#047857">AFTER: fasteval</text>

    <g transform="translate(0, 55)" filter="url(#shadow)">
      <rect width="380" height="235" rx="12" fill="white" stroke="#86efac" stroke-width="2"/>
      
      <rect x="15" y="15" width="350" height="120" rx="8" fill="#0f172a"/>
      <g transform="translate(30, 40)" font-family="monospace" font-size="12">
        <text y="0"><tspan fill="#a78bfa">@fe.correctness</tspan><tspan fill="#fbbf24">(threshold=0.8)</tspan></text>
        <text y="22"><tspan fill="#60a5fa">def</tspan> <tspan fill="#f8fafc">test_qa():</tspan></text>
        <text y="44"><tspan fill="#475569">  # "The answer is 42" will pass here</tspan></text>
        <text y="66"><tspan fill="#f8fafc">  fe.score(response, </tspan><tspan fill="#fbbf24">"42"</tspan><tspan fill="#f8fafc">)</tspan></text>
      </g>

      <g transform="translate(25, 155)">
        <text font-size="13" font-weight="700" fill="#059669">Semantic Grading</text>
        <text y="18" font-size="12" fill="#475569">Understands intent, not just characters.</text>
        
        <text y="45" font-size="13" font-weight="700" fill="#059669">CI/CD Native</text>
        <text y="63" font-size="12" fill="#475569">Automated quality gate for every PR.</text>
      </g>
    </g>
  </g>

  <text x="450" y="448" text-anchor="middle" font-size="11" fill="#94a3b8">FastEval Documentation • Evaluation Standards 2026</text>
</svg>
