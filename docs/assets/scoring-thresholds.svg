<svg viewBox="0 0 800 350" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="goodGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
    <linearGradient id="midGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="badGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <filter id="shadow4" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="350" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Score Range &amp; Threshold Selection</text>
  
  <!-- Score Bar Background -->
  <rect x="50" y="70" width="700" height="60" rx="8" fill="#e2e8f0"/>
  
  <!-- Poor Section (0.0 - 0.3) -->
  <rect x="50" y="70" width="210" height="60" rx="8" fill="url(#badGrad)"/>
  <text x="155" y="95" text-anchor="middle" font-size="14" font-weight="600" fill="white">POOR</text>
  <text x="155" y="115" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">0.0 - 0.3</text>
  
  <!-- Moderate Section (0.3 - 0.7) -->
  <rect x="260" y="70" width="280" height="60" fill="url(#midGrad)"/>
  <text x="400" y="95" text-anchor="middle" font-size="14" font-weight="600" fill="white">MODERATE</text>
  <text x="400" y="115" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">0.4 - 0.6</text>
  
  <!-- Good Section (0.7 - 1.0) -->
  <rect x="540" y="70" width="210" height="60" rx="8" fill="url(#goodGrad)"/>
  <text x="645" y="95" text-anchor="middle" font-size="14" font-weight="600" fill="white">GOOD</text>
  <text x="645" y="115" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">0.7 - 1.0</text>
  
  <!-- Scale Labels -->
  <text x="50" y="150" text-anchor="middle" font-size="12" font-weight="500" fill="#64748b">0.0</text>
  <text x="260" y="150" text-anchor="middle" font-size="12" font-weight="500" fill="#64748b">0.3</text>
  <text x="400" y="150" text-anchor="middle" font-size="12" font-weight="500" fill="#64748b">0.5</text>
  <text x="540" y="150" text-anchor="middle" font-size="12" font-weight="500" fill="#64748b">0.7</text>
  <text x="750" y="150" text-anchor="middle" font-size="12" font-weight="500" fill="#64748b">1.0</text>
  
  <!-- Threshold Marker -->
  <line x1="610" y1="55" x2="610" y2="135" stroke="#1e293b" stroke-width="3"/>
  <polygon points="610,55 600,45 620,45" fill="#1e293b"/>
  <rect x="560" y="30" width="100" height="20" rx="4" fill="#1e293b"/>
  <text x="610" y="44" text-anchor="middle" font-size="10" font-weight="600" fill="white">THRESHOLD: 0.8</text>
  
  <!-- Example Descriptions -->
  <g filter="url(#shadow4)">
    <rect x="50" y="170" width="220" height="80" rx="8" fill="white" stroke="#fecaca" stroke-width="2"/>
    <text x="160" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#dc2626">Below Threshold</text>
    <text x="160" y="215" text-anchor="middle" font-size="10" fill="#64748b">• Wrong answer</text>
    <text x="160" y="230" text-anchor="middle" font-size="10" fill="#64748b">• Off-topic response</text>
    <text x="160" y="245" text-anchor="middle" font-size="10" fill="#64748b">• Harmful content</text>
  </g>
  
  <g filter="url(#shadow4)">
    <rect x="290" y="170" width="220" height="80" rx="8" fill="white" stroke="#fef3c7" stroke-width="2"/>
    <text x="400" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#d97706">Needs Review</text>
    <text x="400" y="215" text-anchor="middle" font-size="10" fill="#64748b">• Partially correct</text>
    <text x="400" y="230" text-anchor="middle" font-size="10" fill="#64748b">• Missing details</text>
    <text x="400" y="245" text-anchor="middle" font-size="10" fill="#64748b">• Minor issues</text>
  </g>
  
  <g filter="url(#shadow4)">
    <rect x="530" y="170" width="220" height="80" rx="8" fill="white" stroke="#bbf7d0" stroke-width="2"/>
    <text x="640" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#16a34a">Passes Threshold</text>
    <text x="640" y="215" text-anchor="middle" font-size="10" fill="#64748b">• Fully correct</text>
    <text x="640" y="230" text-anchor="middle" font-size="10" fill="#64748b">• Relevant &amp; complete</text>
    <text x="640" y="245" text-anchor="middle" font-size="10" fill="#64748b">• Safe content</text>
  </g>
  
  <!-- Recommended Thresholds -->
  <text x="400" y="280" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Recommended Thresholds by Use Case</text>
  
  <g>
    <rect x="80" y="295" width="120" height="30" rx="4" fill="#fee2e2"/>
    <text x="140" y="315" text-anchor="middle" font-size="10" font-weight="500" fill="#dc2626">Safety: 0.95+</text>
  </g>
  
  <g>
    <rect x="220" y="295" width="120" height="30" rx="4" fill="#dbeafe"/>
    <text x="280" y="315" text-anchor="middle" font-size="10" font-weight="500" fill="#1d4ed8">Accuracy: 0.80</text>
  </g>
  
  <g>
    <rect x="360" y="295" width="130" height="30" rx="4" fill="#f3e8ff"/>
    <text x="425" y="315" text-anchor="middle" font-size="10" font-weight="500" fill="#7c3aed">Faithfulness: 0.85</text>
  </g>
  
  <g>
    <rect x="510" y="295" width="120" height="30" rx="4" fill="#fef3c7"/>
    <text x="570" y="315" text-anchor="middle" font-size="10" font-weight="500" fill="#d97706">Relevance: 0.70</text>
  </g>
  
  <g>
    <rect x="650" y="295" width="100" height="30" rx="4" fill="#dcfce7"/>
    <text x="700" y="315" text-anchor="middle" font-size="10" font-weight="500" fill="#16a34a">Creative: 0.60</text>
  </g>
  
  <!-- Footer -->
  <text x="400" y="345" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Calibrate thresholds empirically with your data</text>
</svg>
