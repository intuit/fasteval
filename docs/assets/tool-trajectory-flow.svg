<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Tool Trajectory Evaluation</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">How the tool_call_accuracy metric validates agentic decision paths</text>

  <g transform="translate(60, 110)">
    <g filter="url(#shadow)">
      <rect width="160" height="80" rx="12" fill="white" stroke="#fde68a" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#fffbeb"/>
      <rect y="22" width="160" height="10" fill="#fffbeb"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">USER QUERY</text>
      <text x="80" y="60" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">"Book flight to NYC"</text>
    </g>

    <line x1="160" y1="40" x2="200" y2="40" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(200, 0)" filter="url(#shadow)">
      <rect width="160" height="80" rx="12" fill="white" stroke="#ddd6fe" stroke-width="1.5"/>
      <rect width="160" height="32" rx="12" fill="#f5f3ff"/>
      <rect y="22" width="160" height="10" fill="#f5f3ff"/>
      <text x="80" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">AGENT ENGINE</text>
      <text x="80" y="58" text-anchor="middle" font-size="11" fill="#475569">Decides trajectory</text>
      <text x="80" y="72" text-anchor="middle" font-size="11" fill="#475569">and parameters</text>
    </g>

    <line x1="360" y1="40" x2="400" y2="40" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(400, 0)" filter="url(#shadow)">
      <rect width="180" height="95" rx="12" fill="white" stroke="#3b82f6" stroke-width="2"/>
      <rect width="180" height="32" rx="12" fill="#eff6ff"/>
      <rect y="22" width="180" height="10" fill="#eff6ff"/>
      <text x="90" y="21" text-anchor="middle" font-size="12" font-weight="800" fill="#1d4ed8">ACTUAL CALLS</text>
      <g transform="translate(15, 45)" font-family="monospace" font-size="11">
        <text y="15" fill="#1e40af">1. search_flights</text>
        <text y="35" fill="#1e40af">2. book_flight</text>
      </g>
    </g>

    <line x1="580" y1="40" x2="620" y2="40" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(620, 0)" filter="url(#shadow)">
      <rect width="180" height="95" rx="12" fill="white" stroke="#10b981" stroke-width="2"/>
      <rect width="180" height="32" rx="12" fill="#ecfdf5"/>
      <rect y="22" width="180" height="10" fill="#ecfdf5"/>
      <text x="90" y="21" text-anchor="middle" font-size="12" font-weight="800" fill="#047857">EXPECTED PATH</text>
      <g transform="translate(15, 45)" font-family="monospace" font-size="11">
        <text y="15" fill="#065f46">search_* (wildcard)</text>
        <text y="35" fill="#065f46">book_flight</text>
      </g>
    </g>
  </g>

  <path d="M 550 205 L 550 240 L 450 240 L 450 260" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 770 205 L 770 240 L 450 240" fill="none" stroke="#cbd5e1" stroke-width="2"/>

  <g transform="translate(250, 260)" filter="url(#shadow)">
    <rect width="400" height="100" rx="12" fill="white" stroke="#6366f1" stroke-width="1.5"/>
    <rect width="400" height="35" rx="12" fill="#eef2ff"/>
    <rect y="25" width="400" height="10" fill="#eef2ff"/>
    <text x="200" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">TRAJECTORY MATCHING ENGINE</text>
    
    <g transform="translate(20, 55)" font-size="12" fill="#475569">
      <text y="0" font-weight="700">Matched: <tspan font-family="monospace">2</tspan></text>
      <text y="22" font-weight="700">Total Attempts: <tspan font-family="monospace">2</tspan></text>
      <text x="360" y="15" text-anchor="end" font-size="11" fill="#64748b" font-style="italic">Supports wildcards &amp; arguments</text>
    </g>
  </g>

  <g transform="translate(250, 380)" filter="url(#shadow)">
    <rect width="400" height="70" rx="12" fill="#f8fafc" stroke="#10b981" stroke-width="2"/>
    <text x="200" y="32" text-anchor="middle" font-size="14" font-weight="800" fill="#047857">SCORE: 1.00 (PASS)</text>
    <text x="200" y="55" text-anchor="middle" font-size="12" fill="#059669">matched (2) / max(expected, actual) (2) = 1.0</text>
    <line x1="200" y1="-20" x2="200" y2="0" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
  </g>

  <g transform="translate(60, 260)">
    <rect width="170" height="190" rx="12" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
    <text x="85" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#475569">SCORING LOGIC</text>
    <line x1="20" y1="35" x2="150" y2="35" stroke="#cbd5e1" stroke-width="1"/>
    <g transform="translate(15, 60)" font-size="11">
      <text y="0" font-weight="700" fill="#059669">1.0: Full Match</text>
      <text y="15" fill="#64748b">Path is 1:1 perfect</text>
      
      <text y="45" font-weight="700" fill="#b45309">0.5: Missing Step</text>
      <text y="60" fill="#64748b">Missed 1 of 2 tools</text>

      <text y="90" font-weight="700" fill="#dc2626">0.67: Extra Call</text>
      <text y="105" fill="#64748b">3 actual vs 2 expected</text>
      <text y="120" font-size="10" fill="#475569" font-style="italic">Use ignore_extra=True</text>
    </g>
  </g>

  <g transform="translate(670, 260)">
    <rect width="170" height="190" rx="12" fill="#f5f3ff" stroke="#ddd6fe" stroke-width="1"/>
    <text x="85" y="25" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">CORE FEATURES</text>
    <line x1="20" y1="35" x2="150" y2="35" stroke="#ddd6fe" stroke-width="1"/>
    <g transform="translate(15, 60)" font-size="11" fill="#4c1d95">
      <text y="0">• Wildcard Patterning</text>
      <text y="25">• Optional Tool Steps</text>
      <text y="50">• Argument Validation</text>
      <text y="75">• State-aware Checks</text>
      <text y="100">• Strict Order Toggle</text>
    </g>
  </g>

  <text x="450" y="508" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • tool_call_accuracy Metric • Architectural Standards 2026</text>
</svg>
