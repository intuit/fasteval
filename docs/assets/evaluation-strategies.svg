<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="560" fill="#f8fafc"/>

  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Evaluation Strategy Decision Tree</text>
  <text x="450" y="65" text-anchor="middle" font-size="14" fill="#64748b">Choose the right evaluation approach based on your available data</text>

  <g transform="translate(310, 90)" filter="url(#shadow)">
    <rect width="280" height="60" rx="30" fill="white" stroke="#e2e8f0" stroke-width="2"/>
    <text x="140" y="35" text-anchor="middle" font-size="14" font-weight="600" fill="#1e293b">Do you have expected answers?</text>
  </g>

  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <path d="M 310 120 Q 255 120 255 210" marker-end="url(#arrowhead)"/>
    <path d="M 590 120 Q 645 120 645 210" marker-end="url(#arrowhead)"/>
  </g>

  <text x="235" y="115" font-size="12" font-weight="700" fill="#059669">YES</text>
  <text x="640" y="115" text-anchor="end" font-size="12" font-weight="700" fill="#dc2626">NO</text>

  <g transform="translate(95, 210)" filter="url(#shadow)">
    <rect width="320" height="200" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect width="320" height="40" rx="12" fill="#eff6ff"/>
    <rect y="30" width="320" height="10" fill="#eff6ff"/>
    <text x="160" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#1d4ed8">Reference-Based</text>
    <text x="160" y="62" text-anchor="middle" font-size="12" fill="#475569">Compare against ground truth</text>
    
    <g transform="translate(20, 85)">
      <rect width="130" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="65" y="19" text-anchor="middle" font-size="11" fill="#475569">correctness</text>
      
      <rect x="150" width="130" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="215" y="19" text-anchor="middle" font-size="11" fill="#475569">exact_match</text>
      
      <rect y="40" width="130" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="65" y="59" text-anchor="middle" font-size="11" fill="#475569">faithfulness</text>
      
      <rect x="150" y="40" width="130" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="215" y="59" text-anchor="middle" font-size="11" fill="#475569">contains</text>
    </g>

    <text x="160" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Best for: RAG, Q&amp;A, Regression</text>
  </g>

  <g transform="translate(485, 210)" filter="url(#shadow)">
    <rect width="320" height="200" rx="12" fill="white" stroke="#ddd6fe" stroke-width="1.5"/>
    <rect width="320" height="40" rx="12" fill="#f5f3ff"/>
    <rect y="30" width="320" height="10" fill="#f5f3ff"/>
    <text x="160" y="26" text-anchor="middle" font-size="14" font-weight="700" fill="#6d28d9">Reference-Free</text>
    <text x="160" y="62" text-anchor="middle" font-size="12" fill="#475569">Evaluate without "correct" answer</text>
    
    <g transform="translate(20, 85)">
      <rect width="130" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="65" y="19" text-anchor="middle" font-size="11" fill="#475569">relevance</text>
      
      <rect x="150" width="130" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="215" y="19" text-anchor="middle" font-size="11" fill="#475569">toxicity</text>
      
      <rect y="40" width="130" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="65" y="59" text-anchor="middle" font-size="11" fill="#475569">bias</text>
      
      <rect x="150" y="40" width="130" height="30" rx="6" fill="#f8fafc" stroke="#e2e8f0"/>
      <text x="215" y="59" text-anchor="middle" font-size="11" fill="#475569">criteria</text>
    </g>

    <text x="160" y="180" text-anchor="middle" font-size="11" font-weight="600" fill="#94a3b8">Best for: Safety, Discovery, Quality</text>
  </g>

  <g transform="translate(450, 410)">
    <line x1="0" y1="0" x2="0" y2="30" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>
    <text x="10" y="22" font-size="11" font-weight="600" fill="#64748b">Need custom logic?</text>
  </g>

  <g transform="translate(290, 450)" filter="url(#shadow)">
    <rect width="320" height="50" rx="25" fill="white" stroke="#fcd34d" stroke-width="2"/>
    <text x="160" y="30" text-anchor="middle" font-size="14" font-weight="700" fill="#b45309">Rubric-Based (Criteria / Custom)</text>
  </g>

  <text x="450" y="548" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Documentation • Strategy Standards 2026</text>
</svg>
