<svg viewBox="0 0 800 340" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="tracingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="debugGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="analyticsGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="alertGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444"/>
      <stop offset="100%" style="stop-color:#dc2626"/>
    </linearGradient>
    <linearGradient id="costGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="compareGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <filter id="shadowObs" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.12"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="340" fill="#f8fafc"/>
  
  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Observability Benefits</text>
  
  <!-- Row 1: 3 boxes evenly spaced -->
  <!-- Tracing -->
  <g filter="url(#shadowObs)">
    <rect x="40" y="60" width="220" height="105" rx="12" fill="url(#tracingGrad)"/>
    <text x="150" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="white">TRACING</text>
    <line x1="60" y1="105" x2="240" y2="105" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="150" y="128" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">See full eval chain</text>
    <text x="150" y="148" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">LLM calls &amp; latency</text>
  </g>
  
  <!-- Debugging -->
  <g filter="url(#shadowObs)">
    <rect x="290" y="60" width="220" height="105" rx="12" fill="url(#debugGrad)"/>
    <text x="400" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="white">DEBUGGING</text>
    <line x1="310" y1="105" x2="490" y2="105" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="400" y="128" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Why did this fail?</text>
    <text x="400" y="148" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">View prompts &amp; responses</text>
  </g>
  
  <!-- Analytics -->
  <g filter="url(#shadowObs)">
    <rect x="540" y="60" width="220" height="105" rx="12" fill="url(#analyticsGrad)"/>
    <text x="650" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="white">ANALYTICS</text>
    <line x1="560" y1="105" x2="740" y2="105" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="650" y="128" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Track score trends</text>
    <text x="650" y="148" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">over time</text>
  </g>
  
  <!-- Row 2: 3 boxes evenly spaced -->
  <!-- Alerting -->
  <g filter="url(#shadowObs)">
    <rect x="40" y="190" width="220" height="105" rx="12" fill="url(#alertGrad)"/>
    <text x="150" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="white">ALERTING</text>
    <line x1="60" y1="235" x2="240" y2="235" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="150" y="258" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Notify on quality</text>
    <text x="150" y="278" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">degradation</text>
  </g>
  
  <!-- Cost -->
  <g filter="url(#shadowObs)">
    <rect x="290" y="190" width="220" height="105" rx="12" fill="url(#costGrad)"/>
    <text x="400" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="white">COST MONITORING</text>
    <line x1="310" y1="235" x2="490" y2="235" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="400" y="258" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Monitor eval API</text>
    <text x="400" y="278" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">spend &amp; token usage</text>
  </g>
  
  <!-- Comparison -->
  <g filter="url(#shadowObs)">
    <rect x="540" y="190" width="220" height="105" rx="12" fill="url(#compareGrad)"/>
    <text x="650" y="222" text-anchor="middle" font-size="14" font-weight="700" fill="white">COMPARISON</text>
    <line x1="560" y1="235" x2="740" y2="235" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
    <text x="650" y="258" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">Compare model</text>
    <text x="650" y="278" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.9)">versions &amp; prompts</text>
  </g>
  
  <!-- Footer -->
  <text x="400" y="325" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Connect to observability platforms for production monitoring</text>
</svg>
