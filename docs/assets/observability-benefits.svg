<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="900" height="480" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Observability Benefits</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Leveraging production monitoring to maintain high-quality AI agents</text>

  <g transform="translate(45, 110)" filter="url(#shadow)">
    <rect width="240" height="140" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect width="240" height="36" rx="12" fill="#eff6ff"/>
    <rect y="24" width="240" height="12" fill="#eff6ff"/>
    <text x="120" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">TRACING</text>
    <g transform="translate(20, 60)">
      <text y="0" font-size="12" fill="#475569" font-weight="600">• Full Evaluation Chain</text>
      <text y="20" font-size="11" fill="#64748b">Map nested LLM dependencies</text>
      <text y="45" font-size="12" fill="#475569" font-weight="600">• Latency Analysis</text>
      <text y="65" font-size="11" fill="#64748b">Identify call-level bottlenecks</text>
    </g>
  </g>

  <g transform="translate(330, 110)" filter="url(#shadow)">
    <rect width="240" height="140" rx="12" fill="white" stroke="#ddd6fe" stroke-width="1.5"/>
    <rect width="240" height="36" rx="12" fill="#f5f3ff"/>
    <rect y="24" width="240" height="12" fill="#f5f3ff"/>
    <text x="120" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">DEBUGGING</text>
    <g transform="translate(20, 60)">
      <text y="0" font-size="12" fill="#475569" font-weight="600">• Failure Inspection</text>
      <text y="20" font-size="11" fill="#64748b">Analyze exact input/output</text>
      <text y="45" font-size="12" fill="#475569" font-weight="600">• Prompt Visibility</text>
      <text y="65" font-size="11" fill="#64748b">View raw judge prompts</text>
    </g>
  </g>

  <g transform="translate(615, 110)" filter="url(#shadow)">
    <rect width="240" height="140" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
    <rect width="240" height="36" rx="12" fill="#ecfdf5"/>
    <rect y="24" width="240" height="12" fill="#ecfdf5"/>
    <text x="120" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">ANALYTICS</text>
    <g transform="translate(20, 60)">
      <text y="0" font-size="12" fill="#475569" font-weight="600">• Score Trends</text>
      <text y="20" font-size="11" fill="#64748b">Track metrics over time</text>
      <text y="45" font-size="12" fill="#475569" font-weight="600">• Quality Distribution</text>
      <text y="65" font-size="11" fill="#64748b">Segment by user or prompt</text>
    </g>
  </g>

  <g transform="translate(45, 280)" filter="url(#shadow)">
    <rect width="240" height="140" rx="12" fill="white" stroke="#fecaca" stroke-width="1.5"/>
    <rect width="240" height="36" rx="12" fill="#fef2f2"/>
    <rect y="24" width="240" height="12" fill="#fef2f2"/>
    <text x="120" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">ALERTING</text>
    <g transform="translate(20, 60)">
      <text y="0" font-size="12" fill="#475569" font-weight="600">• Quality Degradation</text>
      <text y="20" font-size="11" fill="#64748b">Slack/Email on score drops</text>
      <text y="45" font-size="12" fill="#475569" font-weight="600">• Toxicity Spikes</text>
      <text y="65" font-size="11" fill="#64748b">Immediate safety notifications</text>
    </g>
  </g>

  <g transform="translate(330, 280)" filter="url(#shadow)">
    <rect width="240" height="140" rx="12" fill="white" stroke="#fde68a" stroke-width="1.5"/>
    <rect width="240" height="36" rx="12" fill="#fffbeb"/>
    <rect y="24" width="240" height="12" fill="#fffbeb"/>
    <text x="120" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">COST MONITORING</text>
    <g transform="translate(20, 60)">
      <text y="0" font-size="12" fill="#475569" font-weight="600">• Token Usage</text>
      <text y="20" font-size="11" fill="#64748b">Track judge API consumption</text>
      <text y="45" font-size="12" fill="#475569" font-weight="600">• Spend Projection</text>
      <text y="65" font-size="11" fill="#64748b">Budget for CI/CD automation</text>
    </g>
  </g>

  <g transform="translate(615, 280)" filter="url(#shadow)">
    <rect width="240" height="140" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
    <rect width="240" height="36" rx="12" fill="#eff6ff"/>
    <rect y="24" width="240" height="12" fill="#eff6ff"/>
    <text x="120" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">COMPARISON</text>
    <g transform="translate(20, 60)">
      <text y="0" font-size="12" fill="#475569" font-weight="600">• Version Benchmarking</text>
      <text y="20" font-size="11" fill="#64748b">Compare v1 vs v2 outputs</text>
      <text y="45" font-size="12" fill="#475569" font-weight="600">• Prompt A/B Testing</text>
      <text y="65" font-size="11" fill="#64748b">Empirical evidence for changes</text>
    </g>
  </g>

  <text x="450" y="465" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Observability Architectural Standards • 2026</text>
</svg>
