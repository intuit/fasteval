<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Gradients -->
    <linearGradient id="heroGradBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="heroAccent1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="heroAccent2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="heroAccent3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#22c55e"/>
    </linearGradient>
    <linearGradient id="heroGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#6366f1;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:0"/>
    </linearGradient>
    
    <!-- Filters -->
    <filter id="heroShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#6366f1" flood-opacity="0.3"/>
    </filter>
    <filter id="heroGlowFilter" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Animated marker -->
    <marker id="heroArrow" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#64748b"/>
    </marker>
    
    <!-- Pulse animation -->
    <style>
      @keyframes heroPulse {
        0%, 100% { opacity: 0.3; }
        50% { opacity: 1; }
      }
      @keyframes heroFlow {
        0% { stroke-dashoffset: 20; }
        100% { stroke-dashoffset: 0; }
      }
      @keyframes heroScale {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      .hero-pulse { animation: heroPulse 2s ease-in-out infinite; }
      .hero-flow { animation: heroFlow 1.5s linear infinite; stroke-dasharray: 10 10; }
      .hero-glow { animation: heroPulse 3s ease-in-out infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="900" height="280" rx="16" fill="url(#heroGradBg)"/>
  
  <!-- Decorative grid pattern -->
  <g opacity="0.1">
    <line x1="0" y1="70" x2="900" y2="70" stroke="#64748b" stroke-width="0.5"/>
    <line x1="0" y1="140" x2="900" y2="140" stroke="#64748b" stroke-width="0.5"/>
    <line x1="0" y1="210" x2="900" y2="210" stroke="#64748b" stroke-width="0.5"/>
    <line x1="180" y1="0" x2="180" y2="280" stroke="#64748b" stroke-width="0.5"/>
    <line x1="360" y1="0" x2="360" y2="280" stroke="#64748b" stroke-width="0.5"/>
    <line x1="540" y1="0" x2="540" y2="280" stroke="#64748b" stroke-width="0.5"/>
    <line x1="720" y1="0" x2="720" y2="280" stroke="#64748b" stroke-width="0.5"/>
  </g>
  
  <!-- Title area -->
  <text x="450" y="40" text-anchor="middle" font-size="11" font-weight="500" fill="#94a3b8" letter-spacing="2">THE EVALUATION JOURNEY</text>
  
  <!-- Main flow visualization -->
  
  <!-- Step 1: Problem (Red zone) -->
  <g transform="translate(50, 70)">
    <rect width="160" height="140" rx="12" fill="#1e293b" stroke="#ef4444" stroke-width="1" stroke-opacity="0.3"/>
    
    <!-- Problem icon - question marks -->
    <circle cx="80" cy="45" r="25" fill="none" stroke="#ef4444" stroke-width="2" opacity="0.5"/>
    <text x="80" y="53" text-anchor="middle" font-size="24" fill="#ef4444">?</text>
    
    <text x="80" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#f8fafc">The Problem</text>
    <text x="80" y="110" text-anchor="middle" font-size="10" fill="#94a3b8">LLM outputs are</text>
    <text x="80" y="124" text-anchor="middle" font-size="10" fill="#94a3b8">non-deterministic</text>
    
    <rect x="20" y="135" width="120" height="24" rx="4" fill="#7f1d1d" opacity="0.3"/>
    <text x="80" y="151" text-anchor="middle" font-size="9" fill="#fca5a5">Manual review doesn't scale</text>
  </g>
  
  <!-- Arrow 1 with animation -->
  <g class="hero-pulse">
    <line x1="220" y1="140" x2="270" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#heroArrow)"/>
  </g>
  
  <!-- Step 2: fasteval (Purple/Blue zone) -->
  <g transform="translate(280, 70)" filter="url(#heroShadow)">
    <rect width="180" height="140" rx="12" fill="url(#heroAccent1)"/>
    
    <!-- Code icon -->
    <rect x="55" y="18" width="70" height="50" rx="6" fill="rgba(0,0,0,0.2)"/>
    <text x="90" y="38" text-anchor="middle" font-family="monospace" font-size="9" fill="#e0e7ff">@fe.metric()</text>
    <text x="90" y="52" text-anchor="middle" font-family="monospace" font-size="9" fill="#c7d2fe">def test_...</text>
    
    <text x="90" y="90" text-anchor="middle" font-size="13" font-weight="700" fill="white">fasteval</text>
    <text x="90" y="108" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">Decorator-first</text>
    <text x="90" y="122" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">LLM evaluation</text>
  </g>
  
  <!-- Arrow 2 with flow animation -->
  <line x1="470" y1="140" x2="520" y2="140" stroke="#64748b" stroke-width="2" class="hero-flow" marker-end="url(#heroArrow)"/>
  
  <!-- Step 3: LLM Judge (Blue zone) -->
  <g transform="translate(530, 70)">
    <rect width="160" height="140" rx="12" fill="url(#heroAccent2)"/>
    
    <!-- Brain/AI icon -->
    <circle cx="80" cy="40" r="22" fill="rgba(255,255,255,0.15)"/>
    <text x="80" y="47" text-anchor="middle" font-size="20">🧠</text>
    
    <text x="80" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="white">LLM Judge</text>
    <text x="80" y="103" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">Semantic evaluation</text>
    <text x="80" y="117" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.8)">with reasoning</text>
    
    <!-- Score indicator -->
    <rect x="50" y="125" width="60" height="20" rx="10" fill="rgba(255,255,255,0.2)"/>
    <text x="80" y="139" text-anchor="middle" font-size="10" font-weight="600" fill="white">0.92</text>
  </g>
  
  <!-- Arrow 3 -->
  <g class="hero-pulse" style="animation-delay: 0.5s">
    <line x1="700" y1="140" x2="750" y2="140" stroke="#64748b" stroke-width="2" marker-end="url(#heroArrow)"/>
  </g>
  
  <!-- Step 4: Confidence (Green zone) -->
  <g transform="translate(760, 70)">
    <rect width="120" height="140" rx="12" fill="url(#heroAccent3)"/>
    
    <!-- Checkmark icon -->
    <circle cx="60" cy="42" r="22" fill="rgba(255,255,255,0.2)"/>
    <text x="60" y="50" text-anchor="middle" font-size="22" fill="white">✓</text>
    
    <text x="60" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="white">Confidence</text>
    <text x="60" y="103" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">Ship with</text>
    <text x="60" y="117" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.85)">certainty</text>
    
    <!-- PASS badge -->
    <rect x="25" y="125" width="70" height="22" rx="11" fill="rgba(255,255,255,0.25)"/>
    <text x="60" y="140" text-anchor="middle" font-size="11" font-weight="700" fill="white">PASS</text>
  </g>
  
  <!-- Bottom tagline -->
  <rect x="250" y="230" width="400" height="36" rx="8" fill="#1e293b" stroke="#3b82f6" stroke-width="1" opacity="0.8"/>
  <text x="450" y="253" text-anchor="middle" font-size="12" fill="#f8fafc">
    <tspan font-weight="600">pytest test_agent.py</tspan>
    <tspan fill="#94a3b8"> — Evaluation as natural as unit testing</tspan>
  </text>
  
  <!-- Decorative glow line -->
  <rect x="0" y="276" width="900" height="4" fill="url(#heroGlow)" class="hero-glow"/>
</svg>
