<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="prodGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfdf5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d1fae5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="langfuseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e5e5;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="evalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#eff6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#dbeafe;stop-opacity:1" />
    </linearGradient>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
    </marker>
    <marker id="arrowheadDashed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
    </marker>
  </defs>

  <!-- Production Box -->
  <g>
    <rect x="20" y="40" width="200" height="160" rx="8" fill="url(#prodGrad)" stroke="#10b981" stroke-width="2"/>
    <text x="120" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#065f46" text-anchor="middle">Production</text>
    
    <!-- LLM App -->
    <rect x="40" y="85" width="160" height="40" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
    <text x="120" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#047857" text-anchor="middle">LLM Application</text>
    
    <!-- Langfuse SDK -->
    <rect x="40" y="140" width="160" height="40" rx="6" fill="white" stroke="#10b981" stroke-width="1.5"/>
    <text x="120" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#047857" text-anchor="middle">Langfuse SDK</text>
    
    <!-- Arrow from App to SDK -->
    <line x1="120" y1="125" x2="120" y2="137" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Langfuse Platform Box -->
  <g>
    <rect x="290" y="70" width="180" height="100" rx="8" fill="url(#langfuseGrad)" stroke="#737373" stroke-width="2"/>
    <text x="380" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#404040" text-anchor="middle">Langfuse Platform</text>
    
    <!-- Traces -->
    <rect x="310" y="110" width="140" height="40" rx="6" fill="white" stroke="#737373" stroke-width="1.5"/>
    <text x="380" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#525252" text-anchor="middle">Production Traces</text>
  </g>

  <!-- Evaluation Box -->
  <g>
    <rect x="540" y="40" width="240" height="160" rx="8" fill="url(#evalGrad)" stroke="#3b82f6" stroke-width="2"/>
    <text x="660" y="65" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" fill="#1e40af" text-anchor="middle">Offline Evaluation</text>
    
    <!-- fasteval -->
    <rect x="560" y="85" width="200" height="40" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="660" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle">fasteval + langfuse plugin</text>
    
    <!-- Metrics -->
    <rect x="560" y="140" width="200" height="40" rx="6" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="660" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1d4ed8" text-anchor="middle">LLM-as-Judge Metrics</text>
    
    <!-- Arrow from fasteval to Metrics -->
    <line x1="660" y1="125" x2="660" y2="137" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  </g>

  <!-- Solid Arrow: Production to Langfuse -->
  <line x1="220" y1="160" x2="286" y2="130" stroke="#64748b" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Dashed Arrow: Langfuse to Evaluation (fetch) -->
  <line x1="470" y1="115" x2="536" y2="105" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowheadDashed)"/>
  <text x="503" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">fetch</text>

  <!-- Dashed Arrow: Evaluation to Langfuse (push scores) -->
  <line x1="536" y1="145" x2="470" y2="145" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowheadDashed)"/>
  <text x="503" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">push scores</text>
</svg>
