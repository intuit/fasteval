<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Langfuse Integration Lifecycle</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Synchronizing production telemetry with offline quality benchmarks</text>

  <g transform="translate(60, 120)">
    <rect width="220" height="260" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="220" height="40" rx="12" fill="#ecfdf5"/>
    <rect y="30" width="220" height="10" fill="#ecfdf5"/>
    <text x="110" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">PRODUCTION</text>
    
    <rect x="20" y="60" width="180" height="60" rx="8" fill="white" stroke="#10b981" stroke-width="1.5"/>
    <text x="110" y="95" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">LLM Application</text>
    
    <line x1="110" y1="120" x2="110" y2="150" stroke="#10b981" stroke-width="1.5" marker-end="url(#arrowhead)"/>

    <rect x="20" y="160" width="180" height="60" rx="8" fill="white" stroke="#10b981" stroke-width="1.5"/>
    <text x="110" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#065f46">Langfuse SDK</text>
  </g>

  <path d="M 280 310 L 310 310 L 310 250 L 340 250" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

  <g transform="translate(340, 120)">
    <rect width="220" height="260" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="220" height="40" rx="12" fill="#f1f5f9"/>
    <rect y="30" width="220" height="10" fill="#f1f5f9"/>
    <text x="110" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">LANGFUSE PLATFORM</text>
    
    <rect x="20" y="100" width="180" height="80" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="110" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Production Traces</text>
    <text x="110" y="155" text-anchor="middle" font-size="11" fill="#64748b">Unified observation</text>
  </g>

  <line x1="560" y1="210" x2="620" y2="210" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowhead-blue)"/>
  <text x="590" y="200" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">fetch</text>

  <line x1="620" y1="290" x2="560" y2="290" stroke="#3b82f6" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowhead-blue)"/>
  <text x="590" y="310" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">push scores</text>

  <g transform="translate(620, 120)">
    <rect width="220" height="260" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5" filter="url(#shadow)"/>
    <rect width="220" height="40" rx="12" fill="#eff6ff"/>
    <rect y="30" width="220" height="10" fill="#eff6ff"/>
    <text x="110" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">OFFLINE EVALUATION</text>
    
    <rect x="20" y="60" width="180" height="60" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="110" y="88" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">fasteval</text>
    <text x="110" y="104" text-anchor="middle" font-size="10" fill="#2563eb">langfuse plugin</text>

    <line x1="110" y1="120" x2="110" y2="150" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowhead-blue)"/>

    <rect x="20" y="160" width="180" height="60" rx="8" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="110" y="195" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">LLM-as-Judge Metrics</text>
  </g>

  <text x="450" y="468" text-anchor="middle" font-size="11" fill="#94a3b8">FastEval Documentation • Langfuse Plugin Standards • 2026</text>
</svg>
