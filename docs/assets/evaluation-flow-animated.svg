<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="520" fill="#f8fafc"/>

  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Evaluation Pipeline</text>
  <text x="450" y="65" text-anchor="middle" font-size="14" fill="#64748b">How fasteval processes your tests from discovery to result</text>

  <g transform="translate(33.3, 100)">
    <g filter="url(#shadow)">
      <rect width="140" height="100" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
      <rect width="140" height="30" rx="12" fill="#eef2ff"/>
      <rect y="20" width="140" height="10" fill="#eef2ff"/>
      <text x="70" y="19" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">1. DECORATE</text>
      <text x="70" y="58" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Registration</text>
      <text x="70" y="78" text-anchor="middle" font-size="11" fill="#94a3b8">@fe.metric()</text>
    </g>

    <line x1="140" y1="50" x2="173.3" y2="50" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(173.3, 0)" filter="url(#shadow)">
      <rect width="140" height="100" rx="12" fill="white" stroke="#ddd6fe" stroke-width="1.5"/>
      <rect width="140" height="30" rx="12" fill="#f5f3ff"/>
      <rect y="20" width="140" height="10" fill="#f5f3ff"/>
      <text x="70" y="19" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">2. TEST</text>
      <text x="70" y="58" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Execution</text>
      <text x="70" y="78" text-anchor="middle" font-size="11" fill="#94a3b8">Run your agent</text>
    </g>

    <line x1="313.3" y1="50" x2="346.6" y2="50" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(346.6, 0)" filter="url(#shadow)">
      <rect width="140" height="100" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
      <rect width="140" height="30" rx="12" fill="#eff6ff"/>
      <rect y="20" width="140" height="10" fill="#eff6ff"/>
      <text x="70" y="19" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">3. SCORE</text>
      <text x="70" y="58" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Collection</text>
      <text x="70" y="78" text-anchor="middle" font-size="11" fill="#94a3b8">fe.score()</text>
    </g>

    <line x1="486.6" y1="50" x2="520" y2="50" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(520, 0)" filter="url(#shadow)">
      <rect width="140" height="100" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
      <rect width="140" height="30" rx="12" fill="#ecfdf5"/>
      <rect y="20" width="140" height="10" fill="#ecfdf5"/>
      <text x="70" y="19" text-anchor="middle" font-size="13" font-weight="700" fill="#059669">4. EVALUATE</text>
      <text x="70" y="58" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Judgement</text>
      <text x="70" y="78" text-anchor="middle" font-size="11" fill="#94a3b8">LLM Assessment</text>
    </g>

    <line x1="660" y1="50" x2="693.3" y2="50" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(693.3, 0)" filter="url(#shadow)">
      <rect width="140" height="100" rx="12" fill="white" stroke="#fcd34d" stroke-width="1.5"/>
      <rect width="140" height="30" rx="12" fill="#fffbeb"/>
      <rect y="20" width="140" height="10" fill="#fffbeb"/>
      <text x="70" y="19" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">5. RESULT</text>
      <text x="70" y="58" text-anchor="middle" font-size="12" font-weight="600" fill="#475569">Reporting</text>
      <text x="70" y="78" text-anchor="middle" font-size="11" fill="#94a3b8">PASS / FAIL</text>
    </g>
  </g>

  <g transform="translate(37.5, 235)">
    <g>
      <text x="125" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#64748b">YOUR CODE</text>
      <rect y="10" width="250" height="180" rx="8" fill="#0f172a" filter="url(#shadow)"/>
      <g transform="translate(15, 35)" font-family="monospace" font-size="11">
        <text y="0" fill="#94a3b8">import fasteval as fe</text>
        <text y="25" fill="#a78bfa">@fe.correctness<tspan fill="#fbbf24">(0.8)</tspan></text>
        <text y="45" fill="#a78bfa">@fe.toxicity<tspan fill="#fbbf24">(0.95)</tspan></text>
        <text y="70" fill="#60a5fa">def <tspan fill="#f8fafc">test_agent():</tspan></text>
        <text y="90" fill="#f8fafc">  resp = agent(query)</text>
        <text y="110" fill="#f8fafc">  fe.score(resp, ref)</text>
      </g>
    </g>

    <g transform="translate(287.5, 0)">
      <text x="125" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#64748b">LLM JUDGE EVALUATES</text>
      <rect y="10" width="250" height="180" rx="8" fill="#1e293b" filter="url(#shadow)"/>
      <g transform="translate(15, 35)">
        <rect width="220" height="50" rx="6" fill="#0f172a" stroke="#334155"/>
        <text x="110" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="#a78bfa">EVALUATION PROMPT</text>
        <text x="110" y="38" text-anchor="middle" font-size="10" fill="#94a3b8">"Rate the response logic..."</text>
        
        <path d="M 110 65 L 110 85" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        
        <rect y="95" width="105" height="60" rx="6" fill="#14532d"/>
        <text x="52.5" y="125" text-anchor="middle" font-size="12" font-weight="700" fill="#86efac">Score: 0.92</text>
        
        <rect x="115" y="95" width="105" height="60" rx="6" fill="#1e3a5f"/>
        <text x="167.5" y="125" text-anchor="middle" font-size="11" font-weight="600" fill="#93c5fd">+ Reasoning</text>
      </g>
    </g>

    <g transform="translate(575, 0)">
      <text x="125" y="0" text-anchor="middle" font-size="13" font-weight="700" fill="#64748b">PYTEST OUTPUT</text>
      <rect y="10" width="250" height="180" rx="8" fill="#0f172a" filter="url(#shadow)"/>
      <g transform="translate(15, 35)" font-family="monospace" font-size="11">
        <text y="0" fill="#94a3b8">$ pytest -v</text>
        <text y="25" fill="#f8fafc">test_agent.py .. [100%]</text>
        <text y="50" fill="#22c55e">✓ test_agent PASSED</text>
        <text y="75" fill="#94a3b8">-----------------------</text>
        <text y="95" fill="#94a3b8">correctness: <tspan fill="#22c55e">0.92</tspan></text>
        <text y="115" fill="#94a3b8">toxicity:    <tspan fill="#22c55e">0.98</tspan></text>
        <text y="140" fill="#fbbf24">Aggregate:   0.95</text>
      </g>
    </g>
  </g>

  <text x="450" y="508" text-anchor="middle" font-size="11" fill="#94a3b8">FastEval Documentation • Architectural Pipeline Standards • 2026</text>
</svg>
