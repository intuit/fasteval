<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">LangGraph Mocking Strategies</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Approaches to isolating agent nodes for deterministic unit testing</text>

  <line x1="450" y1="110" x2="450" y2="570" stroke="#e2e8f0" stroke-width="2" stroke-dasharray="8 4"/>
  <circle cx="450" cy="340" r="22" fill="white" stroke="#e2e8f0" stroke-width="2"/>
  <text x="450" y="345" text-anchor="middle" font-size="13" font-weight="800" fill="#94a3b8">VS</text>

  <g transform="translate(40, 110)">
    <rect width="380" height="40" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
    <text x="20" y="25" font-size="14" font-weight="700" fill="#1d4ed8">1. Direct Patching (Monkeypatch)</text>

    <g transform="translate(0, 55)" filter="url(#shadow)">
      <rect width="380" height="425" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
      
      <g transform="translate(20, 20)">
        <rect width="140" height="80" rx="8" fill="#f1f5f9" stroke="#e2e8f0"/>
        <text x="70" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">PRODUCTION</text>
        <rect x="20" y="40" width="100" height="24" rx="4" fill="#8b5cf6"/>
        <text x="70" y="56" text-anchor="middle" font-size="10" fill="white">retrieval_node</text>
        <text x="70" y="72" text-anchor="middle" font-size="9" fill="#94a3b8">Calls Real API</text>

        <line x1="145" y1="43" x2="185" y2="43" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <text x="165" y="35" text-anchor="middle" font-size="10" fill="#64748b">patch</text>

        <rect x="190" width="140" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
        <text x="260" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">PATCHED</text>
        <rect x="210" y="40" width="100" height="24" rx="4" fill="#2563eb"/>
        <text x="260" y="56" text-anchor="middle" font-size="10" fill="white">mock_retrieval</text>
        <text x="260" y="72" text-anchor="middle" font-size="9" fill="#3b82f6">Fixed Response</text>
      </g>

      <rect x="15" y="115" width="350" height="120" rx="8" fill="#0f172a"/>
      <g transform="translate(25, 140)" font-family="monospace" font-size="11">
        <text y="0" fill="#a78bfa">@patch(<tspan fill="#fbbf24">"agent.graph.retrieval"</tspan>)</text>
        <text y="22" fill="#60a5fa">def <tspan fill="#f8fafc">test_rag(mock_retrieval):</tspan></text>
        <text y="44" fill="#f8fafc">  mock_retrieval.return_value = {</text>
        <text y="66" fill="#fbbf24">    "context": ["Mocked docs"]</text>
        <text y="88" fill="#f8fafc">  }</text>
      </g>

      <g transform="translate(25, 255)">
        <text font-size="12" font-weight="700" fill="#059669">PROS</text>
        <text y="20" font-size="11" fill="#475569">• Zero production code changes</text>
        <text y="36" font-size="11" fill="#475569">• Quick setup for legacy apps</text>
        
        <text y="65" font-size="12" font-weight="700" fill="#dc2626">CONS</text>
        <text y="85" font-size="11" fill="#475569">• Brittle to internal refactoring</text>
        <text y="101" font-size="11" fill="#475569">• Path string must be exact</text>
      </g>

      <rect x="15" y="365" width="350" height="45" rx="8" fill="#fffbeb" stroke="#fcd34d"/>
      <text x="190" y="385" text-anchor="middle" font-size="11" font-weight="600" fill="#92400e">Patch where imported, not where defined!</text>
      <text x="190" y="398" text-anchor="middle" font-size="10" fill="#b45309">(Crucial for LangGraph node resolution)</text>
    </g>
  </g>

  <g transform="translate(480, 110)">
    <rect width="380" height="40" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-width="1"/>
    <text x="20" y="25" font-size="14" font-weight="700" fill="#047857">2. Dependency Injection (Factory)</text>

    <g transform="translate(0, 55)" filter="url(#shadow)">
      <rect width="380" height="425" rx="12" fill="white" stroke="#86efac" stroke-width="1.5"/>
      
      <g transform="translate(20, 20)">
        <rect width="340" height="80" rx="8" fill="#ecfdf5" stroke="#10b981" stroke-dasharray="4 4"/>
        <text x="170" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#059669">create_agent(retrieval_fn=None)</text>
        
        <rect x="20" y="38" width="135" height="30" rx="6" fill="white" stroke="#86efac"/>
        <text x="87" y="57" text-anchor="middle" font-size="10" fill="#059669">PROD: real_fn</text>

        <rect x="185" y="38" width="135" height="30" rx="6" fill="white" stroke="#86efac"/>
        <text x="252" y="57" text-anchor="middle" font-size="10" fill="#059669">TEST: mock_fn</text>
      </g>

      <rect x="15" y="115" width="350" height="120" rx="8" fill="#0f172a"/>
      <g transform="translate(25, 140)" font-family="monospace" font-size="11">
        <text y="0" fill="#60a5fa">def <tspan fill="#f8fafc">mock_retrieval(state):</tspan></text>
        <text y="22" fill="#10b981">  return {"context": ["Test Docs"]}</text>
        <text y="44" fill="#94a3b8"># Explicit injection</text>
        <text y="66" fill="#f8fafc">agent = create_agent(</text>
        <text y="88" fill="#f8fafc">  retrieval_fn=mock_retrieval</text>
        <text y="105" fill="#f8fafc">)</text>
      </g>

      <g transform="translate(25, 255)">
        <text font-size="12" font-weight="700" fill="#059669">PROS</text>
        <text y="20" font-size="11" fill="#475569">• Refactor-safe (explicit dependencies)</text>
        <text y="36" font-size="11" fill="#475569">• Perfect isolation / deterministic</text>
        
        <text y="65" font-size="12" font-weight="700" fill="#dc2626">CONS</text>
        <text y="85" font-size="11" fill="#475569">• Requires initial architectural planning</text>
        <text y="101" font-size="11" fill="#475569">• Slightly more verbose boilerplate</text>
      </g>

      <rect x="15" y="365" width="350" height="45" rx="8" fill="#eff6ff" stroke="#3b82f6"/>
      <text x="190" y="392" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">RECOMMENDED</text>
      <text x="190" y="405" text-anchor="middle" font-size="10" fill="#2563eb">Standard practice for production agents</text>
    </g>
  </g>

  <text x="450" y="605" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • LangGraph Architectural Standards • 2026</text>
</svg>
