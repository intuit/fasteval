<svg viewBox="0 0 900 550" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="900" height="550" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Faithfulness Claim Checking</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">How the metric verifies claims against retrieved context to detect hallucinations</text>

  <g transform="translate(70, 110)">
    <g filter="url(#shadow)">
      <rect width="220" height="110" rx="12" fill="white" stroke="#c7d2fe" stroke-width="1.5"/>
      <rect width="220" height="35" rx="12" fill="#f5f3ff"/>
      <rect y="25" width="220" height="10" fill="#f5f3ff"/>
      <text x="110" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">LLM RESPONSE</text>
      <text x="20" y="60" font-size="12" fill="#475569">"Returns are accepted within</text>
      <text x="20" y="78" font-size="12" fill="#475569">30 days. Free return shipping</text>
      <text x="20" y="96" font-size="12" fill="#475569">is included for all orders."</text>
    </g>

    <line x1="220" y1="55" x2="270" y2="55" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(270, 0)" filter="url(#shadow)">
      <rect width="220" height="110" rx="12" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
      <rect width="220" height="35" rx="12" fill="#eff6ff"/>
      <rect y="25" width="220" height="10" fill="#eff6ff"/>
      <text x="110" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">EXTRACT CLAIMS</text>
      <rect x="15" y="48" width="190" height="24" rx="6" fill="#f1f5f9"/>
      <text x="110" y="64" text-anchor="middle" font-size="11" fill="#475569">1. "Returns within 30 days"</text>
      <rect x="15" y="76" width="190" height="24" rx="6" fill="#f1f5f9"/>
      <text x="110" y="92" text-anchor="middle" font-size="11" fill="#475569">2. "Free return shipping"</text>
    </g>

    <line x1="490" y1="55" x2="540" y2="55" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g transform="translate(540, 0)" filter="url(#shadow)">
      <rect width="220" height="110" rx="12" fill="white" stroke="#fcd34d" stroke-width="1.5"/>
      <rect width="220" height="35" rx="12" fill="#fffbeb"/>
      <rect y="25" width="220" height="10" fill="#fffbeb"/>
      <text x="110" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">RETRIEVED CONTEXT</text>
      <text x="20" y="60" font-size="12" fill="#475569">"Our policy allows returns</text>
      <text x="20" y="78" font-size="12" fill="#475569">within 30 days. Items must</text>
      <text x="20" y="96" font-size="12" fill="#475569">be in original packaging."</text>
    </g>
  </g>

  <path d="M 450 220 L 450 250" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)"/>
  <path d="M 720 220 L 720 235 L 550 235 L 550 250" fill="none" stroke="#cbd5e1" stroke-width="2" marker-end="url(#arrowhead)"/>

  <g transform="translate(70, 250)">
    <g filter="url(#shadow)">
      <rect width="140" height="120" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
      <text x="70" y="25" text-anchor="middle" font-size="11" font-weight="700" fill="#94a3b8">FORMULA</text>
      <text x="70" y="55" text-anchor="middle" font-size="14" font-weight="700" fill="#6366f1">supported</text>
      <line x1="25" y1="65" x2="115" y2="65" stroke="#475569" stroke-width="1.5"/>
      <text x="70" y="85" text-anchor="middle" font-size="14" font-weight="700" fill="#6366f1">total claims</text>
    </g>

    <g transform="translate(160, 0)" filter="url(#shadow)">
      <rect width="600" height="120" rx="12" fill="white" stroke="#c7d2fe" stroke-width="2"/>
      <rect width="600" height="40" rx="12" fill="#eef2ff"/>
      <rect y="30" width="600" height="10" fill="#eef2ff"/>
      <text x="300" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">CROSS-REFERENCE CHECK</text>
      
      <g transform="translate(25, 55)">
        <rect width="260" height="50" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
        <text x="130" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">Claim 1: "Returns within 30 days"</text>
        <rect x="50" y="26" width="160" height="18" rx="4" fill="#10b981"/>
        <text x="130" y="39" text-anchor="middle" font-size="10" font-weight="800" fill="white">SUPPORTED</text>
      </g>

      <g transform="translate(315, 55)">
        <rect width="260" height="50" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
        <text x="130" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#475569">Claim 2: "Free return shipping"</text>
        <rect x="50" y="26" width="160" height="18" rx="4" fill="#ef4444"/>
        <text x="130" y="39" text-anchor="middle" font-size="10" font-weight="800" fill="white">NOT IN CONTEXT</text>
      </g>
    </g>
  </g>

  <g transform="translate(70, 400)">
    <g filter="url(#shadow)">
      <rect width="480" height="70" rx="12" fill="white" stroke="#ef4444" stroke-width="2"/>
      <text x="240" y="32" text-anchor="middle" font-size="15" font-weight="800" fill="#dc2626">SCORE = 0.50 (FAIL)</text>
      <text x="240" y="54" text-anchor="middle" font-size="12" fill="#991b1b">Calculated: 1 supported claim / 2 total claims. Below 0.85 threshold.</text>
    </g>

    <g transform="translate(510, 0)" filter="url(#shadow)">
      <rect width="250" height="70" rx="12" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="125" y="28" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">HALLUCINATION ALERT</text>
      <text x="125" y="48" text-anchor="middle" font-size="11" fill="#78350f">Unsupported claims indicate the bot is</text>
      <text x="125" y="60" text-anchor="middle" font-size="11" fill="#78350f">fabricating data outside retrieved facts.</text>
    </g>
  </g>

  <text x="450" y="538" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Faithfulness &amp; Grounding Metric • Architectural Standards 2026</text>
</svg>
