<svg viewBox="0 0 900 450" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="900" height="450" fill="#f8fafc"/>

  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Correctness Scoring Scale</text>
  <text x="450" y="65" text-anchor="middle" font-size="14" fill="#64748b">How the LLM judge evaluates semantic correctness (0.0 - 1.0)</text>

  <g transform="translate(50, 100)">
    <rect width="200" height="40" rx="6" fill="#ef4444"/>
    <rect x="200" width="200" height="40" fill="#f59e0b"/>
    <rect x="400" width="200" height="40" fill="#22c55e"/>
    <rect x="600" width="200" height="40" rx="6" fill="#10b981"/>
    
    <rect x="190" width="20" height="40" fill="#f59e0b"/>
    <rect x="390" width="20" height="40" fill="#22c55e"/>
    <rect x="590" width="20" height="40" fill="#10b981"/>

    <g font-size="11" font-weight="700" fill="white" text-anchor="middle">
      <text x="100" y="25">POOR</text>
      <text x="300" y="25">PARTIAL</text>
      <text x="500" y="25">GOOD</text>
      <text x="700" y="25">EXCELLENT</text>
    </g>

    <g font-size="11" font-weight="600" fill="#94a3b8" text-anchor="middle">
      <text x="0" y="60">0.0</text>
      <text x="200" y="60">0.5</text>
      <text x="400" y="60">0.7</text>
      <text x="600" y="60">0.9</text>
      <text x="800" y="60">1.0</text>
    </g>
  </g>

  <g transform="translate(36, 200)">
    <g filter="url(#shadow)">
      <rect width="180" height="120" rx="12" fill="white" stroke="#fecaca" stroke-width="1.5"/>
      <rect width="180" height="32" rx="12" fill="#fef2f2"/>
      <rect y="20" width="180" height="12" fill="#fef2f2"/>
      <text x="90" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">0.0 - 0.5</text>
      <text x="15" y="55" font-size="12" fill="#475569">Wrong answer or</text>
      <text x="15" y="73" font-size="12" fill="#475569">unrelated response</text>
      <text x="15" y="100" font-size="11" font-style="italic" fill="#94a3b8">Ex: Paris vs Tokyo</text>
    </g>

    <g transform="translate(216, 0)" filter="url(#shadow)">
      <rect width="180" height="120" rx="12" fill="white" stroke="#fffbeb" stroke-width="1.5"/>
      <rect width="180" height="32" rx="12" fill="#fffbeb"/>
      <rect y="20" width="180" height="12" fill="#fffbeb"/>
      <text x="90" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">0.5 - 0.7</text>
      <text x="15" y="55" font-size="12" fill="#475569">Partially correct,</text>
      <text x="15" y="73" font-size="12" fill="#475569">some info missing</text>
      <text x="15" y="100" font-size="11" font-style="italic" fill="#94a3b8">Ex: Year only vs full date</text>
    </g>

    <g transform="translate(432, 0)" filter="url(#shadow)">
      <rect width="180" height="120" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
      <rect width="180" height="32" rx="12" fill="#ecfdf5"/>
      <rect y="20" width="180" height="12" fill="#ecfdf5"/>
      <text x="90" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">0.7 - 0.9</text>
      <text x="15" y="55" font-size="12" fill="#475569">Correct with extra</text>
      <text x="15" y="73" font-size="12" fill="#475569">or varied wording</text>
      <text x="15" y="100" font-size="11" font-style="italic" fill="#94a3b8">Ex: Right answer + context</text>
    </g>

    <g transform="translate(648, 0)" filter="url(#shadow)">
      <rect width="180" height="120" rx="12" fill="white" stroke="#bbf7d0" stroke-width="1.5"/>
      <rect width="180" height="32" rx="12" fill="#ecfdf5"/>
      <rect y="20" width="180" height="12" fill="#ecfdf5"/>
      <text x="90" y="21" text-anchor="middle" font-size="13" font-weight="700" fill="#047857">0.9 - 1.0</text>
      <text x="15" y="55" font-size="12" fill="#475569">Perfect or near-</text>
      <text x="15" y="73" font-size="12" fill="#475569">perfect match</text>
      <text x="15" y="100" font-size="11" font-style="italic" fill="#94a3b8">Ex: Exact semantic hit</text>
    </g>
  </g>

  <g transform="translate(50, 360)">
    <rect width="800" height="40" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
    <text x="400" y="25" text-anchor="middle" font-size="11" fill="#475569">
      <tspan font-weight="700">Recommended Thresholds:</tspan> 
      Dev: <tspan fill="#3b82f6" font-weight="700">0.6</tspan> • 
      Test: <tspan fill="#8b5cf6" font-weight="700">0.75</tspan> • 
      Prod: <tspan fill="#10b981" font-weight="700">0.9</tspan>
    </text>
  </g>

  <text x="450" y="438" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Correctness Metric Scoring • Architectural Standards 2026</text>
</svg>
