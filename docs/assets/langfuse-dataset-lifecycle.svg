<svg viewBox="0 0 940 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>

  <rect width="940" height="480" fill="#f8fafc"/>

  <text x="470" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Dataset Regression Testing Lifecycle</text>
  <text x="470" y="65" text-anchor="middle" font-size="14" fill="#64748b">From production failure to permanent test case</text>

  <g transform="translate(30, 100)" filter="url(#shadow)">
    <rect width="155" height="120" rx="12" fill="white" stroke="#ef4444" stroke-width="2"/>
    <rect width="155" height="32" rx="12" fill="#fef2f2"/>
    <rect y="22" width="155" height="10" fill="#fef2f2"/>
    <circle cx="22" cy="18" r="10" fill="#ef4444"/>
    <text x="22" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="white">1</text>
    <text x="90" y="21" text-anchor="middle" font-size="12" font-weight="700" fill="#dc2626">DETECT</text>
    <text x="77.5" y="55" text-anchor="middle" font-size="10" fill="#475569">Trace evaluation</text>
    <text x="77.5" y="70" text-anchor="middle" font-size="10" fill="#475569">finds a failure</text>
    <rect x="15" y="85" width="125" height="22" rx="4" fill="#fef2f2" stroke="#fca5a5"/>
    <text x="77.5" y="100" text-anchor="middle" font-size="9" font-family="monospace" fill="#dc2626">correctness: 0.3</text>
  </g>

  <line x1="185" y1="160" x2="210" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(215, 100)" filter="url(#shadow)">
    <rect width="155" height="120" rx="12" fill="white" stroke="#7c3aed" stroke-width="2"/>
    <rect width="155" height="32" rx="12" fill="#f5f3ff"/>
    <rect y="22" width="155" height="10" fill="#f5f3ff"/>
    <circle cx="22" cy="18" r="10" fill="#7c3aed"/>
    <text x="22" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="white">2</text>
    <text x="90" y="21" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">PROMOTE</text>
    <text x="77.5" y="55" text-anchor="middle" font-size="10" fill="#475569">Add to golden</text>
    <text x="77.5" y="70" text-anchor="middle" font-size="10" fill="#475569">dataset + correct</text>
    <rect x="15" y="85" width="125" height="22" rx="4" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="77.5" y="100" text-anchor="middle" font-size="9" font-family="monospace" fill="#6d28d9">fe.add_to_golden()</text>
  </g>

  <line x1="370" y1="160" x2="395" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(400, 100)" filter="url(#shadow)">
    <rect width="155" height="120" rx="12" fill="white" stroke="#f59e0b" stroke-width="2"/>
    <rect width="155" height="32" rx="12" fill="#fffbeb"/>
    <rect y="22" width="155" height="10" fill="#fffbeb"/>
    <circle cx="22" cy="18" r="10" fill="#f59e0b"/>
    <text x="22" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="white">3</text>
    <text x="90" y="21" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309">FIX</text>
    <text x="77.5" y="55" text-anchor="middle" font-size="10" fill="#475569">Update prompt,</text>
    <text x="77.5" y="70" text-anchor="middle" font-size="10" fill="#475569">agent, or retrieval</text>
    <rect x="15" y="85" width="125" height="22" rx="4" fill="#fffbeb" stroke="#fcd34d"/>
    <text x="77.5" y="100" text-anchor="middle" font-size="9" font-family="monospace" fill="#b45309">agent_v2_final.py</text>
  </g>

  <line x1="555" y1="160" x2="580" y2="160" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <g transform="translate(585, 100)" filter="url(#shadow)">
    <rect width="155" height="120" rx="12" fill="white" stroke="#3b82f6" stroke-width="2"/>
    <rect width="155" height="32" rx="12" fill="#eff6ff"/>
    <rect y="22" width="155" height="10" fill="#eff6ff"/>
    <circle cx="22" cy="18" r="10" fill="#2563eb"/>
    <text x="22" y="22" text-anchor="middle" font-size="11" font-weight="700" fill="white">4</text>
    <text x="90" y="21" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">VERIFY</text>
    <text x="77.5" y="55" text-anchor="middle" font-size="10" fill="#475569">Run dataset test</text>
    <text x="77.5" y="70" text-anchor="middle" font-size="10" fill="#475569">vs. experiments</text>
    <rect x="15" y="85" width="125" height="22" rx="4" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="77.5" y="100" text-anchor="middle" font-size="9" font-family="monospace" fill="#1d4ed8">@langfuse_dataset</text>
  </g>

  <line x1="740" y1="160" x2="765" y2="160" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>

  <g transform="translate(770, 115)" filter="url(#shadow)">
    <rect width="140" height="90" rx="12" fill="#059669"/>
    <text x="70" y="35" text-anchor="middle" font-size="14" font-weight="700" fill="white">5</text>
    <text x="70" y="55" text-anchor="middle" font-size="13" font-weight="800" fill="white">DEPLOY</text>
    <text x="70" y="72" text-anchor="middle" font-size="10" fill="#d1fae5">CI PASSES</text>
  </g>

  <g transform="translate(30, 270)" filter="url(#shadow)">
    <rect width="880" height="130" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
    <rect width="880" height="36" rx="12" fill="#f1f5f9"/>
    <rect y="24" width="880" height="12" fill="#f1f5f9"/>
    <text x="440" y="23" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">LANGFUSE EXPERIMENTS  •  SIDE-BY-SIDE REGRESSION BENCHMARK</text>

    <text x="30" y="65" font-size="11" font-weight="700" fill="#334155">Dataset Item (Input)</text>
    <text x="400" y="65" font-size="11" font-weight="700" fill="#dc2626">Baseline: agent_v1</text>
    <text x="640" y="65" font-size="11" font-weight="700" fill="#059669">Candidate: agent_v2</text>
    <text x="800" y="65" font-size="11" font-weight="700" fill="#475569">Improvement</text>
    <line x1="20" y1="72" x2="860" y2="72" stroke="#e2e8f0" stroke-width="1"/>

    <text x="30" y="92" font-size="10" fill="#475569">"What's your refund policy?"</text>
    <text x="400" y="92" font-size="10" font-family="monospace" fill="#dc2626">0.45</text>
    <text x="640" y="92" font-size="10" font-family="monospace" fill="#059669">0.92</text>
    <rect x="795" y="79" width="60" height="18" rx="4" fill="#ecfdf5"/>
    <text x="825" y="92" text-anchor="middle" font-size="10" font-weight="700" fill="#059669">+104%</text>

    <text x="30" y="112" font-size="10" fill="#475569">"How do I reset my password?"</text>
    <text x="400" y="112" font-size="10" font-family="monospace" fill="#1e293b">0.88</text>
    <text x="640" y="112" font-size="10" font-family="monospace" fill="#059669">0.91</text>
    <rect x="795" y="99" width="60" height="18" rx="4" fill="#eff6ff"/>
    <text x="825" y="112" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">+3.4%</text>
  </g>

  <text x="470" y="440" text-anchor="middle" font-size="11" fill="#94a3b8">FastEval Documentation • Dataset Regression Testing • Architectural Standards 2026</text>
</svg>