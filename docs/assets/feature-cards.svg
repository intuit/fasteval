<svg viewBox="0 0 850 160" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="featureCard1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="featureCard2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <linearGradient id="featureCard3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <filter id="featureShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="850" height="160" fill="#f8fafc"/>
  
  <!-- Card 1: Decorator-First -->
  <g filter="url(#featureShadow)">
    <rect x="20" y="15" width="260" height="130" rx="12" fill="white"/>
    <rect x="20" y="15" width="260" height="6" rx="3" ry="0" fill="url(#featureCard1)"/>
    
    <!-- Icon -->
    <circle cx="55" cy="55" r="22" fill="#eef2ff"/>
    <text x="55" y="62" text-anchor="middle" font-size="22">🎯</text>
    
    <!-- Text -->
    <text x="90" y="52" font-size="14" font-weight="700" fill="#1e293b">Decorator-First</text>
    <text x="90" y="70" font-size="11" fill="#64748b">Define metrics on tests</text>
    
    <!-- Code snippet -->
    <rect x="35" y="85" width="230" height="45" rx="6" fill="#1e293b"/>
    <text x="50" y="105" font-family="monospace" font-size="10" fill="#a78bfa">@fe.correctness</text>
    <text x="145" y="105" font-family="monospace" font-size="10" fill="#fbbf24">(0.8)</text>
    <text x="50" y="120" font-family="monospace" font-size="10" fill="#60a5fa">def</text>
    <text x="75" y="120" font-family="monospace" font-size="10" fill="#f8fafc">test_agent():</text>
  </g>
  
  <!-- Card 2: Pytest Native -->
  <g filter="url(#featureShadow)">
    <rect x="295" y="15" width="260" height="130" rx="12" fill="white"/>
    <rect x="295" y="15" width="260" height="6" rx="3" ry="0" fill="url(#featureCard2)"/>
    
    <!-- Icon -->
    <circle cx="330" cy="55" r="22" fill="#eff6ff"/>
    <text x="330" y="62" text-anchor="middle" font-size="22">🧪</text>
    
    <!-- Text -->
    <text x="365" y="52" font-size="14" font-weight="700" fill="#1e293b">Pytest Native</text>
    <text x="365" y="70" font-size="11" fill="#64748b">Works with your tooling</text>
    
    <!-- Terminal snippet -->
    <rect x="310" y="85" width="230" height="45" rx="6" fill="#1e293b"/>
    <text x="325" y="105" font-family="monospace" font-size="10" fill="#94a3b8">$</text>
    <text x="340" y="105" font-family="monospace" font-size="10" fill="#10b981">pytest test_agent.py</text>
    <text x="325" y="120" font-family="monospace" font-size="10" fill="#22c55e">✓ PASSED</text>
    <text x="393" y="120" font-family="monospace" font-size="10" fill="#94a3b8">score: 0.92</text>
  </g>
  
  <!-- Card 3: Production Ready -->
  <g filter="url(#featureShadow)">
    <rect x="570" y="15" width="260" height="130" rx="12" fill="white"/>
    <rect x="570" y="15" width="260" height="6" rx="3" ry="0" fill="url(#featureCard3)"/>
    
    <!-- Icon -->
    <circle cx="605" cy="55" r="22" fill="#ecfdf5"/>
    <text x="605" y="62" text-anchor="middle" font-size="22">🚀</text>
    
    <!-- Text -->
    <text x="640" y="52" font-size="14" font-weight="700" fill="#1e293b">Production Ready</text>
    <text x="640" y="70" font-size="11" fill="#64748b">Monitor live systems</text>
    
    <!-- Code snippet -->
    <rect x="585" y="85" width="230" height="45" rx="6" fill="#1e293b"/>
    <text x="600" y="105" font-family="monospace" font-size="10" fill="#a78bfa">@observe</text>
    <text x="658" y="105" font-family="monospace" font-size="10" fill="#fbbf24">(rate=0.05)</text>
    <text x="600" y="120" font-family="monospace" font-size="10" fill="#94a3b8"># Evaluate 5% of traffic</text>
  </g>
</svg>
