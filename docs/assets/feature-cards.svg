<svg viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="900" height="200" fill="#f8fafc"/>

  <g transform="translate(40, 25)" filter="url(#shadow)">
    <rect width="260" height="150" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="260" height="6" rx="3" fill="#6366f1"/>
    
    <circle cx="45" cy="45" r="20" fill="#eef2ff"/>
    <rect x="37" y="37" width="16" height="16" rx="4" fill="#6366f1"/>
    
    <text x="75" y="42" font-size="14" font-weight="700" fill="#1e293b">Decorator-First</text>
    <text x="75" y="58" font-size="12" fill="#64748b">Define metrics directly on tests</text>

    <rect x="15" y="80" width="230" height="55" rx="8" fill="#0f172a"/>
    <g transform="translate(25, 102)" font-family="monospace" font-size="11">
      <text y="0" fill="#a78bfa">@fe.correctness<tspan fill="#fbbf24">(0.8)</tspan></text>
      <text y="18" fill="#60a5fa">def <tspan fill="#f8fafc">test_agent():</tspan></text>
    </g>
  </g>

  <g transform="translate(330, 25)" filter="url(#shadow)">
    <rect width="260" height="150" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="260" height="6" rx="3" fill="#3b82f6"/>
    
    <circle cx="45" cy="45" r="20" fill="#eff6ff"/>
    <path d="M 37 37 L 53 37 L 53 53 L 37 53 Z" fill="#3b82f6" opacity="0.8"/>
    
    <text x="75" y="42" font-size="14" font-weight="700" fill="#1e293b">Pytest Native</text>
    <text x="75" y="58" font-size="12" fill="#64748b">Works with existing tooling</text>

    <rect x="15" y="80" width="230" height="55" rx="8" fill="#1e293b"/>
    <g transform="translate(25, 102)" font-family="monospace" font-size="11">
      <text y="0" fill="#94a3b8">$ <tspan fill="#10b981">pytest test_agent.py</tspan></text>
      <text y="18" fill="#22c55e">✓ PASSED <tspan fill="#94a3b8" font-size="10">score: 0.92</tspan></text>
    </g>
  </g>

  <g transform="translate(620, 25)" filter="url(#shadow)">
    <rect width="260" height="150" rx="12" fill="white" stroke="#e2e8f0" stroke-width="1"/>
    <rect width="260" height="6" rx="3" fill="#10b981"/>
    
    <circle cx="45" cy="45" r="20" fill="#ecfdf5"/>
    <polygon points="45,35 55,55 35,55" fill="#10b981"/>
    
    <text x="75" y="42" font-size="14" font-weight="700" fill="#1e293b">Production Ready</text>
    <text x="75" y="58" font-size="12" fill="#64748b">Monitor and evaluate live traffic</text>

    <rect x="15" y="80" width="230" height="55" rx="8" fill="#0f172a"/>
    <g transform="translate(25, 102)" font-family="monospace" font-size="11">
      <text y="0" fill="#a78bfa">@observe<tspan fill="#fbbf24">(rate=0.05)</tspan></text>
      <text y="18" fill="#94a3b8"># Sample 5% for evaluation</text>
    </g>
  </g>

  <text x="450" y="192" text-anchor="middle" font-size="11" fill="#94a3b8">fasteval • Documentation Standards 2026</text>
</svg>
