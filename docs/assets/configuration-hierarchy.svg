<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.08"/>
    </filter>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
    <marker id="priorityArrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="900" height="600" fill="#f8fafc"/>

  <text x="450" y="45" text-anchor="middle" font-size="22" font-weight="700" fill="#1e293b">Configuration Hierarchy</text>
  <text x="450" y="70" text-anchor="middle" font-size="14" fill="#64748b">Settings resolved from highest (specific) to lowest (baseline) priority</text>

  <g transform="translate(60, 130)">
    <line x1="0" y1="270" x2="0" y2="15" stroke="#f59e0b" stroke-width="3" marker-end="url(#priorityArrow)"/>
    <text x="-12" y="142" text-anchor="middle" font-size="12" font-weight="700" fill="#b45309" transform="rotate(-90, -12, 142)">PRIORITY</text>
    <text x="15" y="10" font-size="11" font-weight="600" fill="#b45309">HIGHEST</text>
    <text x="15" y="275" font-size="11" font-weight="600" fill="#64748b">LOWEST</text>
  </g>

  <g transform="translate(340, 130)">
    <g filter="url(#shadow)">
      <path d="M -80 0 L 80 0 L 100 60 L -100 60 Z" fill="white" stroke="#f59e0b" stroke-width="1.5"/>
      <text y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">1. Per-Metric</text>
      <text y="46" text-anchor="middle" font-size="11" fill="#d97706">Decorator Parameters</text>
    </g>

    <g transform="translate(0, 70)" filter="url(#shadow)">
      <path d="M -100 0 L 100 0 L 130 60 L -130 60 Z" fill="white" stroke="#3b82f6" stroke-width="1.5"/>
      <text y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">2. Programmatic</text>
      <text y="46" text-anchor="middle" font-size="11" fill="#2563eb">fe.configure()</text>
    </g>

    <g transform="translate(0, 140)" filter="url(#shadow)">
      <path d="M -130 0 L 130 0 L 165 60 L -165 60 Z" fill="white" stroke="#8b5cf6" stroke-width="1.5"/>
      <text y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">3. pyproject.toml</text>
      <text y="46" text-anchor="middle" font-size="11" fill="#7c3aed">[tool.fasteval]</text>
    </g>

    <g transform="translate(0, 210)" filter="url(#shadow)">
      <path d="M -165 0 L 165 0 L 205 60 L -205 60 Z" fill="white" stroke="#94a3b8" stroke-width="1.5"/>
      <text y="28" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">4. Environment Variables</text>
      <text y="46" text-anchor="middle" font-size="11" fill="#64748b">OPENAI_API_KEY, etc.</text>
    </g>

    <g font-size="10" font-weight="600" fill="#10b981">
      <text x="105" y="68">overrides</text>
      <text x="135" y="138">overrides</text>
      <text x="170" y="208">overrides</text>
    </g>
  </g>

  <g transform="translate(580, 130)">
    <g filter="url(#shadow)">
      <rect width="260" height="60" rx="8" fill="#0f172a"/>
      <text x="15" y="25" font-family="monospace" font-size="12" fill="#a78bfa">@fe.correctness(</text>
      <text x="15" y="43" font-family="monospace" font-size="12" fill="#a78bfa">  model=<tspan fill="#fbbf24">"gpt-4o"</tspan>)</text>
    </g>

    <g transform="translate(0, 70)" filter="url(#shadow)">
      <rect width="260" height="60" rx="8" fill="#0f172a"/>
      <text x="15" y="25" font-family="monospace" font-size="12" fill="#60a5fa">fe.configure(</text>
      <text x="15" y="43" font-family="monospace" font-size="12" fill="#60a5fa">  model=<tspan fill="#fbbf24">"gpt-4o-mini"</tspan>)</text>
    </g>

    <g transform="translate(0, 140)" filter="url(#shadow)">
      <rect width="260" height="60" rx="8" fill="#0f172a"/>
      <text x="15" y="25" font-family="monospace" font-size="12" fill="#f8fafc">[tool.fasteval]</text>
      <text x="15" y="43" font-family="monospace" font-size="12" fill="#10b981">default_model = <tspan fill="#fbbf24">"..."</tspan></text>
    </g>

    <g transform="translate(0, 210)" filter="url(#shadow)">
      <rect width="260" height="60" rx="8" fill="#0f172a"/>
      <text x="15" y="35" font-family="monospace" font-size="12" fill="#f1f5f9">export <tspan fill="#60a5fa">OPENAI_API_KEY</tspan>=...</text>
    </g>
  </g>

  <g transform="translate(100, 430)">
    <rect width="720" height="40" rx="12" fill="#fffbeb" stroke="#fcd34d" stroke-width="1.5"/>
    <text x="355" y="25" text-anchor="middle" font-size="12" font-weight="600" fill="#92400e">
      Tip: Use environment variables for keys, pyproject.toml for team defaults, and decorators for specific overrides.
    </text>
  </g>

  <text x="450" y="488" text-anchor="middle" font-size="11" fill="#94a3b8">FastEval Documentation • Configuration Architecture Standards • 2026</text>
</svg>
