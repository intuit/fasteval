name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --group dev --group test

      - name: Check formatting (black)
        run: uv run black --check --diff .

      - name: Check import sorting (isort)
        run: uv run isort --check-only --diff .

      - name: Type checking (mypy)
        run: uv run mypy .

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --group test

      - name: Run tests
        run: |
          uv run pytest tests/ \
            --color=yes \
            --cov=fasteval \
            --cov-report=term \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage
        if: matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  test-plugins:
    name: Test Plugins
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin: [fasteval-langfuse, fasteval-langgraph, fasteval-observe]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install core package
        run: uv sync --all-extras

      - name: Install plugin dependencies
        working-directory: plugins/${{ matrix.plugin }}
        run: uv sync --all-extras --group dev

      - name: Run plugin tests
        working-directory: plugins/${{ matrix.plugin }}
        run: uv run pytest tests/ -v --color=yes
