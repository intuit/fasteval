name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Detect which packages need releasing from PR labels
  # -----------------------------------------------------------------------
  detect:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      core_bump: ${{ steps.parse.outputs.core_bump }}
      plugin_matrix: ${{ steps.parse.outputs.plugin_matrix }}
      has_core: ${{ steps.parse.outputs.has_core }}
      has_plugins: ${{ steps.parse.outputs.has_plugins }}
    steps:
      - name: Parse release labels
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            let coreBump = '';
            const plugins = [];

            for (const label of labels) {
              const match = label.match(/^release:(\w+):(\w+)$/);
              if (!match) continue;

              const [, pkg, bump] = match;
              // Skip dev labels -- handled by release-dev.yml
              if (bump === 'dev') continue;

              if (pkg === 'core') {
                coreBump = bump;
              } else if (['langfuse', 'observe', 'langgraph'].includes(pkg)) {
                plugins.push({ package: pkg, bump });
              }
            }

            core.setOutput('core_bump', coreBump);
            core.setOutput('has_core', coreBump ? 'true' : 'false');
            core.setOutput('plugin_matrix', JSON.stringify({ include: plugins }));
            core.setOutput('has_plugins', plugins.length > 0 ? 'true' : 'false');

            // Summary
            if (coreBump) core.info(`Core release: ${coreBump}`);
            for (const p of plugins) core.info(`Plugin release: ${p.package} ${p.bump}`);
            if (!coreBump && plugins.length === 0) core.info('No release labels found.');

  # -----------------------------------------------------------------------
  # Job 2: Lint core
  # -----------------------------------------------------------------------
  lint-core:
    needs: detect
    if: needs.detect.outputs.has_core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --group dev --group test

      - name: Check formatting (black)
        run: uv run black --check --diff .

      - name: Check import sorting (isort)
        run: uv run isort --check-only --diff .

      - name: Type checking (mypy)
        run: uv run mypy .

  # -----------------------------------------------------------------------
  # Job 3: Test core
  # -----------------------------------------------------------------------
  test-core:
    needs: detect
    if: needs.detect.outputs.has_core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        run: uv sync --all-extras --group test

      - name: Run tests
        run: |
          uv run pytest tests/ \
            --color=yes \
            --cov=fasteval \
            --cov-report=term \
            -v

  # -----------------------------------------------------------------------
  # Job 4: Release core (after lint + test pass)
  # -----------------------------------------------------------------------
  release-core:
    needs: [detect, lint-core, test-core]
    if: needs.detect.outputs.has_core == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Calculate next version
        id: version
        run: |
          python scripts/bump_version.py \
            --package core \
            --bump "${{ needs.detect.outputs.core_bump }}" \
            >> "$GITHUB_OUTPUT"

      - name: Update version in pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" \
            pyproject.toml

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Purge shields.io badge cache
        run: |
          # Wait briefly for PyPI index to propagate
          sleep 30
          # Purge shields.io cache so the PyPI version badge updates
          curl -sS "https://purge.shields.io/pypi/v/fasteval-core.svg" || true
          # Also purge the GitHub camo proxy cache for the badge
          BADGE_URL="https://img.shields.io/pypi/v/fasteval-core.svg"
          curl -sS -w "\n%{http_code}" "$BADGE_URL" > /dev/null || true

  # -----------------------------------------------------------------------
  # Job 5: Test plugins (after core is released, so deps resolve)
  # -----------------------------------------------------------------------
  test-plugins:
    needs: [detect, release-core]
    if: |
      always() &&
      needs.detect.result == 'success' &&
      (needs.release-core.result == 'success' || needs.release-core.result == 'skipped') &&
      needs.detect.outputs.has_plugins == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix: ${{ fromJson(needs.detect.outputs.plugin_matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install core package
        run: uv sync --all-extras

      - name: Install plugin dependencies
        working-directory: plugins/fasteval-${{ matrix.package }}
        run: uv sync --all-extras --group dev

      - name: Run plugin tests
        working-directory: plugins/fasteval-${{ matrix.package }}
        run: uv run pytest tests/ -v --color=yes

  # -----------------------------------------------------------------------
  # Job 6: Release plugins (after plugin tests pass)
  # -----------------------------------------------------------------------
  release-plugins:
    needs: [detect, release-core, test-plugins]
    if: |
      always() &&
      needs.detect.result == 'success' &&
      (needs.release-core.result == 'success' || needs.release-core.result == 'skipped') &&
      needs.test-plugins.result == 'success' &&
      needs.detect.outputs.has_plugins == 'true'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.plugin_matrix) }}
      max-parallel: 1
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Calculate next version
        id: version
        run: |
          python scripts/bump_version.py \
            --package "${{ matrix.package }}" \
            --bump "${{ matrix.bump }}" \
            >> "$GITHUB_OUTPUT"

      - name: Update version in pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" \
            "${{ steps.version.outputs.pyproject_path }}"

      - name: Build plugin
        working-directory: ${{ steps.version.outputs.build_dir }}
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: ${{ steps.version.outputs.build_dir }}/dist/

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Purge shields.io badge cache
        run: |
          sleep 30
          curl -sS "https://purge.shields.io/pypi/v/fasteval-${{ matrix.package }}.svg" || true
