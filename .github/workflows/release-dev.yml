name: Dev Preview

on:
  pull_request:
    types: [labeled, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  # -----------------------------------------------------------------------
  # Job 1: Detect which packages have release:*:dev labels
  # -----------------------------------------------------------------------
  detect:
    if: github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
      has_packages: ${{ steps.parse.outputs.has_packages }}
    steps:
      - name: Find dev release labels
        id: parse
        uses: actions/github-script@v7
        with:
          script: |
            const validPackages = ['core', 'langfuse', 'observe', 'langgraph'];
            const packages = [];

            if (context.payload.action === 'labeled') {
              const label = context.payload.label.name;
              const match = label.match(/^release:(\w+):dev$/);
              if (match && validPackages.includes(match[1])) {
                packages.push(match[1]);
              }
            } else if (context.payload.action === 'synchronize') {
              for (const label of context.payload.pull_request.labels) {
                const match = label.name.match(/^release:(\w+):dev$/);
                if (match && validPackages.includes(match[1])) {
                  packages.push(match[1]);
                }
              }
            }

            const matrix = { include: packages.map(p => ({ package: p })) };
            core.setOutput('matrix', JSON.stringify(matrix));
            core.setOutput('has_packages', packages.length > 0 ? 'true' : 'false');

            if (packages.length > 0) {
              core.info(`Dev builds: ${packages.join(', ')}`);
            } else {
              core.info('No dev release labels found.');
            }

  # -----------------------------------------------------------------------
  # Job 2: Build each detected package and upload as artifact
  # -----------------------------------------------------------------------
  build-dev:
    needs: detect
    if: needs.detect.outputs.has_packages == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJson(needs.detect.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Calculate dev version
        id: version
        run: |
          python scripts/bump_version.py \
            --package "${{ matrix.package }}" \
            --bump dev \
            --dev-number "${{ github.run_number }}" \
            >> "$GITHUB_OUTPUT"

      - name: Update version in pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" \
            "${{ steps.version.outputs.pyproject_path }}"

      - name: Build package
        working-directory: ${{ steps.version.outputs.build_dir }}
        run: uv build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-${{ matrix.package }}-${{ steps.version.outputs.version }}
          path: ${{ steps.version.outputs.build_dir }}/dist/

  # -----------------------------------------------------------------------
  # Job 3: Post a PR comment with install instructions
  # -----------------------------------------------------------------------
  comment:
    needs: [detect, build-dev]
    if: needs.build-dev.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const packages = ${{ needs.detect.outputs.matrix }};
            const runId = context.runId;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;
            const sha = context.payload.pull_request.head.sha.substring(0, 7);

            let body = `### 📦 Dev Preview Build\n\n`;
            body += `**Commit**: \`${sha}\` | **Run**: [#${context.runNumber}](${runUrl})\n\n`;
            body += `| Package | Version | Artifact |\n`;
            body += `|---------|---------|----------|\n`;

            for (const { package: pkg } of packages.include) {
              const pypiName = pkg === 'core' ? 'fasteval-core' : `fasteval-${pkg}`;
              const artifactName = `dev-${pkg}`;
              body += `| \`${pypiName}\` | \`dev${context.runNumber}\` | [Download](${runUrl}) |\n`;
            }

            body += `\nDownload the \`.whl\` from the artifacts above, then install:\n`;
            body += `\`\`\`bash\npip install ./fasteval_core-*.whl\n\`\`\`\n`;

            // Find and update existing bot comment, or create new one
            const marker = '<!-- dev-preview-comment -->';
            body = marker + '\n' + body;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
