# see https://mypy.readthedocs.io/en/stable/existing_code.html#introduce-stricter-options
[mypy]
python_version = 3.10
# Start off with these
warn_unused_configs = True
warn_redundant_casts = True
warn_unused_ignores = True

# Getting these passing should be easy
strict_equality = True
extra_checks = True

# Strongly recommend enabling this one as soon as you can
check_untyped_defs = True

# Monorepo: each plugin has its own tests/ package
explicit_package_bases = True
namespace_packages = True
exclude = plugins/

# Ignore missing imports for optional providers (they may not be installed)
[mypy-fasteval.providers.anthropic]
ignore_missing_imports = True

# Optional audio dependencies without type stubs
[mypy-soundfile]
ignore_missing_imports = True

[mypy-pydub.*]
ignore_missing_imports = True
